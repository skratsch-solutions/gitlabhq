# Vale configuration file.
#
# For more information, see https://vale.sh/docs/vale-ini.

StylesPath = doc/.vale
MinAlertLevel = suggestion

IgnoredScopes = code, text.frontmatter.redirect_to

[*.md]
BasedOnStyles = gitlab_base, gitlab_docs

# Ignore SVG markup and .yml filenames
TokenIgnores = \{\{< icon .*?>\}\}, \S+\.yml

# Validate feature release note metadata. Applies only to the leaf bundle release note format.
# Ignores metadata for single-file releases (16, 17, 18, and 19.0).
# `**/` at start added for improved compatibility with vale-ls.
[**/doc/releases/*/*-released/*.md]
BasedOnStyles = gitlab_base, gitlab_docs, gitlab_release_notes

# Validate the minor release index page. This more specific section replaces the
# one above for index.md, so the feature note rules don't run on it.
# `**/` at start added for improved compatibility with vale-ls.
[**/doc/releases/*/*-released/index.md]
BasedOnStyles = gitlab_base, gitlab_docs, gitlab_release_index
