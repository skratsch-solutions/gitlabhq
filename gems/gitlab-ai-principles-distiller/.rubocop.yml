inherit_from:
  - ../config/rubocop.yml

Gitlab/HTTParty:
  Enabled: false

Rails/Output:
  Enabled: false

# This gem ships standalone (no ActiveSupport at runtime). Disable Rails
# cops that depend on Rails monkeypatches like Time.zone.
Rails/TimeZone:
  Enabled: false

# This gem runs as a standalone CLI, so `exit` is the correct way to signal a
# non-zero status to the shell (e.g. the --check-duo-instructions guard).
Rails/Exit:
  Enabled: false

Gemfile/MissingFeatureCategory:
  Enabled: false

Rails/NegateInclude:
  Enabled: false

RSpec/MultipleMemoizedHelpers:
  Max: 25
  AllowSubject: true
