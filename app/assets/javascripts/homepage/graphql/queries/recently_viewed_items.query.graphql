query RecentlyViewedItems {
  currentUser {
    id
    recentlyViewedItems {
      viewedAt
      item {
        ... on WorkItem {
          id
          title
          webUrl
          workItemType {
            id
            name
          }
        }
        ... on Issue {
          id
          title
          webUrl
        }
        ... on MergeRequest {
          id
          title
          webUrl
        }
        ... on WikiPage @gl_introduced(version: "18.11.0") {
          id
          title
          webUrl
        }
      }
    }
  }
}
