#import "~/graphql_shared/fragments/label.fragment.graphql"

# @feature_category: portfolio_management
mutation issueSetLabels($input: UpdateIssueInput!) {
  updateIssuableLabels: updateIssue(input: $input) {
    issuable: issue {
      id
      labels {
        nodes {
          ...Label
        }
      }
    }
    errors
  }
}
