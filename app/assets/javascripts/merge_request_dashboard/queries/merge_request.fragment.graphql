#import "~/graphql_shared/fragments/user.fragment.graphql"
#import "~/graphql_shared/fragments/milestone.fragment.graphql"
#import "~/graphql_shared/fragments/ci_icon.fragment.graphql"
#import "~/graphql_shared/fragments/label.fragment.graphql"
#import "ee_else_ce/merge_request_dashboard/queries/merge_request_approval.fragment.graphql"

fragment MergeRequestDashboardFragment on MergeRequest {
  id
  reference(full: true)
  title
  webUrl
  draft
  state
  author {
    ...User
  }
  milestone {
    ...MilestoneFragment
    webPath
  }
  assignees {
    nodes {
      ...User
    }
  }
  reviewers {
    nodes {
      ...User
      mergeRequestInteraction {
        reviewState
        updatedAt @include(if: $updatedAt)
      }
    }
  }
  headPipeline {
    id
    detailedStatus {
      ...CiIcon
    }
  }
  labels {
    nodes {
      ...Label
    }
  }
  resolvedDiscussionsCount
  resolvableDiscussionsCount
  commitCount
  sourceBranchExists
  targetBranchExists
  conflicts
  mergedAt
  createdAt
  updatedAt
  mergeabilityChecks {
    status
  }
  ...MergeRequestApprovalFragment
}
