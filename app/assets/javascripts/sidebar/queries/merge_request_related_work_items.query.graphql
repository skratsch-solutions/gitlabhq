# @feature_category: portfolio_management
query mergeRequestRelatedWorkItems(
  $id: MergeRequestID!
  $explicitMrWorkItemRelations: Boolean = false
) {
  mergeRequest(id: $id) {
    id
    userPermissions @include(if: $explicitMrWorkItemRelations) {
      adminMergeRequest
    }
    linkedWorkItems {
      linkType
      workItem {
        id
        iid
        title
        webPath
        webUrl
        namespace {
          id
          fullPath
        }
      }
    }
  }
}
