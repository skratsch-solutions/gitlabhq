# @feature_category: portfolio_management
query recentlyViewedWorkItems {
  currentUser {
    id
    recentlyViewedItems {
      viewedAt
      item {
        ... on WorkItem {
          id
          title
          webUrl
          workItemType {
            id
            name
            iconName
          }
        }
        ... on Issue {
          id
          title
          webUrl
          workItemType {
            id
            name
            iconName
          }
        }
      }
    }
  }
}
