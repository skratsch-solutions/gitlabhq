fragment CodeSuggestionsAcceptanceByLanguageItem on Analytics {
  duoCodeSuggestions(timestampFrom: $startDate, timestampTo: $endDate) {
    aggregated(orderBy: [{ identifier: "acceptedCount", direction: ASC }]) {
      nodes {
        dimensions {
          language
        }
        acceptedCount
        shownCount
        acceptanceRate
      }
    }
  }
}
