# @feature_category: product_analytics
#import "./code_suggestions_acceptance_rate_metric_item.fragment.graphql"

query codeSuggestionsAcceptanceRateQuery($fullPath: ID!, $startDate: Date!, $endDate: Date!) {
  project(fullPath: $fullPath) {
    id
    aiMetrics(startDate: $startDate, endDate: $endDate) {
      ...CodeSuggestionsAcceptanceRateMetricItem
    }
  }
  group(fullPath: $fullPath) {
    id
    aiMetrics(startDate: $startDate, endDate: $endDate) {
      ...CodeSuggestionsAcceptanceRateMetricItem
    }
  }
}
