#import "./code_suggestions_acceptance_by_ide_item.fragment.graphql"

query codeSuggestionsAcceptanceByIdeQuery($fullPath: ID!, $startDate: Time!, $endDate: Time!) {
  project(fullPath: $fullPath) {
    id
    analytics {
      ...CodeSuggestionsAcceptanceByIdeItem
    }
  }
  group(fullPath: $fullPath) {
    id
    analytics {
      ...CodeSuggestionsAcceptanceByIdeItem
    }
  }
}
