#import "./duo_power_users_count_metric_item.fragment.graphql"

query duoPowerUsersCountQuery($fullPath: ID!, $startDate: Time!, $endDate: Time!) {
  project(fullPath: $fullPath) {
    id
    analytics {
      ...DuoPowerUsersCountMetricItem
    }
  }
  group(fullPath: $fullPath) {
    id
    analytics {
      ...DuoPowerUsersCountMetricItem
    }
  }
}
