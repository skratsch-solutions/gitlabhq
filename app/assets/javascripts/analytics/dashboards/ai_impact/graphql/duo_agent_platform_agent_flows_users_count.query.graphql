) {
  project(fullPath: $fullPath) {
    id
    analytics {
      ...DuoAgentPlatformAgentFlowsUsersCountMetricItem
    }
  }
  group(fullPath: $fullPath) {
    id
    analytics {
      ...DuoAgentPlatformAgentFlowsUsersCountMetricItem
    }
  }
}
