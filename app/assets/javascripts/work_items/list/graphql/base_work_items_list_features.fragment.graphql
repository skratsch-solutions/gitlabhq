#import "~/graphql_shared/fragments/user.fragment.graphql"
#import "~/work_items/graphql/milestone.fragment.graphql"

fragment BaseWorkItemsListFeatures on WorkItemFeatures {
  assignees {
    allowsMultipleAssignees
    canInviteMembers
    assignees {
      nodes {
        ...User
      }
    }
  }
  awardEmoji {
    upvotes
    downvotes
  }
  milestone {
    milestone {
      ...MilestoneFragment
    }
  }
  startAndDueDate {
    startDate
    dueDate
    rollUp
  }
  timeTracking {
    humanReadableAttributes {
      timeEstimate
    }
  }
  development {
    closingMergeRequests {
      count
    }
  }
  hierarchy {
    parent {
      id
    }
  }
  linkedResources {
    linkedResources {
      nodes {
        url
      }
    }
  }
}
