#import "~/graphql_shared/fragments/page_info.fragment.graphql"
#import "~/graphql_shared/fragments/label.fragment.graphql"

# `workItems @client` is intercepted by the Apollo local resolver
# (workItemsRestResolver in work_items_rest_resolver.js), which fetches from the REST API.
# @feature_category: portfolio_management
query getWorkItemsRest(
  $includeDescendants: Boolean = true
  $iid: String
  $fullPath: ID!
  $search: String
  $sort: WorkItemSort
  $state: IssuableState
  $assigneeWildcardId: AssigneeWildcardId
  $assigneeUsernames: [String!]
  $authorUsername: String
  $closedAfter: Time
  $closedBefore: Time
  $confidential: Boolean
  $createdAfter: Time
  $createdBefore: Time
  $dueAfter: Time
  $dueBefore: Time
  $labelName: [String!]
  $milestoneTitle: [String!]
  $milestoneWildcardId: MilestoneWildcardId
  $myReactionEmoji: String
  $subscribed: SubscriptionStatus
  $types: [IssueType!]
  $workItemTypeIds: [WorkItemsTypeID!]
  $updatedAfter: Time
  $updatedBefore: Time
  $crmOrganizationId: String
  $crmContactId: String
  $releaseTag: [String!]
  $releaseTagWildcardId: ReleaseTagWildcardId
  $hierarchyFilters: HierarchyFilterInput
  $in: [IssuableSearchableField!]
  $not: NegatedWorkItemFilterInput
  $or: UnionedWorkItemFilterInput
  $afterCursor: String
  $beforeCursor: String
  $firstPageSize: Int
  $lastPageSize: Int
) {
  namespace(fullPath: $fullPath) {
    id
    fullPath
    name
    workItems(
      iid: $iid
      includeDescendants: $includeDescendants
      search: $search
      sort: $sort
      state: $state
      assigneeUsernames: $assigneeUsernames
      assigneeWildcardId: $assigneeWildcardId
      authorUsername: $authorUsername
      closedAfter: $closedAfter
      closedBefore: $closedBefore
      confidential: $confidential
      createdAfter: $createdAfter
      createdBefore: $createdBefore
      dueBefore: $dueBefore
      dueAfter: $dueAfter
      labelName: $labelName
      milestoneTitle: $milestoneTitle
      milestoneWildcardId: $milestoneWildcardId
      myReactionEmoji: $myReactionEmoji
      subscribed: $subscribed
      types: $types
      workItemTypeIds: $workItemTypeIds
      updatedAfter: $updatedAfter
      updatedBefore: $updatedBefore
      crmContactId: $crmContactId
      crmOrganizationId: $crmOrganizationId
      releaseTag: $releaseTag
      releaseTagWildcardId: $releaseTagWildcardId
      hierarchyFilters: $hierarchyFilters
      in: $in
      not: $not
      or: $or
      after: $afterCursor
      before: $beforeCursor
      first: $firstPageSize
      last: $lastPageSize
    ) @client {
      pageInfo {
        ...PageInfo
      }
      nodes {
        id
        author {
          id
          avatarUrl
          name
          username
          webPath
          webUrl
        }
        closedAt
        confidential
        createdAt
        hidden
        iid
        userDiscussionsCount
        namespace {
          id
          fullPath
        }
        reference(full: true)
        title
        titleHtml
        updatedAt
        webPath
        webUrl
        state
        widgets(
          onlyTypes: [
            LABELS
            ASSIGNEES
            MILESTONE
            START_AND_DUE_DATE
            HIERARCHY
            AWARD_EMOJI
            DEVELOPMENT
          ]
        ) {
          type
          ... on WorkItemWidgetLabels {
            allowsScopedLabels
            labels {
              nodes {
                ...Label
              }
            }
          }
          ... on WorkItemWidgetAssignees {
            assignees {
              nodes {
                id
                avatarUrl
                name
                username
                webUrl
                webPath
              }
            }
          }
          ... on WorkItemWidgetMilestone {
            milestone {
              id
              dueDate
              startDate
              title
              webPath
            }
          }
          ... on WorkItemWidgetStartAndDueDate {
            dueDate
            startDate
          }
          ... on WorkItemWidgetHierarchy {
            parent {
              id
              iid
              title
              confidential
              webUrl
              namespace {
                id
                fullPath
              }
              workItemType {
                id
                name
                iconName
              }
            }
          }
          ... on WorkItemWidgetAwardEmoji {
            upvotes
            downvotes
          }
          ... on WorkItemWidgetDevelopment {
            closingMergeRequests {
              count
            }
          }
        }
        features {
          labels {
            allowsScopedLabels
            labels {
              nodes {
                ...Label
              }
            }
          }
          assignees {
            assignees {
              nodes {
                id
                avatarUrl
                name
                username
                webUrl
                webPath
              }
            }
          }
          milestone {
            milestone {
              id
              dueDate
              startDate
              title
              webPath
            }
          }
          startAndDueDate {
            dueDate
            startDate
          }
          hierarchy {
            parent {
              id
              iid
              title
              confidential
              webUrl
              namespace {
                id
                fullPath
              }
              workItemType {
                id
                name
                iconName
              }
            }
          }
          awardEmoji {
            upvotes
            downvotes
          }
          development {
            closingMergeRequests {
              count
            }
          }
        }
        workItemType {
          id
          name
          iconName
        }
      }
    }
  }
}
