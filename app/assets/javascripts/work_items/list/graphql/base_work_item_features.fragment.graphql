#import "~/graphql_shared/fragments/label.fragment.graphql"
#import "~/graphql_shared/fragments/user.fragment.graphql"
#import "~/work_items/graphql/milestone.fragment.graphql"

fragment BaseWorkItemFeatures on WorkItemFeatures {
  description {
    description
    descriptionHtml
    lastEditedAt
    # @graphql-eslint/eslint-plugin@4.0.0 reports missing IDs in `FragmentDefinition`. For now, we are
    # ignoring the newly uncovered error on this fragment. Please consider addressing the violation
    # if you are modifying this file and it turns out selecting the ID makes sense here.
    # eslint-disable-next-line @graphql-eslint/require-selections
    lastEditedBy {
      name
      webPath
    }
    taskCompletionStatus {
      completedCount
      count
    }
  }
  assignees {
    allowsMultipleAssignees
    canInviteMembers
    assignees {
      nodes {
        ...User
      }
    }
  }
  awardEmoji {
    upvotes
    downvotes
  }
  milestone {
    milestone {
      ...MilestoneFragment
    }
  }
  startAndDueDate {
    type
    startDate
    dueDate
    rollUp
  }
  timeTracking {
    type
    humanReadableAttributes {
      timeEstimate
    }
  }
  notes {
    discussionLocked
  }
  development {
    closingMergeRequests {
      count
    }
  }
  hierarchy {
    parent {
      id
    }
  }
  errorTracking {
    identifier
  }
  notifications {
    subscribed
  }
  crmContacts {
    contactsAvailable
    contacts {
      nodes {
        id
        email
        firstName
        lastName
        phone
        description
        organization {
          id
          name
          description
          defaultRate
        }
      }
    }
  }
  linkedResources {
    linkedResources {
      nodes {
        url
      }
    }
  }
  labels {
    allowsScopedLabels
    labels {
      nodes {
        ...Label
      }
    }
  }
}
