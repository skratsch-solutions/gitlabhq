#import "~/work_items/graphql/work_item_parent_fields.fragment.graphql"
#import "ee_else_ce/work_items/graphql/work_item_metadata_widgets.fragment.graphql"
#import "ee_else_ce/work_items/graphql/work_item_metadata_widgets_extras.fragment.graphql"

fragment WorkItemLinkedItemsFeaturesFragment on WorkItemFeatures {
  linkedItems {
    type
    linkedItems {
      nodes {
        linkId
        linkType
        workItemState
        workItem {
          id
          iid
          confidential
          namespace {
            id
            fullPath
          }
          author {
            id
            username
          }
          workItemType {
            id
            name
            iconName
          }
          title
          state
          createdAt
          closedAt
          webUrl
          reference(full: true)
          widgets {
            ...WorkItemMetadataWidgets
            ...WorkItemMetadataWidgetsExtras
            ... on WorkItemWidgetHierarchy {
              parent {
                ...WorkItemParentFields
              }
            }
          }
        }
      }
    }
  }
}
