# @feature_category: team_planning
mutation workItemSubscribe($input: WorkItemSubscribeInput!, $useWorkItemFeatures: Boolean = false) {
  workItemSubscribe(input: $input) {
    errors
    workItem {
      id
      widgets(onlyTypes: [NOTIFICATIONS]) @skip(if: $useWorkItemFeatures) {
        ... on WorkItemWidgetNotifications {
          type
          subscribed
        }
      }
      features @include(if: $useWorkItemFeatures) {
        notifications {
          type
          subscribed
        }
      }
    }
  }
}
