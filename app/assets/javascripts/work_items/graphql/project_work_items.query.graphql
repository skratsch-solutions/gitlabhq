# @feature_category: team_planning
query projectWorkItems(
  $searchTerm: String
  $fullPath: ID!
  $in: [IssuableSearchableField!]
  $iid: String = null
  $searchByIid: Boolean = false
  $searchByText: Boolean = true
  $workItemTypeIds: [WorkItemsTypeID!]
) {
  namespace: project(fullPath: $fullPath) {
    id
    workItems(search: $searchTerm, state: opened, in: $in, workItemTypeIds: $workItemTypeIds)
      @include(if: $searchByText) {
      nodes {
        id
        iid
        title
        titleHtml
        confidential
        webUrl
        namespace {
          id
          fullPath
        }
        workItemType {
          id
          name
          iconName
        }
      }
    }
    workItemsByIid: workItems(iid: $iid, workItemTypeIds: $workItemTypeIds)
      @include(if: $searchByIid) {
      nodes {
        id
        iid
        title
        titleHtml
        confidential
        webUrl
        namespace {
          id
          fullPath
        }
        workItemType {
          id
          name
          iconName
        }
      }
    }
  }
}
