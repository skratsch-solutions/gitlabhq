#import "~/graphql_shared/fragments/label.fragment.graphql"
#import "~/graphql_shared/fragments/user.fragment.graphql"
#import "~/work_items/graphql/milestone.fragment.graphql"
#import "~/work_items/graphql/work_item_parent_fields.fragment.graphql"

fragment BaseWorkItemWidgets on WorkItemWidget {
  type
  ... on WorkItemWidgetAssignees @skip(if: $useWorkItemFeatures) {
    allowsMultipleAssignees
    canInviteMembers
    assignees {
      nodes {
        ...User
      }
    }
  }
  ... on WorkItemWidgetCrmContacts @skip(if: $useWorkItemFeatures) {
    contactsAvailable
    contacts {
      nodes {
        id
        email
        firstName
        lastName
        phone
        description
        organization {
          id
          name
          description
          defaultRate
        }
      }
    }
  }
  ... on WorkItemWidgetCurrentUserTodos @skip(if: $useWorkItemFeatures) {
    currentUserTodos(state: pending) {
      nodes {
        id
      }
    }
  }
  ... on WorkItemWidgetDescription @skip(if: $useWorkItemFeatures) {
    description
    descriptionHtml
    lastEditedAt
    # @graphql-eslint/eslint-plugin@4.0.0 reports missing IDs in `FragmentDefinition`. For now, we are
    # ignoring the newly uncovered error on this fragment. Please consider addressing the violation
    # if you are modifying this file and it turns out selecting the ID makes sense here.
    # eslint-disable-next-line @graphql-eslint/require-selections
    lastEditedBy {
      name
      webPath
    }
    taskCompletionStatus {
      completedCount
      count
    }
  }
  ... on WorkItemWidgetErrorTracking @skip(if: $useWorkItemFeatures) {
    identifier
  }
  ... on WorkItemWidgetHierarchy @skip(if: $useWorkItemFeatures) {
    hasChildren
    hasParent
    rolledUpCountsByType {
      countsByState {
        opened
        all
        closed
      }
      workItemType {
        id
        name
        iconName
      }
    }
    parent {
      ...WorkItemParentFields
    }
  }
  ... on WorkItemWidgetLabels @skip(if: $useWorkItemFeatures) {
    labels {
      nodes {
        ...Label
      }
    }
  }
  ... on WorkItemWidgetLinkedResources @skip(if: $useWorkItemFeatures) {
    linkedResources {
      nodes {
        url
      }
    }
  }
  ... on WorkItemWidgetMilestone @skip(if: $useWorkItemFeatures) {
    milestone {
      ...MilestoneFragment
    }
  }
  ... on WorkItemWidgetNotes @skip(if: $useWorkItemFeatures) {
    discussionLocked
  }
  ... on WorkItemWidgetStartAndDueDate @skip(if: $useWorkItemFeatures) {
    dueDate
    startDate
    rollUp
  }
}
