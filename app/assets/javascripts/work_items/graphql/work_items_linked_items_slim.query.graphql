# @feature_category: portfolio_management
query workItemLinkedItemsSlim(
  $fullPath: ID!
  $iid: String!
  $useWorkItemFeatures: Boolean = false
) {
  namespace(fullPath: $fullPath) {
    id
    workItem(iid: $iid) {
      id
      widgets(onlyTypes: [LINKED_ITEMS]) @skip(if: $useWorkItemFeatures) {
        ... on WorkItemWidgetLinkedItems {
          type
          blockedByCount
          blockingCount
          linkedItems {
            nodes {
              linkId
              linkType
              workItemState
              workItem {
                id
                iid
                confidential
                namespace {
                  id
                  fullPath
                }
                workItemType {
                  id
                  name
                  iconName
                }
                title
                titleHtml
                state
                createdAt
                closedAt
                webUrl
                reference(full: true)
              }
            }
          }
        }
      }
      features @include(if: $useWorkItemFeatures) {
        linkedItems {
          blockedByCount
          blockingCount
          linkedItems {
            nodes {
              linkId
              linkType
              workItemState
              workItem {
                id
                iid
                confidential
                namespace {
                  id
                  fullPath
                }
                workItemType {
                  id
                  name
                  iconName
                }
                title
                state
                createdAt
                closedAt
                webUrl
                reference(full: true)
              }
            }
          }
        }
      }
    }
  }
}
