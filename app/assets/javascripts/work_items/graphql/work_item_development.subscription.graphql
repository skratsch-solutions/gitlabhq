#import "ee_else_ce/work_items/graphql/work_item_development.fragment.graphql"

# @feature_category: team_planning
subscription workItemDevelopmentUpdated($id: WorkItemID!, $useWorkItemFeatures: Boolean = false) {
  workItemUpdated(workItemId: $id) {
    id
    iid
    namespace {
      id
    }
    widgets @skip(if: $useWorkItemFeatures) {
      ... on WorkItemWidgetDevelopment {
        ...WorkItemDevelopmentFragment
      }
    }
    features @include(if: $useWorkItemFeatures) {
      development {
        ...WorkItemDevelopmentFragment
      }
    }
  }
}
