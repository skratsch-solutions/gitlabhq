#import "./work_item_ancestors_hierarchy.fragment.graphql"

fragment WorkItemAncestors on WorkItem {
  id
  title
  widgets @skip(if: $useWorkItemFeatures) {
    type
    ... on WorkItemWidgetHierarchy {
      ...WorkItemAncestorsHierarchy
    }
  }
  features @include(if: $useWorkItemFeatures) {
    hierarchy {
      type
      ...WorkItemAncestorsHierarchy
    }
  }
}
