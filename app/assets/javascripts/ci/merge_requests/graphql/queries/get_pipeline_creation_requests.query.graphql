#import "../fragments/mr_pipeline_list_item.fragment.graphql"

query getPipelineCreationRequests($fullPath: ID!, $mergeRequestIid: String!) {
  project(fullPath: $fullPath) {
    id
    mergeRequest(iid: $mergeRequestIid) {
      id
      pipelineCreationRequests {
        status
        error
        pipeline {
          ...MergeRequestPipelineListItem
        }
      }
    }
  }
}
