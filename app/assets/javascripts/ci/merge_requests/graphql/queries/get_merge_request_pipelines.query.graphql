#import "~/graphql_shared/fragments/page_info.fragment.graphql"
#import "~/graphql_shared/fragments/ci_icon.fragment.graphql"

query getMergeRequestPipelines(
  $mergeRequestIid: String!
  $fullPath: ID!
  $first: Int
  $last: Int
  $after: String
  $before: String
) {
  project(fullPath: $fullPath) {
    id
    fullPath
    mergeRequest(iid: $mergeRequestIid) {
      id
      iid
      title
      webPath
      sourceBranch
      pipelines(first: $first, last: $last, after: $after, before: $before) {
        count
        nodes {
          id
          iid
          detailedStatus {
            ...CiIcon
            name
          }
          name
          ref
          refText
          commit {
            id
            shortId
            title
            webPath
            author {
              id
              avatarUrl
              webPath
              name
            }
          }
          user {
            id
            name
            webPath
            avatarUrl
          }
          source
          latest
          yamlErrors
          yamlErrorMessages
          failureReason
          configSource
          stuck
          type
          path
          retryable
          cancelable
          stages {
            nodes {
              id
              name
              detailedStatus {
                ...CiIcon
                name
                tooltip
              }
            }
          }
          mergeRequestEventType
          project {
            id
            fullPath
          }
          hasManualActions
          hasScheduledActions
          failedJobsCount
          downstream(first: 3) {
            nodes {
              id
              detailedStatus {
                id
                icon
                name
              }
              sourceJob {
                id
                retried
              }
            }
          }
        }
        pageInfo {
          ...PageInfo
        }
      }
    }
  }
}
