# @feature_category: continuous_integration
#import "~/graphql_shared/fragments/ci_icon.fragment.graphql"
#import "~/graphql_shared/fragments/page_info.fragment.graphql"
#import "~/ci/common/graphql/fragments/pipeline_downstream_list_item.fragment.graphql"
#import "../fragments/pipeline_list_item.fragment.graphql"

query getPipelines(
  $fullPath: ID!
  $scope: PipelineScopeEnum
  $first: Int
  $last: Int
  $after: String
  $before: String
  $source: String
  $ref: String
  $username: String
  $status: PipelineStatusEnum
  $ids: [ID!]
) {
  project(fullPath: $fullPath) {
    id
    pipelines(
      scope: $scope
      first: $first
      last: $last
      after: $after
      before: $before
      source: $source
      ref: $ref
      username: $username
      status: $status
      ids: $ids
    ) {
      nodes {
        ...PipelineListItem
        ...PipelineDownstreamListItem
        upstream {
          id
          detailedStatus {
            ...CiIcon
            tooltip
            label
          }
          project {
            id
            name
          }
        }
      }
      pageInfo {
        ...PageInfo
      }
    }
  }
}
