# @feature_category: pipeline_composition
#import "~/ci/catalog/graphql/fragments/catalog_resource.fragment.graphql"
#import "~/ci/catalog/graphql/fragments/catalog_resource_version.fragment.graphql"

query getCatalogResources(
  $scope: CiCatalogResourceScope
  $minAccessLevel: AccessLevelEnum
  $searchTerm: String
  $sortValue: CiCatalogResourceSort
  $verificationLevel: CiCatalogResourceVerificationLevel
  $topics: [String!]
  $groupIds: [GroupID!]
  $after: String
  $before: String
  $first: Int = 20
  $last: Int
) {
  ciCatalogResources(
    scope: $scope
    minAccessLevel: $minAccessLevel
    search: $searchTerm
    sort: $sortValue
    verificationLevel: $verificationLevel
    topics: $topics
    groupIds: $groupIds
    after: $after
    before: $before
    first: $first
    last: $last
  ) {
    pageInfo {
      startCursor
      endCursor
      hasNextPage
      hasPreviousPage
    }
    nodes {
      ...CatalogResourceFields
      versions(first: 1) {
        nodes {
          ...CatalogResourceVersionFields
          components {
            nodes {
              id
              name
            }
          }
        }
      }
    }
  }
}
