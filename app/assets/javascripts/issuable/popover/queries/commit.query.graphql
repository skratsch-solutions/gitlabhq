# @feature_category: source_code_management
query commitPopover($projectPath: ID!, $sha: String!) {
  project(fullPath: $projectPath) {
    id
    repository {
      commit(ref: $sha) {
        id
        title
        shortId
        authoredDate
        authorName
        author {
          id
          name
          avatarUrl
        }
        webPath
      }
    }
  }
}
