# Feature search terminology map
#
# Maps external vocabulary and GitLab-native shorthand to Feature Library item IDs.
# Source: https://docs.google.com/spreadsheets/d/1bwbN5BDFk6oQnSJDQBP9QuTxUXlNekMU-WKJIFk_bzo
#
# Each entry:
#   term:        the search string the user types (lowercase, stripped, no parenthetical tags)
#   feature_key: the real Sidebars::MenuItem#item_id (source of truth)
#   panels:      [project], [group], or [project, group]
#
# Rules:
# - Features with distinct ids per panel require two entries (one per panel).
# - Features that share the same bare id in both panels use panels: [project, group].
# - Terms must be lowercase and stripped (enforced by the integrity spec).
# - No duplicate (term, panel) pairs (enforced by the integrity spec).
# - The !/data/**/*.yml CODEOWNERS rule exempts this file from the engineering review gate.

