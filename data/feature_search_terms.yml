# Feature search terminology map
#
# Maps external vocabulary to GitLab Feature Library item IDs.
# This is a temporary placeholder pending the curated import from the full terminology sheet.
#
# Each entry:
#   source_tool:   the external tool or context (e.g. GitHub, Jira)
#   term:          the search string the user types (lowercase; multi-word is supported)
#   feature_key:   the real Sidebars::MenuItem#item_id (the source of truth)
#   panels:        panels this feature is valid in - [project], [group], or [project, group]
#
# To add a feature: add one or more entries with a real Feature Library item_id and its valid panels.
# The !/data/**/*.yml CODEOWNERS rule exempts this file from the engineering review gate.
#
# Note: features with distinct ids per panel (e.g. Issues, Merge Requests) require two entries —
# one per panel with the correct panel-specific id.

# Merge requests
- source_tool: GitHub
  term: pr
  feature_key: project_merge_request_list
  panels: [project]
- source_tool: GitHub
  term: pr
  feature_key: group_merge_request_list
  panels: [group]
- source_tool: GitHub
  term: pull request
  feature_key: project_merge_request_list
  panels: [project]

