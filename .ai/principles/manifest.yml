        url: https://docs.gitlab.com/development/code_review/

  ai-instruction-files:
    description: Reviewing AI instruction files under .ai/ (hand-authored modules, distilled principles, baselines, distillation config)
    group: Code Review
    owner_team: '@dgruzd @pedropombeiro @ghavenga @tkuah @dmishunov'
    team_slug: ai-harness
    ping_team: false
    file_filters:
      - '.ai/**/*'
    sources:
      - path: doc/development/ai_instruction_files_review.md
