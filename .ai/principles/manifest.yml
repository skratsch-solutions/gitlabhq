      - path: doc/development/graphql_guide/pagination.md
        url: https://docs.gitlab.com/development/graphql_guide/pagination/
      - path: doc/development/graphql_guide/array_argument_validation.md
        url: https://docs.gitlab.com/development/graphql_guide/array_argument_validation/

  # ── Workers ───────────────────────────────────────────────────────────────

  workers:
    description: Sidekiq worker design and reliability
    group: Workers
    file_filters:
      - 'app/workers/**/*.rb'
      - 'ee/app/workers/**/*.rb'
    sources:
      - path: doc/development/sidekiq/_index.md
        url: https://docs.gitlab.com/development/sidekiq/
      - path: doc/development/sidekiq/worker_attributes.md
        url: https://docs.gitlab.com/development/sidekiq/worker_attributes/
      - path: doc/development/sidekiq/idempotent_jobs.md
        url: https://docs.gitlab.com/development/sidekiq/idempotent_jobs/
      - path: doc/development/sidekiq/compatibility_across_updates.md
        url: https://docs.gitlab.com/development/sidekiq/compatibility_across_updates/
      - path: doc/development/sidekiq/limited_capacity_worker.md
        url: https://docs.gitlab.com/development/sidekiq/limited_capacity_worker/
      - path: doc/development/sidekiq/logging.md
        url: https://docs.gitlab.com/development/sidekiq/logging/

  # ── CI/CD internals ───────────────────────────────────────────────────────

  cicd-internals:
    description: GitLab CI/CD internals — adding pipeline configuration keywords (Ci::Config::Entry classes, feature-flag gating, JSON schema) and creating CI routing/partitioned tables. NOTE this is about GitLab's own CI implementation, not authoring a project's .gitlab-ci.yml
    group: CI/CD
    file_filters:
      - 'lib/gitlab/ci/**/*.rb'
      - 'ee/lib/gitlab/ci/**/*.rb'
      - 'app/models/ci/**/*.rb'
      - 'ee/app/models/ci/**/*.rb'
    sources:
      - path: doc/development/cicd/configuration.md
        url: https://docs.gitlab.com/development/cicd/configuration/
      - path: doc/development/cicd/cicd_tables.md
        url: https://docs.gitlab.com/development/cicd/cicd_tables/

  # ── Frontend (4 sub-domains) ──────────────────────────────────────────────

  frontend-vue:
    description: Vue.js components, state management, patterns
    group: Frontend
    prerequisite: true
    file_filters:
      - 'app/assets/javascripts/**/*.vue'
      - 'app/assets/javascripts/**/*.js'
      - 'ee/app/assets/javascripts/**/*.vue'
      - 'ee/app/assets/javascripts/**/*.js'
      - '**/*.ts'
    baseline: .ai/principles/baselines/frontend-vue.md
    sources:
      - path: doc/development/fe_guide/_index.md
        url: https://docs.gitlab.com/development/fe_guide/
      - path: doc/development/fe_guide/style/vue.md
        url: https://docs.gitlab.com/development/fe_guide/style/vue/
      - path: doc/development/fe_guide/style/javascript.md
        url: https://docs.gitlab.com/development/fe_guide/style/javascript/
      - path: doc/development/fe_guide/style/typescript.md
        url: https://docs.gitlab.com/development/fe_guide/style/typescript/
      - path: doc/development/fe_guide/design_patterns.md
        url: https://docs.gitlab.com/development/fe_guide/design_patterns/
      - path: doc/development/fe_guide/state_management.md
        url: https://docs.gitlab.com/development/fe_guide/state_management/
      - path: doc/development/fe_guide/pinia.md
        url: https://docs.gitlab.com/development/fe_guide/pinia/
      - path: doc/development/fe_guide/axios.md
        url: https://docs.gitlab.com/development/fe_guide/axios/
      - path: doc/development/i18n/externalization.md
        url: https://docs.gitlab.com/development/i18n/externalization/

  frontend-style:
    description: CSS/SCSS, Tailwind, dark mode
    group: Frontend
    file_filters:
      - 'app/assets/stylesheets/**/*.scss'
      - 'ee/app/assets/stylesheets/**/*.scss'
    baseline: .ai/principles/baselines/frontend-style.md
    sources:
      - path: doc/development/fe_guide/style/_index.md
        url: https://docs.gitlab.com/development/fe_guide/style/
      - path: doc/development/fe_guide/style/scss.md
        url: https://docs.gitlab.com/development/fe_guide/style/scss/
      - path: doc/development/fe_guide/dark_mode.md
        url: https://docs.gitlab.com/development/fe_guide/dark_mode/

  frontend-haml:
    description: HAML templates, ViewComponents, Pajamas
    group: Frontend
    file_filters:
      - 'app/views/**/*.haml'
      - 'ee/app/views/**/*.haml'
    sources:
      - path: doc/development/fe_guide/style/html.md
        url: https://docs.gitlab.com/development/fe_guide/style/html/
      - path: doc/development/fe_guide/haml.md
        url: https://docs.gitlab.com/development/fe_guide/haml/

  frontend-a11y:
    description: Frontend accessibility patterns and requirements
    group: Frontend
    file_filters:
      - 'app/assets/javascripts/**/*.vue'
      - 'app/views/**/*.haml'
      - 'ee/app/assets/javascripts/**/*.vue'
      - 'ee/app/views/**/*.haml'
    sources:
      - path: doc/development/fe_guide/accessibility/_index.md
        url: https://docs.gitlab.com/development/fe_guide/accessibility/
      - path: doc/development/fe_guide/accessibility/best_practices.md
        url: https://docs.gitlab.com/development/fe_guide/accessibility/best_practices/

  # ── QA (2 sub-domains) ───────────────────────────────────────────────────

  qa-rspec:
    description: RSpec patterns, factories, shared examples
    group: Testing
    file_filters:
      - 'spec/**/*_spec.rb'
      - 'ee/spec/**/*_spec.rb'
      - 'qa/**/*'
    baseline: .ai/principles/baselines/qa-rspec.md
    sources:
      - path: doc/development/testing_guide/_index.md
        url: https://docs.gitlab.com/development/testing_guide/
      - path: doc/development/testing_guide/best_practices.md
        url: https://docs.gitlab.com/development/testing_guide/best_practices/
      - path: doc/development/testing_guide/testing_levels.md
        url: https://docs.gitlab.com/development/testing_guide/testing_levels/
      - path: doc/development/testing_guide/testing_migrations_guide.md
        url: https://docs.gitlab.com/development/testing_guide/testing_migrations_guide/
      - path: doc/development/testing_guide/testing_rake_tasks.md
        url: https://docs.gitlab.com/development/testing_guide/testing_rake_tasks/

  qa-jest:
    description: Jest, jsdom, Vue Test Utils patterns
    group: Testing
    file_filters:
      - 'spec/frontend/**/*'
      - 'ee/spec/frontend/**/*'
    sources:
      - path: doc/development/testing_guide/frontend_testing.md
        url: https://docs.gitlab.com/development/testing_guide/frontend_testing/

  # ── Remaining (unchanged) ─────────────────────────────────────────────────

  performance:
    description: Performance and scalability
    group: Performance
    file_filters:
      - 'app/**/*.rb'
      - 'ee/app/**/*.rb'
      - 'lib/**/*.rb'
      - 'ee/lib/**/*.rb'
    sources:
      - path: doc/development/merge_request_concepts/performance.md
        url: https://docs.gitlab.com/development/merge_request_concepts/performance/

  documentation:
    description: Documentation style and completeness
    group: Documentation
    file_filters:
      - 'doc/**/*.md'
      - 'locale/**/*'
    baseline: .ai/principles/baselines/documentation.md
    sources:
      - path: doc/development/documentation/styleguide/_index.md
        url: https://docs.gitlab.com/development/documentation/styleguide/
      - path: doc/development/documentation/workflow.md
        url: https://docs.gitlab.com/development/documentation/workflow/

  feature-flags:
    description: Feature flag usage and lifecycle
    group: Feature Flags
    file_filters:
