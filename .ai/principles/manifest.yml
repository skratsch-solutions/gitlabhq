    owner_team: '@gitlab-org/maintainers/clickhouse'
    file_filters:
      - 'db/siphon/**/*'
      - 'ee/app/models/click_house/**/*.rb'
      - 'db/click_house/**/*'
      - 'ee/db/click_house/**/*'
      - 'lib/click_house/**/*.rb'
      - 'db/migrate/**/*.rb'
      - 'db/post_migrate/**/*.rb'
      - 'ee/db/geo/migrate/**/*.rb'
    baseline: .ai/principles/baselines/clickhouse.md
    sources:
      - path: doc/development/database/clickhouse/reviewer_guidelines.md
        url: https://docs.gitlab.com/development/database/clickhouse/reviewer_guidelines/
      - path: doc/development/database/clickhouse/clickhouse_within_gitlab.md
        url: https://docs.gitlab.com/development/database/clickhouse/clickhouse_within_gitlab/

  # ── Cells ─────────────────────────────────────────────────────────────────

  cells-fundamentals:
    description: Cells architecture sharding keys, organization data ownership, routable requests, and cell isolation when adding tables or customer-owned resources
    group: Cells
    owner_team: '@gitlab-com/gl-infra/tenant-scale/cells-infrastructure/backend-engineers'
    team_slug: cells
    prerequisite: true
    file_filters:
      - 'db/docs/**/*.yml'
      - 'db/migrate/**/*.rb'
      - 'db/post_migrate/**/*.rb'
      - 'ee/db/geo/migrate/**/*.rb'
      - 'app/models/**/*.rb'
      - 'ee/app/models/**/*.rb'
