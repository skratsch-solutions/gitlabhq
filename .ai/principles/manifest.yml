# Auto-MR target configuration: how the scheduled sync job creates the
# merge request. Read by gitlab-ai-principles-distiller-sync when
# invoked with --push.
auto_mr:
  branch_prefix: docs-sync/principles
  title_template: "Update AI development principles from SSOT (%{date})"
  labels:
    - ai-agent
    - documentation
    - type::maintenance
  remove_source_branch: true

# Non-distilled .ai/ files included in AGENTS.md Context Loading.
# These are manually maintained and have no SSOT sources.
static_entries:
  - description: Git, commits, or branches
    path: .ai/git.md
  - description: CI/CD pipelines or `.gitlab-ci.yml`
    path: .ai/ci-cd.md

principles:
  # ── Database (4 sub-domains) ──────────────────────────────────────────────

  database-fundamentals:
    description: Database fundamentals (model queries, batching, sharding, partitioning, N+1)
    group: Database
    owner_team: '@gitlab-org/maintainers/database'
    prerequisite: true
    file_filters:
      - 'db/**/*'
      - 'lib/gitlab/database/**/*.rb'
      - 'lib/gitlab/background_migration/**/*.rb'
      - 'ee/db/**/*'
    baseline: .ai/principles/baselines/database-fundamentals.md
    sources:
      - path: doc/development/database_review.md
        url: https://docs.gitlab.com/development/database_review/
      - path: doc/development/database/multiple_databases.md
        url: https://docs.gitlab.com/development/database/multiple_databases/

  database-migrations:
    description: Database migration patterns and zero-downtime safety
    group: Database
    owner_team: '@gitlab-org/maintainers/database'
    file_filters:
      - 'db/migrate/**/*.rb'
      - 'db/post_migrate/**/*.rb'
      - 'ee/db/geo/migrate/**/*.rb'
    baseline: .ai/principles/baselines/database-migrations.md
    sources:
      - path: doc/development/migration_style_guide.md
        url: https://docs.gitlab.com/development/migration_style_guide/
      - path: doc/development/database/avoiding_downtime_in_migrations.md
        url: https://docs.gitlab.com/development/database/avoiding_downtime_in_migrations/
      - path: doc/development/database/post_deployment_migrations.md
        url: https://docs.gitlab.com/development/database/post_deployment_migrations/
      - path: doc/development/database/batched_background_migrations.md
        url: https://docs.gitlab.com/development/database/batched_background_migrations/
      - path: doc/development/database/rename_database_tables.md
        url: https://docs.gitlab.com/development/database/rename_database_tables/

  database-schema:
    description: Column types, constraints, indexes, naming conventions
    group: Database
    owner_team: '@gitlab-org/maintainers/database'
    file_filters:
      - 'db/structure.sql'
      - 'db/schema_migrations/**/*'
    baseline: .ai/principles/baselines/database-schema.md
    sources:
      - path: doc/development/database/adding_database_indexes.md
        url: https://docs.gitlab.com/development/database/adding_database_indexes/
      - path: doc/development/database/foreign_keys.md
        url: https://docs.gitlab.com/development/database/foreign_keys/
      - path: doc/development/database/not_null_constraints.md
        url: https://docs.gitlab.com/development/database/not_null_constraints/
      - path: doc/development/database/ordering_table_columns.md
        url: https://docs.gitlab.com/development/database/ordering_table_columns/
      - path: doc/development/database/strings_and_the_text_data_type.md
        url: https://docs.gitlab.com/development/database/strings_and_the_text_data_type/
      - path: doc/development/database/creating_enums.md
        url: https://docs.gitlab.com/development/database/creating_enums/
      - path: doc/development/database/constraint_naming_convention.md
        url: https://docs.gitlab.com/development/database/constraint_naming_convention/
      - path: doc/development/database/check_constraints.md
        url: https://docs.gitlab.com/development/database/check_constraints/
      - path: doc/development/database/polymorphic_associations.md
        url: https://docs.gitlab.com/development/database/polymorphic_associations/
      - path: doc/development/database/serializing_data.md
        url: https://docs.gitlab.com/development/database/serializing_data/
      - path: doc/development/database/single_table_inheritance.md
        url: https://docs.gitlab.com/development/database/single_table_inheritance/
      - path: doc/development/database/hash_indexes.md
        url: https://docs.gitlab.com/development/database/hash_indexes/

  database-queries:
    description: SQL performance, transactions, batching
    group: Database
    owner_team: '@gitlab-org/maintainers/database'
    file_filters:
      - 'app/models/**/*.rb'
      - 'app/finders/**/*.rb'
      - 'app/services/**/*.rb'
      - 'ee/app/models/**/*.rb'
      - 'ee/app/finders/**/*.rb'
      - 'ee/app/services/**/*.rb'
      - 'lib/gitlab/database/**/*.rb'
    baseline: .ai/principles/baselines/database-queries.md
    sources:
      - path: doc/development/database/query_performance.md
        url: https://docs.gitlab.com/development/database/query_performance/
      - path: doc/development/database/transaction_guidelines.md
        url: https://docs.gitlab.com/development/database/transaction_guidelines/
      - path: doc/development/database/large_tables_limitations.md
        url: https://docs.gitlab.com/development/database/large_tables_limitations/
      - path: doc/development/sql.md
        url: https://docs.gitlab.com/development/sql/
      - path: doc/development/database/batching_best_practices.md
        url: https://docs.gitlab.com/development/database/batching_best_practices/
      - path: doc/development/database/iterating_tables_in_batches.md
        url: https://docs.gitlab.com/development/database/iterating_tables_in_batches/
      - path: doc/development/database/insert_into_tables_in_batches.md
        url: https://docs.gitlab.com/development/database/insert_into_tables_in_batches/
      - path: doc/development/database/pagination_performance_guidelines.md
        url: https://docs.gitlab.com/development/database/pagination_performance_guidelines/

  # ── ClickHouse ────────────────────────────────────────────────────────────

  clickhouse:
    description: ClickHouse and Siphon CDC concerns, including adding the matching column to the respective siphon_ ClickHouse table when adding a column to a Postgres table replicated by Siphon
