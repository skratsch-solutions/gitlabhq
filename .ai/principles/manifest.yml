  # ── REST API ──────────────────────────────────────────────────────────────

  rest-api:
    description: REST API design and conventions
    group: API
    # The DevEx: API Platform team. Individuals rather than the
    # @gitlab-org/quality/api-platform group handle, because that subgroup
    # inherits ~1200 members from the gitlab-org/quality ancestry, which
    # would make approval far broader than the team itself.
    owner_team: '@mwoolf @cfeick @vwolanyk @abignotti'
    team_slug: api-platform
    file_filters:
      - 'lib/api/**/*.rb'
      - 'ee/lib/api/**/*.rb'
      - 'doc/api/**/*.md'
    baseline: .ai/principles/baselines/rest-api.md
    sources:
      - path: doc/development/api_styleguide.md
        url: https://docs.gitlab.com/development/api_styleguide/

