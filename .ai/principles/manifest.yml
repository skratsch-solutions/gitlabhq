    sources:
      - path: doc/development/permissions/granular_access/_index.md
        url: https://docs.gitlab.com/development/permissions/granular_access/
      - path: doc/development/permissions/granular_access/graphql_implementation_guide.md
        url: https://docs.gitlab.com/development/permissions/granular_access/graphql_implementation_guide/
      - path: doc/development/permissions/granular_access/graphql_architecture.md
