      - path: doc/development/cells/_index.md
        url: https://docs.gitlab.com/development/cells/

  cells-claims:
    description: Cells globally-unique attribute claims (Cells::Claimable), claim rollout lifecycle, and feature flags for cross-cell uniqueness
    group: Cells
    owner_team: '@gitlab-com/gl-infra/tenant-scale/cells-infrastructure/backend-engineers'
    team_slug: cells
