      - name: id
        required: true
        description: ID or URL-encoded path of the project
        schema:
          oneOf:
          - type: string
          - type: integer
        in: path
      - name: revoked
        required: false
        description: Filter tokens where revoked state matches parameter
        schema:
          type: boolean
          nullable: true
        in: query
        example: false
      - name: state
        required: false
        description: Filter tokens which are either active or not
        schema:
          type: string
          enum:
          - active
          - inactive
          nullable: true
        in: query
        example: active
      - name: created_before
        required: false
        description: Filter tokens which were created before given datetime
        schema:
          type: string
          format: date-time
          nullable: true
        in: query
        example: '2022-01-01T00:00:00Z'
      - name: created_after
        required: false
        description: Filter tokens which were created after given datetime
        schema:
          type: string
          format: date-time
          nullable: true
        in: query
        example: '2021-01-01T00:00:00Z'
      - name: last_used_before
        required: false
        description: Filter tokens which were used before given datetime
        schema:
          type: string
          format: date-time
          nullable: true
        in: query
        example: '2021-01-01T00:00:00Z'
      - name: last_used_after
        required: false
        description: Filter tokens which were used after given datetime
        schema:
          type: string
          format: date-time
          nullable: true
        in: query
        example: '2022-01-01T00:00:00Z'
