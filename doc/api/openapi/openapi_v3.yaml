      operationId: getApiV4ProjectsIdReleases
      summary: List all releases in a project
      description: Lists all releases for a specified project. Sorted by `released_at`.
      tags:
      - Releases
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/APIEntitiesRelease"
        '404':
          description: Not Found
        '400':
          description: Bad Request
      parameters:
      - name: id
        required: true
        description: The ID or URL-encoded path of the project
        schema:
          oneOf:
          - type: string
          - type: integer
        in: path
      - name: page
        required: false
        description: Current page number
        schema:
          type: integer
          default: 1
          nullable: true
        in: query
        example: 1
      - name: per_page
        required: false
        description: Number of items per page
        schema:
          type: integer
          default: 20
          nullable: true
        in: query
        example: 20
      - name: order_by
        required: false
        description: The field to use as order. Either `released_at` (default) or
          `created_at`
        schema:
          type: string
          enum:
          - released_at
          - created_at
          default: released_at
          nullable: true
        in: query
      - name: sort
        required: false
        description: The direction of the order. Either `desc` (default) for descending
          order or `asc` for ascending order
        schema:
          type: string
          enum:
          - asc
          - desc
          default: desc
          nullable: true
        in: query
      - name: include_html_description
        required: false
        description: If `true`, a response includes HTML rendered markdown of the
          release description
        schema:
          type: boolean
          nullable: true
        in: query
      - name: updated_before
        required: false
        description: 'Return releases updated before the specified datetime. Format:
          ISO 8601 YYYY-MM-DDTHH:MM:SSZ'
        schema:
          type: string
          format: date-time
          nullable: true
        in: query
      - name: updated_after
        required: false
        description: 'Return releases updated after the specified datetime. Format:
          ISO 8601 YYYY-MM-DDTHH:MM:SSZ'
        schema:
          type: string
          format: date-time
          nullable: true
        in: query
