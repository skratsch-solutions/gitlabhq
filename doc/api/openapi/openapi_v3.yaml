  "/api/v4/search":
    get:
      operationId: getApiV4Search
      summary: Search an instance
      description: Searches for a term across the entire GitLab instance. The response
        depends on the requested scope.
      tags:
      - Search
      responses:
        '200':
          description: OK
        '400':
          description: Bad Request
      parameters:
      - name: search
        required: true
        description: The expression it should be searched for
        schema:
          type: string
          nullable: true
        in: query
      - name: scope
        required: true
        description: The scope of the search
        schema:
          type: string
          enum:
          - wiki_blobs
          - blobs
          - commits
          - notes
          - projects
          - issues
          - work_items
          - merge_requests
          - milestones
          - snippet_titles
          - users
          minLength: 1
        in: query
      - name: state
        required: false
        description: Filter results by state
        schema:
          type: string
          enum:
          - all
          - opened
          - closed
          - merged
          nullable: true
        in: query
      - name: confidential
        required: false
        description: Filter results by confidentiality
        schema:
          type: boolean
          nullable: true
        in: query
      - name: type
        required: false
        description: 'Filter work items by type. Only applies to work_items scope.
          Available types: issue, task, epic, incident, test_case, requirement, objective,
          key_result, ticket.'
        schema:
          type: array
          items:
            type: string
          nullable: true
        in: query
        style: form
        explode: false
      - name: include_archived
        required: false
        description: Includes archived projects in the search. Introduced in GitLab
          18.9.
        schema:
          type: boolean
          nullable: true
        in: query
      - name: fields
        required: false
        description: Array of fields you wish to search. Available with advanced search.
        schema:
          type: array
          items:
            type: string
          nullable: true
        in: query
        style: form
        explode: false
      - name: exclude_forks
        required: false
        description: Excludes forked projects in the search. Available with exact
          code search. Introduced in GitLab 18.9.
        schema:
          type: boolean
          nullable: true
        in: query
      - name: num_context_lines
        required: false
        description: Number of context lines around each match. Available with advanced
          and exact code search. Introduced in GitLab 18.11.
        schema:
          type: integer
          minimum: 0
          maximum: 20
          nullable: true
        in: query
      - name: regex
        required: false
        description: Performs a regex code search. Available with exact code search.
          Introduced in GitLab 18.9
        schema:
          type: boolean
          nullable: true
        in: query
      - name: page
        required: false
        description: Current page number
        schema:
          type: integer
          default: 1
          nullable: true
        in: query
        example: 1
      - name: per_page
        required: false
        description: Number of items per page
        schema:
          type: integer
          default: 20
          nullable: true
        in: query
        example: 20
