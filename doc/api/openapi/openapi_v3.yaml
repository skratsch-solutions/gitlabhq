          type: integer
          description: Control the maximum concurrency of container repository sync
            for this site. Defaults to 10.
          nullable: true
        sync_object_storage:
          type: boolean
          description: Flag indicating if the secondary Geo site will replicate blobs
            in Object Storage. Defaults to false.
          nullable: true
