      summary: Create a project access token
      description: Creates a project access token for a specified project. You cannot
        create a token with an access level greater than your account. For example,
        a user with the Maintainer role cannot create a project access token with
        the Owner role. You must use a personal access token with this endpoint. You
        cannot authenticate with a project access token.
      tags:
      - Access tokens
      responses:
        '201':
          description: Created
