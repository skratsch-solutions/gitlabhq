    get:
      operationId: getApiV4ProjectsIdAccessTokens
      summary: List all project access tokens
      description: Lists all project access tokens for a specified project.
      tags:
      - Access tokens
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/APIEntitiesResourceAccessToken"
        '404':
          description: Not Found
        '400':
          description: Bad Request
