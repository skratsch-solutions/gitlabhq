  "/api/v4/projects/{id}/iterations":
    get:
      operationId: getApiV4ProjectsIdIterations
      summary: Get a list of project iterations
      description: This feature was introduced in GitLab 13.5
      tags:
      - Iterations
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/APIEntitiesIteration"
        '404':
          description: Not Found
        '400':
          description: Bad Request
      parameters:
      - name: id
        required: true
        description: The ID or URL-encoded path of the project
        schema:
          oneOf:
          - type: string
          - type: integer
        in: path
        example: 5
      - name: state
        required: false
        description: Return "opened", "upcoming", "current (previously started)",
          "closed", or "all" iterations. Filtering by `started` state is deprecated
          starting with 14.1, please use `current` instead.
        schema:
          type: string
          enum:
          - opened
          - upcoming
          - started
          - current
          - closed
          - all
          default: all
          nullable: true
        in: query
        example: opened
      - name: search
        required: false
        description: The search criteria for the title of the iteration
        schema:
          type: string
          nullable: true
        in: query
        example: version
      - name: in
        required: false
        description: Fields in which fuzzy search should be performed with the query
          given in the argument `search`. The available options are `title` and `cadence_title`.
          Defaults to `[title]`
        schema:
          type: array
          items:
            type: string
          nullable: true
        in: query
        example:
        - title
        - cadence_title
      - name: include_ancestors
        required: false
        description: Include iterations from parent and its ancestors
        schema:
          type: boolean
          default: true
          nullable: true
        in: query
        example: false
      - name: include_descendants
        required: false
        description: Include iterations from parent and its descendants
        schema:
          type: boolean
          nullable: true
        in: query
        example: true
      - name: updated_before
        required: false
        description: 'Return milestones updated before the specified datetime. Format:
          ISO 8601 YYYY-MM-DDTHH:MM:SSZ'
        schema:
          type: string
          format: date-time
          nullable: true
        in: query
        example: '2023-02-28T21:22:12Z'
      - name: updated_after
        required: false
        description: 'Return milestones updated after the specified datetime. Format:
          ISO 8601 YYYY-MM-DDTHH:MM:SSZ'
        schema:
          type: string
          format: date-time
          nullable: true
        in: query
        example: '2023-02-28T21:22:12Z'
      - name: page
        required: false
        description: Current page number
        schema:
          type: integer
          default: 1
          nullable: true
        in: query
        example: 1
      - name: per_page
        required: false
        description: Number of items per page
        schema:
          type: integer
          default: 20
          nullable: true
        in: query
        example: 20
