  "/api/v4/token_exchange":
    post:
      operationId: postApiV4TokenExchange
      summary: Issue a short-lived JWT for a single modular-service audience
      description: Issues a short-lived RS256 JWT scoped to one modular-service audience
        (such as the Artifact Registry). Claims include the requesting user id (sub),
        organization id, and deployment realm (saas / self-managed). Presented to
        the corresponding backend and verified against the instance JWKS.
      tags:
      - Token exchange
      responses:
        '201':
          description: Created
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/RequestBody_cb5963407baa"
      x-gitlab-lifecycle: experiment
  "/api/v4/code_suggestions/completions":
    post:
      operationId: postApiV4CodeSuggestionsCompletions
      summary: Generate code completions
      description: Generates code completions. Uses the AI abstraction layer to generate
        code completions. Requests to this endpoint are proxied to the AI Gateway.
      responses:
        '200':
          description: OK
        '400':
          description: Bad Request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/RequestBody_5dd53f5e1063"
  "/api/v4/code_suggestions/direct_access":
    post:
      operationId: postApiV4CodeSuggestionsDirectAccess
      summary: Retrieve direct connection details for the AI Gateway
      description: Retrieves user-specific connection details which can be used by
        IDEs or clients to send `completion` requests to Code Suggestions directly
        through the AI Gateway.
      responses:
        '201':
          description: Created
        '401':
          description: Unauthorized
        '404':
          description: Not found
        '429':
          description: Too many requests
      requestBody:
        required: false
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/RequestBody_52d65d840547"
  "/api/v4/code_suggestions/enabled":
    post:
      operationId: postApiV4CodeSuggestionsEnabled
      summary: Validate status of Code Suggestions
      description: Validates the status Code Suggestions for a specified project.
        This checks if the project has `code_suggestions` enabled or if an ancestor
        group has the Code Suggestions add-on enabled.
      responses:
        '200':
          description: OK
        '401':
          description: Unauthorized
        '403':
          description: 403 Code Suggestions Disabled
        '404':
          description: Not found
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/RequestBody_2ba2971a1c28"
  "/api/v4/code_suggestions/connection_details":
