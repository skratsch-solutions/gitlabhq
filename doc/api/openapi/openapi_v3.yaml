  "/api/v4/groups/{id}/packages":
    get:
      operationId: getApiV4GroupsIdPackages
      summary: List packages within a group
      description: Get a list of project packages at the group level. This feature
        was introduced in GitLab 12.5
      tags:
      - Packages
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/APIEntitiesPackage"
        '401':
          description: Unauthorized
        '404':
          description: Group Not Found
      parameters:
      - name: id
        required: true
        description: ID or URL-encoded path of the group
        schema:
          oneOf:
          - type: string
          - type: integer
        in: path
      - name: exclude_subgroups
        required: false
        description: Determines if subgroups should be excluded
        schema:
          type: boolean
          nullable: true
        in: query
      - name: page
        required: false
        description: Current page number
        schema:
          type: integer
          default: 1
          nullable: true
        in: query
        example: 1
      - name: per_page
        required: false
        description: Number of items per page
        schema:
          type: integer
          default: 20
          nullable: true
        in: query
        example: 20
      - name: order_by
        required: false
        description: Return packages ordered by `created_at`, `name`, `version` or
          `type` fields.
        schema:
          type: string
          enum:
          - created_at
          - name
          - version
          - type
          - project_path
          default: created_at
          nullable: true
        in: query
      - name: sort
        required: false
        description: Return packages sorted in `asc` or `desc` order.
        schema:
          type: string
          enum:
          - asc
          - desc
          default: asc
          nullable: true
        in: query
      - name: package_type
        required: false
        description: Return packages of a certain type
        schema:
          type: string
          enum:
          - maven
          - npm
          - conan
          - nuget
          - pypi
          - composer
          - generic
          - golang
          - debian
          - rubygems
          - helm
          - terraform_module
          - rpm
          - ml_model
          - cargo
          nullable: true
        in: query
      - name: package_name
        required: false
        description: Return packages with this name
        schema:
          type: string
          nullable: true
        in: query
      - name: package_version
        required: false
        description: Return packages with this version
        schema:
          type: string
          nullable: true
        in: query
      - name: include_versionless
        required: false
        description: Returns packages without a version
        schema:
          type: boolean
          nullable: true
        in: query
      - name: status
        required: false
        description: Return packages with specified status
        schema:
          type: string
          enum:
          - default
          - hidden
          - processing
          - error
          - pending_destruction
          - deprecated
          nullable: true
        in: query
