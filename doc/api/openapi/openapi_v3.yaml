          format: date
          nullable: true
        in: query
        example: '2022-01-01'
      - name: expires_after
        required: false
        description: Filter tokens which expire after given datetime
        schema:
          type: string
          format: date
          nullable: true
        in: query
        example: '2021-01-01'
      - name: search
        required: false
        description: Filters tokens by name
        schema:
          type: string
          nullable: true
        in: query
        example: token
      - name: sort
        required: false
        description: Sort tokens
        schema:
          type: string
          nullable: true
        in: query
