          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/APIEntitiesPackagesDebianDistribution"
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
      parameters:
      - name: id
        required: true
        description: The ID or URL-encoded path of the group
        schema:
          oneOf:
          - type: string
          - type: integer
        in: path
      - name: page
        required: false
        description: Current page number
        schema:
          type: integer
          default: 1
          nullable: true
        in: query
        example: 1
      - name: per_page
        required: false
        description: Number of items per page
        schema:
          type: integer
          default: 20
          nullable: true
        in: query
        example: 20
      - name: codename
        required: false
        description: The Debian Codename
        schema:
          type: string
          pattern: "(?:^(?:[0-9A-Za-z\\u017F\\u212A][\\x2D.0-9A-Za-z\\u017F\\u212A]*)$)"
          nullable: true
        in: query
        example: sid
      - name: suite
        required: false
        description: The Debian Suite
        schema:
          type: string
          pattern: "(?:^(?:[0-9A-Za-z\\u017F\\u212A][\\x2D.0-9A-Za-z\\u017F\\u212A]*)$)"
          nullable: true
        in: query
        example: unstable
      - name: origin
        required: false
        description: The Debian Origin
        schema:
          type: string
          pattern: "(?:^(?:[0-9A-Za-z\\u017F\\u212A][\\x2D.0-9A-Za-z\\u017F\\u212A]*)$)"
          nullable: true
        in: query
        example: Grep
      - name: label
        required: false
        description: The Debian Label
        schema:
          type: string
          pattern: "(?:^(?:[0-9A-Za-z\\u017F\\u212A][\\x2D.0-9A-Za-z\\u017F\\u212A]*)$)"
          nullable: true
        in: query
        example: grep.be
      - name: version
        required: false
        description: The Debian Version
        schema:
          type: string
          pattern: "(?:^(?:(?:([0-9]{1,9}):)?([0-9][+.0-9A-Za-z~\\u017F\\u212A]*)(-[+.0-9A-Za-z~\\u017F\\u212A]+){0,14}(?<!-))$)"
          nullable: true
        in: query
        example: '12'
      - name: description
        required: false
        description: The Debian Description
        schema:
          type: string
          nullable: true
        in: query
        example: My description
      - name: valid_time_duration_seconds
        required: false
        description: The duration before the Release file should be considered expired
          by the client
        schema:
          type: integer
          nullable: true
        in: query
        example: 604800
      - name: components
        required: false
        description: The list of Components
        schema:
          type: array
          items:
            type: string
          nullable: true
        in: query
        example:
        - main
        style: form
        explode: false
