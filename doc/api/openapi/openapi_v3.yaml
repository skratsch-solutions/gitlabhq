          type: string
          description: The URL defined on the primary site that secondary site should
            use to contact it. Returns `url` if not set.
          nullable: true
        files_max_capacity:
          type: integer
          description: Control the maximum concurrency of LFS/attachment backfill
            for this secondary site. Defaults to 10.
          nullable: true
        repos_max_capacity:
          type: integer
          description: Control the maximum concurrency of repository backfill for
            this secondary site. Defaults to 25.
          nullable: true
