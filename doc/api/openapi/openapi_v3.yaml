          enum:
          - asc
          - desc
          default: desc
          nullable: true
        in: query
      - name: archived
        required: false
        description: Limit by archived status
        schema:
          type: boolean
          nullable: true
        in: query
      - name: visibility
        required: false
        description: Limit by visibility
        schema:
          type: string
          enum:
          - private
          - internal
          - public
          nullable: true
        in: query
      - name: search
        required: false
        description: Return list of projects matching the search criteria
        schema:
          type: string
          nullable: true
        in: query
      - name: search_namespaces
        required: false
        description: Include ancestor namespaces when matching search criteria
        schema:
          type: boolean
          nullable: true
        in: query
      - name: owned
        required: false
        description: Limit by owned by authenticated user
        schema:
          type: boolean
          nullable: true
        in: query
      - name: starred
        required: false
        description: Limit by starred status
        schema:
          type: boolean
          nullable: true
        in: query
      - name: imported
        required: false
        description: Limit by imported by authenticated user
        schema:
          type: boolean
          nullable: true
        in: query
      - name: membership
        required: false
        description: Limit by projects that the current user is a member of
        schema:
          type: boolean
          nullable: true
        in: query
      - name: with_issues_enabled
        required: false
        description: Limit by enabled issues feature
        schema:
          type: boolean
          nullable: true
        in: query
      - name: with_merge_requests_enabled
        required: false
        description: Limit by enabled merge requests feature
        schema:
          type: boolean
          nullable: true
        in: query
      - name: with_programming_language
        required: false
        description: Limit to repositories which use the given programming language
        schema:
          type: string
          nullable: true
        in: query
      - name: min_access_level
        required: false
        description: Limit by minimum access level of authenticated user
        schema:
          type: integer
          enum:
          - 10
          - 15
          - 20
          - 25
          - 30
          - 40
          - 50
          nullable: true
        in: query
      - name: id_after
        required: false
        description: Limit results to projects with IDs greater than the specified
          ID
        schema:
          type: integer
          nullable: true
        in: query
      - name: id_before
        required: false
        description: Limit results to projects with IDs less than the specified ID
        schema:
          type: integer
          nullable: true
        in: query
      - name: last_activity_after
        required: false
        description: 'Limit results to projects with last_activity after specified
          time. Format: ISO 8601 YYYY-MM-DDTHH:MM:SSZ'
        schema:
          type: string
          format: date-time
          nullable: true
        in: query
      - name: last_activity_before
        required: false
        description: 'Limit results to projects with last_activity before specified
          time. Format: ISO 8601 YYYY-MM-DDTHH:MM:SSZ'
        schema:
          type: string
          format: date-time
          nullable: true
        in: query
      - name: repository_storage
        required: false
        description: Which storage shard the repository is on. Available only to admins
        schema:
          type: string
          nullable: true
        in: query
      - name: topic
        required: false
        description: Comma-separated list of topics. Limit results to projects having
          all topics
        schema:
          type: array
          items:
            type: string
          nullable: true
        in: query
        style: form
        explode: false
      - name: topic_id
        required: false
        description: Limit results to projects with the assigned topic given by the
          topic ID
        schema:
          type: integer
          nullable: true
        in: query
      - name: updated_before
        required: false
        description: 'Return projects updated before the specified datetime. Format:
          ISO 8601 YYYY-MM-DDTHH:MM:SSZ'
        schema:
          type: string
          format: date-time
          nullable: true
        in: query
      - name: updated_after
        required: false
        description: 'Return projects updated after the specified datetime. Format:
          ISO 8601 YYYY-MM-DDTHH:MM:SSZ'
        schema:
          type: string
          format: date-time
          nullable: true
        in: query
      - name: include_pending_delete
        required: false
        description: Include projects in pending delete state. Can only be set by
          admins
        schema:
          type: boolean
          nullable: true
        in: query
      - name: marked_for_deletion_on
        required: false
        description: Date when the project was marked for deletion
        schema:
          type: string
          format: date
          nullable: true
        in: query
      - name: active
        required: false
        description: Limit by projects that are not archived and not marked for deletion
        schema:
          type: boolean
          nullable: true
        in: query
      - name: wiki_checksum_failed
        required: false
        description: Limit by projects where wiki checksum is failed
        schema:
          type: boolean
          nullable: true
        in: query
      - name: repository_checksum_failed
        required: false
        description: Limit by projects where repository checksum is failed
        schema:
          type: boolean
          nullable: true
        in: query
      - name: include_hidden
        required: false
        description: Include hidden projects. Can only be set by admins
        schema:
          type: boolean
          nullable: true
        in: query
      - name: page
        required: false
        description: Current page number
        schema:
          type: integer
          default: 1
          nullable: true
        in: query
        example: 1
      - name: per_page
        required: false
        description: Number of items per page
        schema:
          type: integer
          default: 20
          nullable: true
        in: query
        example: 20
