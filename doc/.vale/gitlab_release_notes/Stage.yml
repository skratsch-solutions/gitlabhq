---
name: gitlab_release_notes.Stage
description: Ensures feature release notes define a `stage`.
message: "The `stage` metadata is required and must name the stage that created the feature (for example, `application_security_testing`)."
link: https://docs.gitlab.com/development/documentation/release_notes/#feature-release-note-metadata
level: error
extends: script
scope: raw
script: |
  text := import("text")
  matches := []

  if text.re_match("^---\\n", scope) {
    fmEnd := text.index(scope, "\n---")
    if fmEnd > 0 {
      fm := scope[0:fmEnd]
      if !text.re_match("(?m)^stage:[ \\t]*[^ \\t\\n]", fm) {
        matches = append(matches, {begin: 0, end: 3})
      }
    }
  }
