---
name: gitlab_release_notes.Level
description: Ensures the optional `level` metadata is either `primary` or `secondary`.
message: "The `level` metadata must be either `primary` or `secondary`. If undefined, defaults to `secondary`."
link: https://docs.gitlab.com/development/documentation/release_notes/#feature-release-note-metadata
level: error
extends: script
scope: raw
script: |
  text := import("text")
  matches := []

  if text.re_match("^---\\n", scope) {
    fmEnd := text.index(scope, "\n---")
    if fmEnd > 0 {
      fm := scope[0:fmEnd]
      m := text.re_find("(?m)^level:[ \\t]*(.*)$", fm, 1)
      if !is_undefined(m) {
        cap := m[0][1]
        span := {begin: cap.begin, end: cap.begin + len(cap.text)}
        v := text.trim_space(text.re_replace("[\"']", cap.text, ""))
        if v != "primary" && v != "secondary" {
          matches = append(matches, span)
        }
      }
    }
  }
