          type: string
          enum:
          - created-by-me
          - assigned-to-me
          - created_by_me
          - assigned_to_me
          - reviews_for_me
          - all
          nullable: true
        in: query
      - name: source_branch
        required: false
        description: 指定されたソースブランチを持つマージリクエストを返します。
        schema:
          type: string
          nullable: true
        in: query
      - name: source_project_id
        required: false
        description: 指定されたソースプロジェクトIDを持つマージリクエストを返します。
        schema:
          type: integer
          nullable: true
        in: query
      - name: target_branch
        required: false
        description: 指定されたターゲットブランチを持つマージリクエストを返します。
        schema:
          type: string
          nullable: true
        in: query
      - name: search
        required: false
        description: "`title`と`description`でマージリクエストを検索します。"
        schema:
          type: string
          nullable: true
        in: query
      - name: in
        required: false
        description: 検索属性のスコープを変更します。`title`、`description`、またはこれらをカンマで結合した文字列です。
        schema:
          type: string
          nullable: true
        in: query
        example: title,description
      - name: wip
        required: false
        description: 非推奨。代わりに`draft`を使用してください。`wip`のステータスでマージリクエストをフィルタリングします。`yes`はドラフトのマージリクエストのみを返し、`no`はドラフト以外のマージリクエストを返します。
        schema:
          type: string
          enum:
          - 'yes'
          - 'no'
          nullable: true
        in: query
      - name: draft
        required: false
        description: "`draft`のステータスでマージリクエストをフィルタリングします。`true`はドラフトのマージリクエストのみを返し、`false`はドラフト以外のマージリクエストを返します。"
        schema:
          type: boolean
          nullable: true
        in: query
      - name: not
