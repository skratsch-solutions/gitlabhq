          nullable: true
        in: query
      - name: deployed_before
        required: false
        description: 指定された日時より前にデプロイされたマージリクエストを返します。ISO 8601形式が想定されます。
        schema:
          type: string
          nullable: true
        in: query
        example: '2019-03-15T08:00:00Z'
      - name: deployed_after
        required: false
