      summary: 2つのブランチ、タグ、またはコミットを比較する
      tags:
      - Repositories
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/APIEntitiesCompare"
        '404':
          description: 見つかりません
        '400':
          description: 不正なリクエスト
      parameters:
      - name: id
        required: true
        description: プロジェクトのIDまたはURLエンコードされたパス
        schema:
          oneOf:
          - type: string
          - type: integer
        in: path
        example: 1
      - name: from
        required: true
        description: 比較を開始するコミット、ブランチ名、またはタグ名
        schema:
          type: string
          nullable: true
        in: query
        example: main
      - name: to
        required: true
        description: 比較を停止するコミット、ブランチ名、またはタグ名
        schema:
          type: string
          nullable: true
        in: query
        example: feature
      - name: from_project_id
        required: false
        description: 比較するプロジェクト
        schema:
          type: integer
          nullable: true
        in: query
        example: 1
      - name: straight
        required: false
        description: 比較方法。`true`は`from`と`to`（`from`..`to`）の直接比較、`false`はマージベース（`from`...`to`）を使用した比較です
        schema:
          type: boolean
          nullable: true
        in: query
