          format: date
          nullable: true
        in: query
        example: '2022-01-01'
      - name: expires_after
        required: false
        description: 指定された日時より後に有効期限が切れるトークンをフィルタリング
        schema:
          type: string
          format: date
          nullable: true
        in: query
        example: '2021-01-01'
      - name: search
        required: false
        description: 名前でトークンをフィルタリング
        schema:
