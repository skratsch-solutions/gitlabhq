        description: カンマ区切りのラベルのリストに一致するマージリクエストを返します。`None`は、ラベルのないすべてのマージリクエストをリストします。`Any`は、少なくとも1つのラベルを持つすべてのマージリクエストをリストします。定義済みの名前では大文字と小文字が区別されません。
        schema:
          type: array
          items:
            type: string
          nullable: true
        in: query
        style: form
        explode: false
      - name: milestone
        required: false
        description: 特定のマイルストーンに対するマージリクエストを返します。`None`は、マイルストーンのないマージリクエストをリストします。`Any`は、割り当てられたマイルストーンを持つマージリクエストをリストします。
        schema:
          type: string
          nullable: true
        in: query
      - name: my_reaction_emoji
        required: false
        description: 認証されたユーザーが、指定された`emoji`でリアクションしたマージリクエストを返します。`None`は、リアクションがないマージリクエストを返します。`Any`は、1つ以上のリアクションがあるマージリクエストを返します。
        schema:
          type: string
          nullable: true
        in: query
      - name: reviewer_id
        required: false
        description: 指定されたユーザー`id`をレビュアーとして持つマージリクエストを返します。`None`はレビュアーがいないマージリクエストを返します。`Any`は任意のレビュアーがいるマージリクエストを返します。`reviewer_username`と相互に排他的です。
        schema:
          oneOf:
          - type: integer
            nullable: true
          - type: string
            nullable: true
        in: query
      - name: state
        required: false
        description: "`all`マージリクエストを返すか、`opened`、`closed`、`locked`、または`merged`のマージリクエストのみを返します。"
        schema:
          type: string
          enum:
          - opened
          - closed
          - locked
          - merged
          - all
          default: all
          nullable: true
        in: query
      - name: order_by
        required: false
        description: "`created_at`、`label_priority`、`milestone_due`、`popularity`、`priority`、`title`、`updated_at`または`merged_at`フィールドで並べ替えられたマージリクエストを返します。GitLab 14.8で導入されました。"
        schema:
          type: string
          enum:
          - created_at
          - label_priority
          - milestone_due
          - popularity
          - priority
          - title
          - updated_at
          - merged_at
          default: created_at
          nullable: true
        in: query
      - name: sort
        required: false
        description: "`asc`または`desc`の順にソートされたマージリクエストを返します。"
        schema:
          type: string
          enum:
          - asc
          - desc
          default: desc
          nullable: true
        in: query
      - name: with_labels_details
        required: false
        description: '`true`の場合、応答はラベルフィールドの各ラベルについて、`:name`、`:color`、`:description`、`:description_html`、`:text_color`の詳細を返します。'
        schema:
          type: boolean
          nullable: true
        in: query
      - name: with_merge_status_recheck
        required: false
        description: "`true`の場合、この予測は`merge_status`フィールドが非同期で再計算されることを要求します（ただし保証しません）。GitLab 13.0で導入されました。"
        schema:
          type: boolean
          nullable: true
        in: query
      - name: created_after
        required: false
        description: 指定された時刻以降に作成されたマージリクエストを返します。ISO 8601形式が想定されます。
        schema:
          type: string
          format: date-time
          nullable: true
        in: query
        example: '2019-03-15T08:00:00Z'
      - name: created_before
        required: false
        description: 指定された時刻以前に作成されたマージリクエストを返します。ISO 8601形式が想定されます。
        schema:
          type: string
          format: date-time
          nullable: true
        in: query
        example: '2019-03-15T08:00:00Z'
      - name: updated_after
        required: false
        description: 指定された時刻以降に更新されたマージリクエストを返します。ISO 8601形式が想定されます。
        schema:
          type: string
          format: date-time
          nullable: true
        in: query
        example: '2019-03-15T08:00:00Z'
      - name: updated_before
        required: false
        description: 指定された時刻以前に更新されたマージリクエストを返します。ISO 8601形式が想定されます。
        schema:
          type: string
          format: date-time
          nullable: true
        in: query
        example: '2019-03-15T08:00:00Z'
      - name: view
        required: false
        description: シンプルな場合、`iid`、URL、タイトル、説明、およびマージリクエストの基本ステータスを返します。
        schema:
          type: string
          enum:
          - simple
          nullable: true
        in: query
      - name: scope
        required: false
