        required: false
        description: 現在のページ番号
        schema:
          type: integer
          default: 1
          nullable: true
        in: query
        example: 1
      - name: per_page
        required: false
        description: ページあたりのアイテム数
        schema:
          type: integer
          default: 20
          nullable: true
        in: query
        example: 20
