  "/api/v4/projects/{id}/iterations":
    get:
      operationId: getApiV4ProjectsIdIterations
      summary: すべてのプロジェクトイテレーションを一覧表示
      description: 指定されたプロジェクトのすべてのイテレーションを一覧表示します。イテレーションケイデンスで**自動スケジュールを有効にする**によって作成されたイテレーションは、`title`および`description`フィールドに対して`null`を返します。この機能はGitLab 13.5で導入されました。
      tags:
      - Iterations
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/APIEntitiesIteration"
        '404':
          description: 見つかりません
        '400':
          description: 不正なリクエスト
      parameters:
      - name: id
        required: true
        description: プロジェクトのIDまたはURLエンコードされたパス
        schema:
          oneOf:
          - type: string
          - type: integer
        in: path
        example: 5
      - name: state
        required: false
        description: "\"opened\"、\"upcoming\"、\"current (previously started)\"、\"closed\"、または\"all\"のイテレーションを返します。`started`ステータスによるフィルタリングは14.1以降非推奨になりました。`current`を代わりに使用してください。"
        schema:
          type: string
          enum:
          - opened
          - upcoming
          - started
          - current
          - closed
          - all
          default: all
          nullable: true
        in: query
        example: opened
      - name: search
        required: false
        description: イテレーションのタイトルの検索条件
        schema:
          type: string
          nullable: true
        in: query
        example: version
      - name: in
        required: false
        description: "`search`引数で指定されたクエリを使用してファジー検索を実行する必要があるフィールド。利用可能なオプションは`title`と`cadence_title`です。デフォルトは`[title]`です。"
        schema:
          type: array
          items:
            type: string
          nullable: true
        in: query
        example:
        - title
        - cadence_title
      - name: include_ancestors
        required: false
        description: 親とその祖先のイテレーションを含める
        schema:
          type: boolean
          default: true
          nullable: true
        in: query
        example: false
      - name: include_descendants
        required: false
        description: 親とその子孫のイテレーションを含める
        schema:
          type: boolean
          nullable: true
        in: query
        example: true
      - name: updated_before
        required: false
        description: '指定された日時より前に更新されたマイルストーンを返します。形式は、ISO 8601 YYYY-MM-DDTHH:MM:SSZ'
        schema:
          type: string
          format: date-time
          nullable: true
        in: query
        example: '2023-02-28T21:22:12Z'
      - name: updated_after
        required: false
        description: '指定された日時より後に更新されたマイルストーンを返します。形式は、ISO 8601 YYYY-MM-DDTHH:MM:SSZ'
        schema:
          type: string
          format: date-time
          nullable: true
        in: query
        example: '2023-02-28T21:22:12Z'
      - name: page
        required: false
        description: 現在のページ番号
        schema:
          type: integer
          default: 1
          nullable: true
        in: query
        example: 1
      - name: per_page
        required: false
        description: ページあたりのアイテム数
        schema:
          type: integer
          default: 20
          nullable: true
        in: query
        example: 20
