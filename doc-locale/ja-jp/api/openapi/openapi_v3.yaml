  "/api/v4/projects/{id}/repository/changelog":
    get:
      operationId: getApiV4ProjectsIdRepositoryChangelog
      summary: リリースの変更履歴セクションを生成し、それを返します
      description: この機能はGitLab 14.6で導入されました
      tags:
      - Repositories
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/APIEntitiesChangelog"
        '404':
          description: 見つかりません
        '400':
          description: 不正なリクエスト
      parameters:
      - name: id
        required: true
        description: プロジェクトのIDまたはURLエンコードされたパス
        schema:
          oneOf:
          - type: string
          - type: integer
        in: path
        example: 1
      - name: version
        required: true
        description: セマンティックバージョニング形式を使用した、リリースのバージョン
        schema:
          type: string
          pattern: "(?:(?:(0|[1-9]\\d*))\\.(?:(0|[1-9]\\d*))\\.(?:(0|[1-9]\\d*)))(?:(?:-((?:\\d*[a-zA-Z\\-][0-9a-zA-Z\\-]*|[1-9]\\d*|0)(?:\\.(?:\\d*[a-zA-Z\\-][0-9a-zA-Z\\-]*|[1-9]\\d*|0))*))?(?:\\+([0-9a-zA-Z\\-]+(?:\\.[0-9a-zA-Z\\-]+)*))?)"
          nullable: true
        in: query
        example: 1.0.0
      - name: from
        required: false
        description: 変更履歴に使用するコミット範囲の最初のコミット
        schema:
          type: string
          nullable: true
        in: query
        example: ed899a2f4b50b4370feeea94676502b42383c746
      - name: to
        required: false
        description: 変更履歴に使用するコミット範囲の最後のコミット
        schema:
          type: string
          nullable: true
        in: query
        example: 6104942438c14ec7bd21c6cd5bd995272b3faff6
      - name: date
        required: false
        description: リリースの日付と時刻
        schema:
          type: string
          format: date-time
          nullable: true
        in: query
        example: '2021-09-20T11:50:22.001+00:00'
      - name: trailer
        required: false
        description: コミットを変更履歴に含めるかどうかを決定するために使用するGitトレーラー
        schema:
          type: string
          default: Changelog
          nullable: true
        in: query
        example: Changelog
      - name: config_file
        required: false
        description: "プロジェクトのGitリポジトリに保存されている設定ファイルへのファイルパス。.gitlab/changelog_config.yml'にデフォルト設定されています"
        schema:
          type: string
          nullable: true
        in: query
        example: ".gitlab/changelog_config.yml"
      - name: config_file_ref
        required: false
        description: "変更履歴の設定ファイルが定義されているGit参照（例: ブランチ）。デフォルトでは、リポジトリのブランチが使用されます。"
        schema:
          type: string
          nullable: true
        in: query
        example: main
    post:
      operationId: postApiV4ProjectsIdRepositoryChangelog
      summary: リリースの変更履歴セクションを生成し、それを変更履歴ファイルにコミットします
      description: この機能はGitLab 13.9で導入されました
      tags:
      - Repositories
      responses:
        '200':
          description: OK
        '404':
          description: 見つかりません
        '400':
          description: 不正なリクエスト
      parameters:
      - name: id
        required: true
        description: プロジェクトのIDまたはURLエンコードされたパス
        schema:
          oneOf:
          - type: string
          - type: integer
        in: path
        example: 1
      requestBody:
        required: false
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/RequestBody_ae26a1e02190"
