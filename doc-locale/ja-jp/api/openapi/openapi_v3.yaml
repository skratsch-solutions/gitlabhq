        description: "`all`マージリクエストを返すか、`opened`、`closed`、`locked`、または`merged`のマージリクエストのみを返します。"
        schema:
          type: string
          enum:
          - opened
          - closed
          - locked
          - merged
          - all
          default: all
          nullable: true
        in: query
      - name: order_by
        required: false
        description: "`created_at`、`label_priority`、`milestone_due`、`popularity`、`priority`、`title`、`updated_at`または`merged_at`フィールドで並べ替えられたマージリクエストを返します。GitLab 14.8で導入されました。"
        schema:
          type: string
          enum:
          - created_at
          - label_priority
          - milestone_due
          - popularity
          - priority
          - title
          - updated_at
          - merged_at
          default: created_at
          nullable: true
        in: query
      - name: sort
        required: false
        description: "`asc`または`desc`の順にソートされたマージリクエストを返します。"
        schema:
          type: string
          enum:
          - asc
          - desc
          default: desc
          nullable: true
        in: query
      - name: with_labels_details
        required: false
        description: '`true`の場合、応答はラベルフィールドの各ラベルについて、`:name`、`:color`、`:description`、`:description_html`、`:text_color`の詳細を返します。'
        schema:
          type: boolean
          nullable: true
        in: query
      - name: with_merge_status_recheck
        required: false
        description: "`true`の場合、この予測は`merge_status`フィールドが非同期で再計算されることを要求します（ただし保証しません）。GitLab 13.0で導入されました。"
        schema:
          type: boolean
          nullable: true
        in: query
      - name: created_after
        required: false
        description: 指定された時刻以降に作成されたマージリクエストを返します。ISO 8601形式が想定されます。
        schema:
          type: string
          format: date-time
          nullable: true
        in: query
        example: '2019-03-15T08:00:00Z'
      - name: created_before
        required: false
        description: 指定された時刻以前に作成されたマージリクエストを返します。ISO 8601形式が想定されます。
        schema:
          type: string
          format: date-time
          nullable: true
        in: query
        example: '2019-03-15T08:00:00Z'
      - name: updated_after
        required: false
        description: 指定された時刻以降に更新されたマージリクエストを返します。ISO 8601形式が想定されます。
        schema:
          type: string
          format: date-time
          nullable: true
        in: query
        example: '2019-03-15T08:00:00Z'
      - name: updated_before
        required: false
        description: 指定された時刻以前に更新されたマージリクエストを返します。ISO 8601形式が想定されます。
        schema:
          type: string
          format: date-time
          nullable: true
        in: query
        example: '2019-03-15T08:00:00Z'
      - name: view
        required: false
        description: シンプルな場合、`iid`、URL、タイトル、説明、およびマージリクエストの基本ステータスを返します。
        schema:
          type: string
          enum:
          - simple
          nullable: true
        in: query
      - name: scope
        required: false
        description: '指定されたスコープのマージリクエストを返します: `created_by_me`、`assigned_to_me`、`reviews_for_me`または`all`'
        schema:
          type: string
          enum:
          - created-by-me
          - assigned-to-me
          - created_by_me
          - assigned_to_me
          - reviews_for_me
          - all
          nullable: true
        in: query
      - name: source_branch
        required: false
        description: 指定されたソースブランチを持つマージリクエストを返します。
        schema:
          type: string
          nullable: true
        in: query
      - name: source_project_id
        required: false
        description: 指定されたソースプロジェクトIDを持つマージリクエストを返します。
        schema:
          type: integer
          nullable: true
        in: query
      - name: target_branch
        required: false
        description: 指定されたターゲットブランチを持つマージリクエストを返します。
        schema:
          type: string
          nullable: true
        in: query
      - name: search
        required: false
        description: "`title`と`description`でマージリクエストを検索します。"
        schema:
          type: string
          nullable: true
        in: query
      - name: in
        required: false
        description: 検索属性のスコープを変更します。`title`、`description`、またはこれらをカンマで結合した文字列です。
        schema:
          type: string
          nullable: true
        in: query
        example: title,description
      - name: wip
        required: false
        description: 非推奨。代わりに`draft`を使用してください。`wip`のステータスでマージリクエストをフィルタリングします。`yes`はドラフトのマージリクエストのみを返し、`no`はドラフト以外のマージリクエストを返します。
        schema:
          type: string
          enum:
          - 'yes'
          - 'no'
          nullable: true
        in: query
      - name: draft
        required: false
        description: "`draft`のステータスでマージリクエストをフィルタリングします。`true`はドラフトのマージリクエストのみを返し、`false`はドラフト以外のマージリクエストを返します。"
        schema:
          type: boolean
          nullable: true
        in: query
      - name: not
        required: false
        description: 提供されたパラメータと一致しないマージリクエストを返します
        schema:
          type: object
          nullable: true
        in: query
      - name: not[author_id]
        required: false
        description: "`<Negated>`指定されたユーザー`id`によって作成されたマージリクエストを返します。`author_username`と相互に排他的です。`scope=all`または`scope=assigned_to_me`と組み合わせて指定します。"
        schema:
          type: integer
          nullable: true
        in: query
      - name: not[author_username]
        required: false
        description: "`<Negated>`指定された`username`によって作成されたマージリクエストを返します。`author_id`と相互に排他的です。"
        schema:
          type: string
          nullable: true
        in: query
      - name: not[assignee_id]
        required: false
        description: "`<Negated>`指定されたユーザー`id`に割り当てられたマージリクエストを返します。`None`は未割り当てのマージリクエストを返します。`Any`はアサイニーを持つマージリクエストを返します。"
        schema:
          oneOf:
          - type: integer
            nullable: true
          - type: string
            nullable: true
        in: query
      - name: not[assignee_username]
        required: false
        description: "`<Negated>`指定された`username`によって作成されたマージリクエストを返します。`author_id`と相互に排他的です。"
        schema:
          type: array
          items:
            type: string
          nullable: true
        in: query
      - name: not[reviewer_username]
        required: false
        description: "`<Negated>`指定された`username`のレビュアーとしてユーザーを持つマージリクエストを返します。`None`はレビュアーがいないマージリクエストを返します。`Any`は任意のレビュアーがいるマージリクエストを返します。`reviewer_id`と相互に排他的です。GitLab 13.8で導入されました。"
        schema:
          type: string
          nullable: true
        in: query
      - name: not[labels]
        required: false
        description: "`<Negated>`カンマ区切りのラベルリストと一致するマージリクエストを返します。`None`はラベルがないすべてのマージリクエストをリスト表示します。`Any`は少なくとも1つのラベルがあるすべてのマージリクエストをリスト表示します。定義済みの名前では大文字と小文字が区別されません。"
        schema:
          type: array
          items:
            type: string
          nullable: true
        in: query
      - name: not[milestone]
        required: false
        description: "`<Negated>`特定のマイルストーンのマージリクエストを返します。`None`はマイルストーンがないマージリクエストを返します。`Any`はマイルストーンが割り当てられたマージリクエストを返します。"
        schema:
          type: string
          nullable: true
        in: query
