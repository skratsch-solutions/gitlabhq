        schema:
          oneOf:
          - type: integer
            nullable: true
          - type: string
            nullable: true
        in: query
      - name: not[assignee_username]
        required: false
        description: "`<Negated>`指定された`username`によって作成されたマージリクエストを返します。`author_id`と相互に排他的です。"
