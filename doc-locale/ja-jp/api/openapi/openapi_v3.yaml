          format: date-time
          nullable: true
        in: query
        example: '2016-01-19T09:05:50.355Z'
      - name: created_before
        required: false
        description: 指定された時間より前に作成された監査イベントを返します
        schema:
          type: string
          format: date-time
          nullable: true
        in: query
        example: '2016-01-19T09:05:50.355Z'
