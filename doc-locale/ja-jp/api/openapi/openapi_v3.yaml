  "/api/v4/projects/{id}/(-/)search/semantic":
    get:
      operationId: getApiV4ProjectsIdDashSearchSemantic
      summary: プロジェクトコードを自然言語を使用して検索
      description: |
        GitLab 18.11で導入されました。
        
        キーワードマッチングではなく、セマンティック（意味ベース）な類似性を使用して、インデックス化されたプロジェクトコードを検索します。正確なシンボル名やファイル名が不明な場合、または動作がコードベース全体でどのように実装されているかを発見する場合に使用します。
        
        主なユースケース:
        - 正確なシンボルまたはファイルパスが不明な場合
        - 動作または機能がコードベース全体でどのように実装されているかを確認する場合
        - 関連する実装（クライアント、ジョブ、ワーカー）を発見する場合
        
        使用方法:
        - 簡潔で具体的なクエリを具体的なキーワードで提供
        - ディレクトリ_パスを使用してスコープを絞り込みます（例: 「app/services/」）。
        - 広範な用語よりも正確な意図を優先
        
        結果はファイルごとにグループ化されます。各ファイルには、コンテンツと関連性スコア（0.0-1.0）を含むマージされた行範囲が含まれます。応答には、スコア分布に基づいた全体的な信頼レベル（高/中/低/不明）が含まれます。結果はDuoコンテキスト除外設定によってフィルタリングされます。
        
        セマンティックコード検索がプロジェクトネームスペースに対して有効化され、インデックス化されている必要があります。
      tags:
      - Search
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/APIEntitiesAiSemanticCodeResponse"
        '401':
          description: 認証されていません
        '403':
          description: 禁止されています
        '404':
          description: 見つかりません - プロジェクトが見つからないか、セマンティックコード検索が利用できません
        '422':
          description: 処理できないエンティティ - プロジェクトに埋め込みがありません
        '429':
          description: リクエストが多すぎます
      parameters:
      - name: id
        required: true
        description: プロジェクトのIDまたはURLエンコードされたパス
        schema:
          oneOf:
          - type: string
          - type: integer
        in: path
      - name: q
        required: true
        description: "自然言語検索クエリ（例: 「authentication middleware」、「rate limiting logic」）"
        schema:
          type: string
          nullable: true
          maxLength: 1000
        in: query
      - name: directory_path
        required: false
        description: "このディレクトリ_パス以下のファイルに検索を制限します（例: 「app/services/」）。相対パスである必要があります — 先頭のスラッシュや「..」セグメントは含めません。"
        schema:
          type: string
          nullable: true
          maxLength: 100
        in: query
      - name: knn
        required: false
        description: '内部的に取得する最近傍の数（デフォルト: 64）。値が大きいほど、レイテンシーを犠牲にしてリコールが向上します。'
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 64
          nullable: true
        in: query
      - name: limit
        required: false
        description: '返す結果の最大数（デフォルト: 20）。'
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
          nullable: true
        in: query
      x-gitlab-lifecycle: beta
