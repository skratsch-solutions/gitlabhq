        required: false
        description: 特定のタイプのパッケージを返します
        schema:
          type: string
          enum:
          - maven
          - npm
          - conan
          - nuget
          - pypi
          - composer
          - generic
          - golang
          - debian
          - rubygems
          - helm
          - terraform_module
          - rpm
          - ml_model
          - cargo
          nullable: true
        in: query
      - name: package_name
        required: false
        description: この名前のパッケージを返します
        schema:
          type: string
          nullable: true
        in: query
      - name: package_version
        required: false
        description: このバージョンのパッケージを返します
        schema:
          type: string
          nullable: true
        in: query
      - name: include_versionless
        required: false
        description: バージョンのないパッケージを返します
        schema:
          type: boolean
          nullable: true
        in: query
      - name: status
        required: false
        description: 指定されたステータスのパッケージを返します
        schema:
          type: string
          enum:
          - default
          - hidden
          - processing
          - error
          - pending_destruction
          - deprecated
          nullable: true
        in: query
