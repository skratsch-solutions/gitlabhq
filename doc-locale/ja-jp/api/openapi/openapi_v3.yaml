          type: object
          nullable: true
        in: query
      - name: not[author_id]
        required: false
        description: "`<Negated>`指定されたユーザー`id`によって作成されたマージリクエストを返します。`author_username`と相互に排他的です。`scope=all`または`scope=assigned_to_me`と組み合わせて指定します。"
        schema:
          type: integer
          nullable: true
        in: query
      - name: not[author_username]
        required: false
        description: "`<Negated>`指定された`username`によって作成されたマージリクエストを返します。`author_id`と相互に排他的です。"
        schema:
          type: string
          nullable: true
        in: query
      - name: not[assignee_id]
        required: false
        description: "`<Negated>`指定されたユーザー`id`に割り当てられたマージリクエストを返します。`None`は未割り当てのマージリクエストを返します。`Any`はアサイニーを持つマージリクエストを返します。"
        schema:
          oneOf:
          - type: integer
            nullable: true
          - type: string
            nullable: true
        in: query
      - name: not[assignee_username]
        required: false
        description: "`<Negated>`指定された`username`によって作成されたマージリクエストを返します。`author_id`と相互に排他的です。"
        schema:
          type: array
          items:
            type: string
          nullable: true
        in: query
      - name: not[reviewer_username]
        required: false
        description: "`<Negated>`指定された`username`のレビュアーとしてユーザーを持つマージリクエストを返します。`None`はレビュアーがいないマージリクエストを返します。`Any`は任意のレビュアーがいるマージリクエストを返します。`reviewer_id`と相互に排他的です。GitLab 13.8で導入されました。"
        schema:
          type: string
          nullable: true
        in: query
      - name: not[labels]
        required: false
        description: "`<Negated>`カンマ区切りのラベルリストと一致するマージリクエストを返します。`None`はラベルがないすべてのマージリクエストをリスト表示します。`Any`は少なくとも1つのラベルがあるすべてのマージリクエストをリスト表示します。定義済みの名前では大文字と小文字が区別されません。"
        schema:
          type: array
          items:
            type: string
          nullable: true
        in: query
      - name: not[milestone]
        required: false
        description: "`<Negated>`特定のマイルストーンのマージリクエストを返します。`None`はマイルストーンがないマージリクエストを返します。`Any`はマイルストーンが割り当てられたマージリクエストを返します。"
        schema:
          type: string
          nullable: true
        in: query
      - name: not[my_reaction_emoji]
        required: false
        description: "`<Negated>`指定された`emoji`によって認証済みユーザーがリアクションしたマージリクエストを返します。`None`はリアクションがないイシューを返します。`Any`は少なくとも1つのリアクションがあるイシューを返します。"
        schema:
          type: string
          nullable: true
        in: query
      - name: not[reviewer_id]
        required: false
        description: "`<Negated>`指定されたユーザー`id`をレビュアーとして持つマージリクエストを返します。`None`はレビュアーがいないマージリクエストを返します。`Any`は任意のレビュアーがいるマージリクエストを返します。`reviewer_username`と相互に排他的です。"
        schema:
          type: integer
          nullable: true
        in: query
      - name: deployed_before
        required: false
        description: 指定された日時より前にデプロイされたマージリクエストを返します。ISO 8601形式が想定されます。
        schema:
          type: string
          nullable: true
        in: query
        example: '2019-03-15T08:00:00Z'
      - name: deployed_after
        required: false
        description: 指定された日時より後にデプロイされたマージリクエストを返します。ISO 8601形式が想定されます
        schema:
          type: string
          nullable: true
        in: query
        example: '2019-03-15T08:00:00Z'
      - name: environment
        required: false
        description: 指定された環境にデプロイされたマージリクエストを返します
        schema:
          type: string
          nullable: true
        in: query
        example: '2019-03-15T08:00:00Z'
      - name: merge_user_id
        required: false
        description: 指定されたユーザー`id`によってマージされたマージリクエストを返します。`merge_user_username`と相互に排他的です。
        schema:
          type: integer
          nullable: true
        in: query
      - name: merge_user_username
        required: false
        description: 指定された`username`によってマージされたマージリクエストを返します。`merge_user_id`と相互に排他的です。
        schema:
          type: string
          nullable: true
        in: query
