  "/api/v4/search":
    get:
      operationId: getApiV4Search
      summary: インスタンスを検索する
      description: GitLabインスタンス全体で用語を検索します。応答は、リクエストされたスコープによって異なります。
      tags:
      - Search
      responses:
        '200':
          description: OK
        '400':
          description: 不正なリクエスト
      parameters:
      - name: search
        required: true
        description: 検索する式
        schema:
          type: string
          nullable: true
        in: query
      - name: scope
        required: true
        description: 検索のスコープ
        schema:
          type: string
          enum:
          - wiki_blobs
          - blobs
          - commits
          - notes
          - projects
          - issues
          - work_items
          - merge_requests
          - milestones
          - snippet_titles
          - users
          minLength: 1
        in: query
      - name: state
        required: false
        description: ステートで結果をフィルタリングする
        schema:
          type: string
          enum:
          - all
          - opened
          - closed
          - merged
          nullable: true
        in: query
      - name: confidential
        required: false
        description: 機密性で結果をフィルタリングする
        schema:
          type: boolean
          nullable: true
        in: query
      - name: type
        required: false
        description: '作業アイテムをタイプでフィルタリングします。work_itemsスコープにのみ適用されます。利用可能なタイプ: イシュー、タスク、エピック、インシデント、テストケース、要件、目標、主な成果、チケット。'
        schema:
          type: array
          items:
            type: string
          nullable: true
        in: query
        style: form
        explode: false
      - name: include_archived
        required: false
        description: アーカイブされたプロジェクトを検索に含めます。GitLab 18.9で導入されました。
        schema:
          type: boolean
          nullable: true
        in: query
      - name: fields
        required: false
        description: 検索したいフィールドの配列。高度な検索で利用可能。
        schema:
          type: array
          items:
            type: string
          nullable: true
        in: query
        style: form
        explode: false
      - name: exclude_forks
        required: false
        description: フォークしたプロジェクトを検索から除外します。完全一致コードの検索で利用可能。GitLab 18.9で導入されました。
        schema:
          type: boolean
          nullable: true
        in: query
      - name: num_context_lines
        required: false
        description: 各一致周辺のコンテキスト行数。高度な検索および完全一致コードの検索で利用可能。GitLab 18.11で導入されました。
        schema:
          type: integer
          minimum: 0
          maximum: 20
          nullable: true
        in: query
      - name: regex
        required: false
        description: 正規表現codeコード検索を実行します。完全一致コードの検索で利用可能。GitLab 18.9で導入されました。
        schema:
          type: boolean
          nullable: true
        in: query
      - name: page
        required: false
        description: 現在のページ番号
        schema:
          type: integer
          default: 1
          nullable: true
        in: query
        example: 1
      - name: per_page
        required: false
        description: ページあたりのアイテム数
        schema:
          type: integer
          default: 20
          nullable: true
        in: query
        example: 20
