  "/api/v4/elasticsearch_indexed_namespaces/rollout":
    put:
      operationId: putApiV4ElasticsearchIndexedNamespacesRollout
      summary: インデックスされるネームスペースのロールアウトをn%まで増やす
      description: |
        この機能はGitLab 12.7で導入されました。
        
        **DEPRECATED**: このエンドポイントは非推奨であり、GitLab.comでのみ使用されます。
        
        これにより、インデックスされるネームスペースの数のみが増加します。現在ロールアウトされている割合よりも低い値を指定しても効果はありません。
        
        この割合は永続化されませんが、ロールアウトする新しいネームスペースの数を計算するために使用されます。
        
        同じ割合が後で再度適用された場合、その期間中に新しいネームスペースが作成された可能性があるため、それらの一部もインデックスされます。したがって、これを10%に設定し、1か月待ってから再度10%に設定すると、新しいネームスペースが追加される（つまり、指定されたプラン内で先月新しく作成されたネームスペースの数の10%）ことが予想されます。
      tags:
      - Advanced search rollout
      responses:
        '200':
          description: OK
        '400':
          description: 不正なリクエスト
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/RequestBody_5c6d6eacec15"
  "/api/v4/elasticsearch_indexed_namespaces/rollback":
    put:
      operationId: putApiV4ElasticsearchIndexedNamespacesRollback
      summary: インデックスされるネームスペースをn%までダウングレード
      description: |
        この機能はGitLab 12.7で導入されました。
        
        **DEPRECATED**: このエンドポイントは非推奨であり、GitLab.comでのみ使用されます。
        
        これにより、インデックスされるネームスペースの数のみが減少します。現在ロールアウトされている割合よりも高い値を指定しても効果はありません。
        
        この割合は永続化されませんが、ロールバックするネームスペースの数を計算するために使用されます。
      tags:
      - Advanced search rollout
      responses:
        '200':
          description: OK
        '400':
          description: 不正なリクエスト
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/RequestBody_5c6d6eacec15"
