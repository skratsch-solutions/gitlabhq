      - name: not[reviewer_username]
        required: false
        description: "`<Negated>`指定された`username`のレビュアーとしてユーザーを持つマージリクエストを返します。`None`はレビュアーがいないマージリクエストを返します。`Any`は任意のレビュアーがいるマージリクエストを返します。`reviewer_id`と相互に排他的です。GitLab 13.8で導入されました。"
        schema:
