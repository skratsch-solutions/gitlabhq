graphql-verify:
  variables:
    SETUP_DB: "false"
  extends:
    - .default-retry
    - .ruby-cache
    - .default-before_script
    - .graphql:rules:graphql-verify
  stage: lint
  needs:
    - job: cache:ruby-gems
      optional: true
  script:
    - bundle exec rake gitlab:graphql:validate
    - bundle exec rake gitlab:graphql:check_docs
    - bundle exec rake gitlab:graphql:check_introspection_sync
    - bundle exec rake gitlab:graphql:generate_all_introspection_schemas
    - bundle exec rake gitlab:graphql:schema:dump
    - node scripts/frontend/graphql_possible_types_extraction.js --check

  artifacts:
    expire_in: 7 days
    name: graphql-schema-verify
    paths:
      - tmp/tests/graphql/gitlab_schema.graphql
      - tmp/tests/graphql/gitlab_schema.json
      - public/-/graphql/introspection_result.json
      - public/-/graphql/introspection_result_no_deprecated.json
    when: always

graphql-eager-load-verify:
  variables:
    SETUP_DB: "true"
  extends:
    - .default-retry
    - .use-pg17
    - .ruby-cache
    - .default-before_script
    - .graphql:rules:graphql-verify
  stage: lint
  needs:
    - job: cache:ruby-gems
      optional: true
  script:
    # Regression guard for the security-orchestration load-order cycle
    # (https://gitlab.com/gitlab-org/gitlab/-/work_items/601704). Must run in a fresh
    # process: an already-booted/eager-loaded app or the built schema masks the cycle.
    # Booting Rails reads application settings from the DB, hence SETUP_DB + .use-pg17.
    # A raised NameError exits non-zero and fails the job.
    - bundle exec rails runner 'Rails.application.eager_load!'
