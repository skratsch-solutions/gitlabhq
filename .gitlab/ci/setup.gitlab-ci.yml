# Insurance in case a gem needed by one of our releases gets yanked from rubygems.org in the future.
backup gems:
  extends:
    - .default-retry
    - .ruby-cache
    - .default-before_script
    - .setup:rules:backup-gems
  stage: prepare
  needs:
    - job: cache:ruby-gems
      optional: true
  variables:
    BUNDLE_WITHOUT: ""
    BUNDLE_WITH: "development:test"
    SETUP_DB: "false"
  script:
    - echo -e "\e[0Ksection_start:`date +%s`:bundle-package[collapsed=true]\r\e[0KPackaging gems"
    - bundle config set cache_all true
    - bundle package --all-platforms
    - echo -e "\e[0Ksection_end:`date +%s`:bundle-package\r\e[0K"
  artifacts:
    paths:
      - vendor/cache
    expire_in: 31d

.predictive-job:
  extends:
    - .default-retry
  needs: []

.absolutely-predictive-job:
  extends:
    - .predictive-job
  image: ${GITLAB_DEPENDENCY_PROXY_ADDRESS}alpine:latest
  variables:
    GIT_STRATEGY: none

dont-interrupt-me:
  extends:
    - .absolutely-predictive-job
    - .setup:rules:dont-interrupt-me
  stage: sync
  interruptible: false
  script:
    - echo "This jobs makes sure this pipeline won't be interrupted! See https://docs.gitlab.com/ci/yaml/#interruptible."

clone-gitlab-repo:
  extends:
    - .absolutely-predictive-job
    - .setup:rules:clone-gitlab-repo
  stage: sync
  script:
    - echo OK
  variables:
    GIT_STRATEGY: clone
  artifacts:
    paths:
      - '*'
    expire_in: '12 hours'

set-pipeline-name:
  extends:
    - .predictive-job
    - .setup:rules:set-pipeline-name
    - .fast-no-clone-job
  needs:
    # Wait for danger-review to complete so we can fetch labels it adds
    - job: danger-review
      optional: true
  variables:
    # We use > instead of | because we want the files to be space-separated.
    FILES_TO_DOWNLOAD: >
      scripts/utils.sh
      scripts/pipeline/set_pipeline_name.rb
  image: ${GITLAB_DEPENDENCY_PROXY_ADDRESS}ruby:${RUBY_VERSION}-alpine3.23
  stage: prepare
  before_script:
    - apk add --no-cache --update curl  # Not present in ruby-alpine, so we add it manually
    - !reference [".fast-no-clone-job", before_script]
  script:
    - install_gitlab_gem
    - chmod u+x scripts/pipeline/set_pipeline_name.rb && scripts/pipeline/set_pipeline_name.rb
  allow_failure:
    exit_codes:
      - 3

gitlab_git_test:
  extends:
    - .predictive-job
    - .setup:rules:gitlab_git_test
  stage: test
  script:
    - spec/support/prepare-gitlab-git-test-for-commit --check-for-changes

verify-tests-yml:
  extends:
    - .setup:rules:verify-tests-yml
  image: ${GITLAB_DEPENDENCY_PROXY_ADDRESS}ruby:${RUBY_VERSION}-alpine3.23
  stage: preflight
  needs: []
  script:
    - source scripts/utils.sh
    - install_tff_gem
    - scripts/verify-tff-mapping

verify-approvals:
  extends:
    - .predictive-job
    - .setup:rules:jh-contribution
  script:
    - source scripts/utils.sh
    - install_gitlab_gem
    - tooling/bin/find_app_sec_approval

validate-fe-islands-ci:
  extends:
    - .predictive-job
    - .frontend:rules:fe-islands
  stage: preflight
  variables:
    USE_BUNDLE_INSTALL: "false"
  script:
    - ruby scripts/validate_fe_islands_ci.rb

type-check-fe-islands:
  extends:
    - .predictive-job
    - .frontend:rules:fe-islands
    - .fe-islands-parallel
  stage: preflight
  variables:
    USE_BUNDLE_INSTALL: "false"
  needs: ["cache:fe-islands-node-modules"]
  cache:
    - !reference [.fe-islands-yarn-cache, cache]
  script:
    - cd ee/frontend_islands/apps/${FE_APP_DIR}
    - yarn run lint:types

generate-frontend-fixtures-mapping:
  extends:
    - .setup:rules:generate-frontend-fixtures-mapping
    - .use-pg17
    - .ruby-cache
  needs: ["setup-test-env"]
  stage: prepare
  before_script:
    - !reference [.default-before_script, before_script]
    - source ./scripts/rspec_helpers.sh
    - section_start "gitaly-test-spawn" "Spawning Gitaly"; scripts/gitaly-test-spawn; section_end "gitaly-test-spawn";  # Do not use 'bundle exec' here
  script:
    - generate_frontend_fixtures_mapping
  artifacts:
    expire_in: 7d
    paths:
      - ${GLCI_PREDICTIVE_FRONTEND_FIXTURES_MAPPING_PATH}

detect-tests:
  extends:
    - .rails:rules:detect-tests
    - .with-ruby-slim-image
  needs: []
  stage: prepare
  script:
    - |
      # $FIND_CHANGES_MERGE_REQUEST_IID is defined in as-if-foss.gitlab-ci.yml
      if [ -n "$CI_MERGE_REQUEST_IID" ] || [ -n "$FIND_CHANGES_MERGE_REQUEST_IID" ]; then
        tooling/bin/predictive_tests \
          --ci \
          --with-crystalball-mappings \
          --mapping-type described_class \
          --with-frontend-fixture-mappings \
          --frontend-fixtures-mapping-path $GLCI_PREDICTIVE_FRONTEND_FIXTURES_MAPPING_PATH \
          --matching-foss-rspec-test-files-path $GLCI_PREDICTIVE_RSPEC_MATCHING_TESTS_FOSS_PATH \
          --matching-ee-rspec-test-files-path $GLCI_PREDICTIVE_RSPEC_MATCHING_TESTS_EE_PATH \
          --matching-js-files-path $GLCI_PREDICTIVE_MATCHING_JS_FILES_PATH \
          --changed-files-path $GLCI_PREDICTIVE_CHANGED_FILES_PATH
      fi
  artifacts:
    expire_in: 7d
    paths:
      - ${GLCI_PREDICTIVE_FRONTEND_FIXTURES_MAPPING_PATH}
      - ${GLCI_PREDICTIVE_CHANGED_FILES_PATH}
      - ${GLCI_PREDICTIVE_MATCHING_JS_FILES_PATH}
      - ${GLCI_PREDICTIVE_RSPEC_MATCHING_TESTS_EE_PATH}
      - ${GLCI_PREDICTIVE_RSPEC_MATCHING_TESTS_FOSS_PATH}

detect-system-tests-duo:
  extends:
    - .with-ci-node-image
  needs: []
  stage: prepare
  rules:
    - if: '$CI_PROJECT_PATH != "gitlab-org/gitlab"'
      when: never
    - if: '$GLCI_DUO_SYSTEM_TESTS_DISABLED == "true"'
      when: never
    - !reference [".prevent-tier-1", rules]
    - !reference [".rails:rules:tier-3-with-test-env", rules]  # tier-3 for predictive metrics only, when setup-test-env runs
    - !reference [".prevent-on-full-system-changes", rules]  # full system suite already runs in main pipeline for core-backend and workhorse changes
    - !reference [".prevent-run-all-rspec", rules]  # all rspec tests already run; no need for Duo selection
    - !reference [".prevent-spec-only", rules]  # spec files already directly identified by detect-tests; Duo adds nothing
    - !reference [.rails:rules:detect-tests, rules]
  before_script:
    - npm install -g @gitlab/duo-cli
  script:
    - |
      if [ -n "$CI_MERGE_REQUEST_IID" ] || [ -n "$FIND_CHANGES_MERGE_REQUEST_IID" ]; then
        tooling/bin/predictive_tests \
          --use-duo \
          --ci \
          --debug \
          --duo-system-test-files-path $GLCI_PREDICTIVE_DUO_SYSTEM_TESTS_PATH \
          --changed-files-path $GLCI_PREDICTIVE_CHANGED_FILES_PATH

        echo "=== Duo Test Selection Results ==="
        if [ -f "$GLCI_PREDICTIVE_DUO_SYSTEM_TESTS_PATH" ]; then
          echo "System test specs: $(wc -l < "$GLCI_PREDICTIVE_DUO_SYSTEM_TESTS_PATH")"
        else
          echo "System test specs: 0 (Duo bailed; falling back to non-Duo strategies)"
        fi
      fi
  artifacts:
    access: developer
    expire_in: 7d
    paths:
      - ${GLCI_PREDICTIVE_DUO_SYSTEM_TESTS_PATH}
      - tmp/.duo_last_output.txt
      - duo_feature_specs.json
    when: always
  allow_failure: true

verify-start-workflow-service-assets:
  extends:
    - .predictive-job
    - .with-ci-node-image
    - .setup:rules:verify-start-workflow-service-assets
  stage: preflight
  variables:
    GIT_STRATEGY: fetch
  script:
    - |
      SERVICE_FILE="ee/app/services/ai/duo_workflows/start_workflow_service.rb"
      REGISTRY="registry.gitlab.com"

      DUO_CLI_VERSION=$(grep -oP 'DUO_CLI_VERSION\s*=\s*"\K[^"]+' "${SERVICE_FILE}")
      DUO_CLI_PROJECT_ID=$(grep -oP 'DUO_CLI_PROJECT_ID\s*=\s*"\K[^"]+' "${SERVICE_FILE}")
      BINARY_URL="https://gitlab.com/api/v4/projects/${DUO_CLI_PROJECT_ID}/packages/generic/duo-cli/${DUO_CLI_VERSION}/duo-linux-x64"
      echo "Checking availability of duo-cli binary at ${BINARY_URL}..."
      curl --fail -sI "${BINARY_URL}" -o /dev/null || \
        { echo "ERROR: duo-cli binary for version ${DUO_CLI_VERSION} is not available at ${BINARY_URL}. Update DUO_CLI_VERSION or publish the binary." && exit 1; }

      check_image() {
        local image_path="$1"
        local image_repo="${image_path%:*}"
        local image_tag="${image_path##*:}"
        echo "Checking availability of ${REGISTRY}/${image_path}..."
        local token
        token=$(curl -sf "https://gitlab.com/jwt/auth?service=container_registry&scope=repository:${image_repo}:pull" \
          | grep -oP '"token":"\K[^"]+')
        curl --fail -sf -o /dev/null \
          -H "Authorization: Bearer ${token}" \
          "https://${REGISTRY}/v2/${image_repo}/manifests/${image_tag}" || \
          { echo "ERROR: ${REGISTRY}/${image_path} not found in registry. Update IMAGE_PATH or publish the image."; exit 1; }
      }

      IMAGE_PATH=$(grep -oP '(?<![A-Z_])IMAGE_PATH\s*=\s*"\K[^"]+' "${SERVICE_FILE}")
      check_image "${IMAGE_PATH}"

      HARDENED_IMAGE_PATH=$(grep -oP 'HARDENED_IMAGE_PATH\s*=\s*"\K[^"]+' "${SERVICE_FILE}")
      if [ -n "${HARDENED_IMAGE_PATH}" ]; then
        check_image "${HARDENED_IMAGE_PATH}"
      fi

detect-previous-failed-tests:
  extends:
    - detect-tests
    - .rails:rules:detect-previous-failed-tests
  variables:
    PREVIOUS_FAILED_TESTS_DIR: tmp/previous_failed_tests/
  before_script:
    - source ./scripts/utils.sh
    - source ./scripts/rspec_helpers.sh
  script:
    - retrieve_failed_tests "${PREVIOUS_FAILED_TESTS_DIR}" "oneline" "previous"
  artifacts:
    expire_in: 7d
    paths:
      - ${PREVIOUS_FAILED_TESTS_DIR}

e2e-test-pipeline-generate:
  extends:
    - .qa-job-base
    - .needs-e2e-gem-cache
    - .predictive-job
    - .qa:rules:determine-e2e-tests
  stage: prepare
  variables:
    COLORIZED_LOGS: "true"
    GENERATED_PIPELINE_PATH: "${CI_PROJECT_DIR}/qa/tmp"
  script:
    - bundle exec rake "ci:generate_e2e_pipelines[$GENERATED_PIPELINE_PATH]"
  artifacts:
    expire_in: 1 day
    paths:
      - "${GENERATED_PIPELINE_PATH}/*-pipeline.yml"

# This is the start of the chain of E2E jobs for CE
# After playing this, it'll follow up with:
# compile-production-assets as-if-foss --\
#                                                                         \-> e2e:test-on-omnibus-ce
# build-qa-image as-if-foss ----------------------------------------------/
e2e-test-pipeline-generate as-if-foss:
  extends:
    - e2e-test-pipeline-generate
    - .qa:rules:test-on-omnibus-ce:start
