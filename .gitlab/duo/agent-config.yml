# Duo Agent Platform configuration for gitlab-org/gitlab.
# Docs: https://docs.gitlab.com/user/duo_agent_platform/flows/execution/
# Tracking issue: https://gitlab.com/gitlab-org/gitlab/-/work_items/593976

# CI build image — needed because the default DAP image lacks ruby-devel
# headers for native gem compilation. Update this tag when .gitlab-ci.yml
# version variables change (see DEFAULT_CI_IMAGE).
image: "registry.gitlab.com/gitlab-org/gitlab-build-images/ci/debian-bookworm-slim-ruby-3.3.11-golang-1.25-node-22.12-python-3.12-postgresql-17:rubygems-3.6-git-2.51-lfs-2.9-chrome-138-yarn-1.22-graphicsmagick-1.3.36-poetry-2.2"

setup_script:
  # SRT sandbox — fail closed, no || true.
  - npm install -g @anthropic-ai/sandbox-runtime@0.0.49 --ignore-scripts
  - srt --version

  # Ruby gems — install to vendor/ so cache paths capture them.
  - bundle config set --local path vendor
  - bundle config set --local frozen true
  - bundle install --jobs 4 --retry 3

  # Node deps — --ignore-scripts avoids arbitrary postinstall network calls.
  - yarn install --frozen-lockfile --ignore-scripts

  - bundle exec lefthook install

cache:
  key:
    files:
      - Gemfile.lock
      - yarn.lock
  paths:
    - vendor/ruby
    - node_modules

network_policy:
  # Deny-by-default. The recommended allowlist exposes ~100+ domains —
  # too broad for a repo with full source access. See !233094 note 3285344526.
  include_recommended_allowed: false
  allow_all_unix_sockets: false
  allowed_domains:
    - rubygems.org
    - registry.npmjs.org
    - registry.yarnpkg.com
  denied_domains: []
