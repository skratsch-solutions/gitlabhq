# Duo Agent Platform configuration for gitlab-org/gitlab.
# Docs: https://docs.gitlab.com/user/duo_agent_platform/flows/execution/
# Tracking issue: https://gitlab.com/gitlab-org/gitlab/-/work_items/593976

# CI build image — needed because the default DAP image lacks ruby-devel
# headers for native gem compilation. Update this tag when .gitlab-ci.yml
# version variables change (see DEFAULT_CI_IMAGE).
image: "registry.gitlab.com/gitlab-org/gitlab-build-images/ci/debian-bookworm-slim-ruby-3.3.11-golang-1.25-node-22.12-python-3.12-postgresql-17:rubygems-3.6-git-2.51-lfs-2.9-chrome-138-yarn-1.22-graphicsmagick-1.3.36-poetry-2.2"

setup_script:
  # SRT sandbox — fail closed, no || true.
  - npm install -g @anthropic-ai/sandbox-runtime@0.0.49 --ignore-scripts
  - srt --version

  # Ruby gems — install to vendor/bundle so the path is covered by the
  # existing /vendor/bundle/* entry in .gitignore, preventing gem stubs
  # from being staged by git add -A.
  - bundle config set --local path vendor/bundle
  - bundle config set --local frozen true
  - bundle install --jobs 4 --retry 3

  # Node deps — --ignore-scripts avoids arbitrary postinstall network calls.
  - yarn install --frozen-lockfile --ignore-scripts

  # Lint tooling for lefthook hooks (markdownlint, vale, lychee, gitleaks).
  # These are managed by .tool-versions, not bundle/yarn, so install them via
  # mise. setup_script runs outside the SRT sandbox, so these downloads are
  # not subject to network_policy.
  - export MISE_DATA_DIR="$CI_PROJECT_DIR/.cache/mise/data"
  - export MISE_CACHE_DIR="$CI_PROJECT_DIR/.cache/mise/cache"
  # Ignore the repo's mise.toml (its ruby plugin is unneeded — the image
  # already ships Ruby — and it requires interactive trust). Tool versions
  # still come from .tool-versions, which we trust non-interactively.
  - export MISE_IGNORED_CONFIG_PATHS="$CI_PROJECT_DIR/mise.toml"
  - export MISE_TRUSTED_CONFIG_PATHS="$CI_PROJECT_DIR"
  # Pin the mise version (the install script still auto-detects arch and
  # checksum-verifies the downloaded binary).
  - curl -sSL https://mise.run | MISE_VERSION=v2026.6.1 sh
  - export PATH="$HOME/.local/bin:$MISE_DATA_DIR/shims:$PATH"
  # Versions are pinned in .tool-versions.
  - mise install markdownlint-cli2 vale lychee gitleaks
  - eval "$(mise env)"

  # yamllint (pre-push hook) is a pip package; ~/.local/bin is on PATH above.
  - pip install --user --quiet yamllint==1.37.1

  # The gitleaks hook compares config/gitleaks-local.toml against
  # config/gitleaks.toml; regenerate it to keep them in sync.
  - scripts/generate-gitleaks-local-config.sh

  - bundle exec lefthook install

cache:
  key:
    files:
      - Gemfile.lock
      - yarn.lock
      - .tool-versions
  paths:
    - vendor/bundle
    - node_modules
    - .cache/mise

network_policy:
  # Deny-by-default. The recommended allowlist exposes ~100+ domains —
  # too broad for a repo with full source access. See !233094 note 3285344526.
  include_recommended_allowed: false
  allow_all_unix_sockets: false
  allowed_domains:
    - rubygems.org
    - registry.npmjs.org
    - registry.yarnpkg.com
  denied_domains: []
