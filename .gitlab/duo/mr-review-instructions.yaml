---
# Custom instructions for GitLab Duo Code Review
# Based on GitLab's official code review guidelines

# References:
# - Code Review Guidelines: https://docs.gitlab.com/development/code_review/
# - Database Review Guidelines: https://docs.gitlab.com/development/database_review/
# - Developer Guide: https://docs.gitlab.com/operator/developer/guide/
# - Contributing Guide: https://docs.gitlab.com/development/contributing/
# - Documentation Guide: https://docs.gitlab.com/development/documentation/styleguide/
# - Field Standardisation in Observability: https://handbook.gitlab.com/handbook/engineering/architecture/design-documents/observability_field_standardisation/
# - Pajamas Design System: https://design.gitlab.com/
# - Cells Development Guidelines: https://docs.gitlab.com/development/cells/


# This file defines custom review criteria that will be applied to specific files
# during merge request reviews. Instructions are grouped by name and can target
# multiple file patterns using glob syntax.
instructions:
  - name: General Standards
    fileFilters:
      - "**/*"
    instructions: |
      1. Ensure you use inclusive language where applicable, e.g. prefer `allowlist` over `whitelist`
      2. Verify CE/EE code separation:
         - Code in CE (outside `ee/` directory) should not directly reference EE modules or classes
         - EE extensions should use `prepend_mod` pattern in CE files
         - If CE code needs EE-aware behavior, use `prepend_mod` hooks or `Gitlab.ee?` guards
         - Flag direct references to `EE::` namespaced classes in CE code
         - This prevents FOSS build failures
         - Reference: https://gitlab.com/gitlab-org/gitlab/-/blob/master/doc/development/ee_features.md
  - name: Ruby Code Quality
    fileFilters:
      - "**/*.rb"
      - "!spec/**/*"
    instructions: |
      1. Check for N+1 queries - ensure use of `includes()`, `preload()`, or `eager_load()` when accessing associations
      2. Ensure `update_all`, `delete_all`, `destroy_all` have proper conditions
      3. Ensure authorization checks in controller actions and API endpoints
      4. Ensure input validation for user-provided parameters
      5. Ensure no information disclosure in error responses
      6. Ensure all modified or new queries are flagged as needing a database reviewer
      7. Ensure all ActiveRecord scope changes (new scopes, modified scopes, or scope deletions) are flagged as needing a database reviewer
      8. For ActiveRecord scope changes, verify:
         - The scope includes appropriate indexes for filtered columns
         - The scope avoids expensive operations like subqueries on large tables
         - Default scopes are avoided unless absolutely necessary (they can cause unexpected query behavior)
      9. Ensure all modified or new queries have both raw SQL and query plans documented in the merge request description
      10. Analyze query plans for common pitfalls in the merge request description:
        - Sequential scans on large tables
        - Nested loops with large datasets
        - Missing or inefficient index usage
        - High-cost operations
        - Unexpected sort operations
        - Verify the query returns expected records (not zero rows)
        - Check that maximum query execution time is under 100ms
        - Ensure the query plan reflects the complete query as executed by the database, including all chained scopes, pagination, ordering, and any other modifiers - not a partial or simplified version of the query
      11. Flag comments that only describe what code does (e.g., "# Loop through users") rather than why. Suggest removing these comments and using better naming or method extraction instead
      12. For ActiveRecord callbacks (before_validation, before_save, after_save, etc.):
          - Verify callbacks only modify data on the current model, not associated records
          - Question if callback logic should be in a service layer instead
          - Ask: "Why use this callback instead of explicit method calls in the service/controller?"
          - Flag callbacks that have side effects (external API calls, updating other records, complex business logic)
          - Flag bulk operations on associated records in callbacks (performance concern as associations grow)
          - Acceptable uses: data normalization on current model only (trimming whitespace, setting defaults)
          - Reference: https://gitlab.com/gitlab-org/gitlab/-/blob/master/doc/development/backend/ruby_style_guide.md#avoid-activerecord-callbacks
      13. To exclude records already loaded in memory, prefer `collection.excluding(record)` (alias `without`) over a hand-written `where.not(id: record)`.
          - Do not pass a relation to `excluding`; for query results use `where.not(id: relation)`, which runs as a single subquery.
          - Reference: https://gitlab.com/gitlab-org/gitlab/-/blob/master/doc/development/backend/ruby_style_guide.md#prefer-excluding-for-records-already-loaded-in-memory

  - name: Database Migrations
    fileFilters:
      - "db/migrate/**/*.rb"
      - "db/post_migrate/**/*.rb"
      - "ee/db/geo/migrate/**/*.rb"
      - "lib/gitlab/background_migration/**/*.rb"
      - "db/docs/**/*.yml"
      - "ee/db/docs/**/*.yml"
    instructions: |
      1. Ensure migrations are reversible (add explicit down method for complex operations)
      2. Ensure bulk operations use batched migrations
      3. Use post-migrations for time-consuming operations
      5. Ensure column removals were ignored in previous release
      7. Ask: "Have you triggered the db:gitlabcom-database-testing pipeline?"
      8. For migrations that modify the database schema:
         - Ensure db/structure.sql is updated to reflect the changes
      9. For creating new tables, views or dropping existing tables/views:
          - Ensure the Database Dictionary is updated to reflect the changes
          - Remind: "When creating tables/views or dropping tables/views, make sure to update the Database Dictionary to maintain accurate documentation of the database schema"
      10. For column additions with foreign keys to pre-existing tables (not created in the current merge request):
         - Check if an index exists or is being added for the foreign key column
         - Ask: "What is the current size of this table, and what is the projected size after adding this column? Tables cannot exceed 50 GB total size (including all indexes and column data) after adding a new column with a foreign key on GitLab.com."
         - Remind: "If this table exceeds or will exceed the size limit, you can request an exemption by filing an issue with the Database Frameworks Team: https://docs.gitlab.com/development/database/large_tables_limitations/#requesting-an-exception"
         - Ask: "Are you following the guidelines for adding foreign keys to existing tables to avoid downtime and migration failures? See: https://gitlab.com/gitlab-org/gitlab/-/blob/master/doc/development/database/foreign_keys.md#avoiding-downtime-and-migration-failures"
      11. For column additions without foreign keys to pre-existing tables (not created in the current merge request):
          - Ask: "What is the current size of this table, and what is the projected size after adding this column? Tables cannot exceed 100 GB total size (including all indexes and column data) after adding a new column on GitLab.com."
          - Remind: "If this table exceeds or will exceed the size limit, you can request an exemption by filing an issue with the Database Frameworks Team: https://docs.gitlab.com/development/database/large_tables_limitations/#requesting-an-exception"
      12. For new tables created in the current merge request that contain foreign key columns:
          - Ensure indexes are created for all foreign key columns
          - Check if each foreign key column in this new table has a corresponding index
      13. For new tables created in the current merge request:
          - Check if columns are ordered optimally for space efficiency:
            - Group fixed-width columns together in descending size order (8-byte types first, then 4-byte, etc.)
            - Place variable-width columns (text, varchar, arrays, json, jsonb) at the end
          - Ask: "Have you ordered the columns to minimize space usage by grouping fixed-width columns together and placing variable-width columns at the end?"
          - Ask: "What is the expected data retention policy for this table? (e.g., time_decay, user_lifecycle, indefinite_with_justification, transient)"
          - Ask: "What is the growth driver for this table? (e.g., per-user, per-project, per-pipeline, per-event)"
          - Remind: "Proper column ordering can significantly reduce storage requirements at scale. See: https://docs.gitlab.com/development/database/ordering_table_columns/"
      14. For migrations that drop or replace an index:
          - Remind: "Before removing an index, verify queries can use other existing indexes efficiently. Confirm the index is unused on GitLab.com and Self-Managed."
          - Suggest: "For investigating index usage you can start by gathering all the metadata available for the index. For GitLab.com, you can view index usage data in [Grafana](https://dashboards.gitlab.net/goto/TsYVxcBHR?orgId=1)"
          - Ask: "Are you following the guidelines for dropping unused indexes? See: https://docs.gitlab.com/development/database/adding_database_indexes/#dropping-unused-indexes"
      15. For migrations that add indexes:
          - Ask: "Have you reviewed existing indexes on this table for redundancy or consolidation opportunities before adding a new one?"
          - If the index is temporary (e.g., to support a backfill or data migration), ask: "Do you have a plan for removing this index after the backfill or when the migration is complete? Include a follow-up issue or post-migration to drop it."
          - Remind: "Redundant and orphaned indexes increase storage overhead, degrade write performance, and contribute to LockManager LWLock contention: a known bottleneck on high-traffic tables where PostgreSQL's fast-path lock slots (limited to 16 per backend) are exhausted, forcing expensive shared-memory lock table lookups. See: https://gitlab.com/groups/gitlab-org/-/epics/11543 and https://docs.gitlab.com/development/database/adding_database_indexes/#some-tables-should-not-have-any-more-indexes"
      16. Cells – sharding keys on new tables:
          - For new tables in `db/migrate/**` or `db/post_migrate/**`, verify the table has a sharding key column and a foreign key to its sharding root, or is explicitly classified as cell-local in the Database Dictionary.
      17. Cells – Database Dictionary (`db/docs/**/*.yml`):
          - Verify new entries set `gitlab_schema` to one of the approved Cells-aware schemas (`gitlab_main_org`, `gitlab_main_cell_local`, `gitlab_main_cell_setting`, `gitlab_main_user`, `gitlab_ci`, `gitlab_ci_cell_local`, `gitlab_shared_org`, `gitlab_shared_cell_local`).
          - Flag use of the deprecated `gitlab_main` schema for new tables.
          - For `gitlab_main_org` and `gitlab_ci` tables, verify `sharding_key` is set.
          - For cell-local tables, verify the table holds non-customer data and is not referenced by foreign keys from organization tables.
          - For `gitlab_shared_org` and `gitlab_shared_cell_local` tables:
            - Verify the model inherits from `Gitlab::Database::SharedModel`.
            - Flag use of auto-incrementing integer primary keys. These tables live across multiple decomposed databases, so sequence-based IDs can collide.
            - Remind: "Use a composite primary key or a UUID primary key so rows remain unique across the decomposed databases."
      18. Cells – unique constraints across cells:
          - Flag global `UNIQUE` indexes on customer-data tables that do not include the sharding key.
          - Remind: "Scope unique indexes to include the sharding key. For attributes that must be globally unique across organizations, use the Claim service."
      - Reference: https://docs.gitlab.com/development/cells/

  - name: Cells Architecture
    fileFilters:
      - "app/models/**/*.rb"
      - "ee/app/models/**/*.rb"
      - "app/workers/**/*.rb"
      - "ee/app/workers/**/*.rb"
      - "app/services/**/*.rb"
      - "ee/app/services/**/*.rb"
      - "app/controllers/**/*.rb"
      - "ee/app/controllers/**/*.rb"
      - "lib/api/**/*.rb"
      - "ee/lib/api/**/*.rb"
      - "!spec/**/*"
      - "!ee/spec/**/*"
    instructions: |
      Cells compatibility is a first-class development requirement for the
      GitLab monolith. Cells applies to GitLab.com only; GitLab Self-Managed
      and GitLab Dedicated run as a single cell.

      1. Org-scoped compute:
         - Flag new Sidekiq workers or web/API request paths that operate across multiple Organizations.
         - Ask: "Can this worker or request be scoped to a single Organization? Cross-organization compute is only acceptable for recurring, idempotent cron jobs."
      2. Cross-organization isolation controls:
         - For features that enforce isolation between Organizations on the same cell, verify the control accounts for the Organization's isolation choice. Do not assume all Organizations on the same cell are isolated.
      3. Sharding keys on new models:
         - For new ActiveRecord models in `app/models/**` or `ee/app/models/**` that store customer data, verify the model defines a sharding key (`organization_id`, `project_id`, `namespace_id`, or another approved root).
         - Ask: "What is the sharding key for this model, and which sharding root does it point to?"
      4. No new customer-owned resources outside an Organization:
         - Flag new top-level customer-data models that do not belong to an Organization, Group, Project, or User scoped under an Organization.
         - Ask: "Which Organization owns this resource? Resources outside an Organization cannot be migrated when an Organization moves cells."
      5. Migratability and ambiguous ownership:
         - Flag models where row ownership cannot be traced to a single Organization through its sharding key.
         - Ask: "If this Organization moves to another cell, how is this row migrated? Is ownership unambiguous from the schema?"
      6. Static reference data:
         - For new ActiveRecord models that represent a fixed, known set of reference rows (for example, plan types, severity levels, status categories), prefer `ActiveRecord::FixedItemsModel::Model` over a database-backed table with an auto-incrementing primary key.
         - Remind: "Auto-incrementing IDs are assigned per cell and are not globally consistent. Hard-coded fixed items keep IDs stable across cells so foreign references remain valid after migration."
      - Reference: https://docs.gitlab.com/development/cells/
      - Reference: https://docs.gitlab.com/development/organization/sharding/
      - Reference: https://docs.gitlab.com/development/contributing/merge_request_workflow/#definition-of-done

  - name: Test Coverage
    fileFilters:
      - "spec/**/*_spec.rb"
      - "ee/spec/**/*_spec.rb"
      - "!spec/factories/**/*"
      - "!spec/support/**/*"
    instructions: |
      1. Use shared examples to reduce duplication
      2. Ensure error handling tests for security-sensitive operations
      3. Ensure input validation tests for user-facing endpoints
      4. For conditional logic (||, &&, if/else, case), verify each branch has test coverage
      5. For helper methods, ensure unit specs exist (not just integration coverage)
      6. For callbacks (before_validation, before_save), ensure unit specs test the callback behavior specifically
      7. Flag missing edge case coverage:
         - Nil/empty values
         - Boundary conditions
         - Fallback logic (|| operators)
         - Error states
      8. Follow the testing pyramid: most tests at unit level, fewer at integration/system level
      9. Use `:aggregate_failures` tag when an `it` block contains more than one expectation. This avoids hiding subsequent failures when the first expectation fails
      10. Prefer `build` or `build_stubbed` over `create` when the test does not require a persisted database record. `build_stubbed` is fastest when only attribute access is needed
      11. Prefer `let_it_be` over `let` or `let!` for database-backed objects that do not need to change between examples. Use `let_it_be_with_reload` when the object is mutated in a `before` block, and `let_it_be_with_refind` only when a fresh ActiveRecord instance is strictly necessary. Do not define a `let_it_be` that depends on stubs or state set up in a `before` block — `let_it_be` runs in `before(:all)` before per-example stubs are active. Reference: https://docs.gitlab.com/development/testing_guide/best_practices/#lets-talk-about-let
      12. Use `non_existing_record_id` and `non_existing_record_iid` instead of hardcoded IDs like `123` or `999` — hardcoded IDs can collide with real records in CI
      13. Use `have_gitlab_http_status` with named status symbols (`:ok`, `:not_found`, `:created`) not numeric codes (`200`, `404`)
      14. Do not wrap a constant or static value in `let` if it is used in only one example — inline it or use a local variable inside the `it` block. When the value is shared across multiple examples in the same context, prefer `let`. Do not suggest local variables at the `context` or `describe` scope as a replacement for `let`
      15. Do not define a `let` variable in the top-level `describe` if it is only used in one nested block — define it in that block instead
      16. Avoid bare `subject` in expectations — use a named subject (e.g., `subject(:result)`) or an explicit method call
      17. Every top-level `RSpec.describe` block must have a `feature_category:` metadata tag
      18. Use `fast_spec_helper` instead of `spec_helper` for well-isolated classes in `lib/` that do not need Rails
      19. Use `be_like_time` matcher for time comparisons to handle precision differences between Ruby and PostgreSQL
      20. Use `freeze_time` or `travel_to` for time-dependent tests — never use `sleep`
      21. When asserting on collections where order does not matter, use `match_array` instead of `eq` or `match` to avoid dataset-specific flakiness. For example, prefer `expect(result).to match_array([item1, item2])` over `expect(result).to eq([item1, item2])`
      22. Avoid calling `.first`, `.last`, or `.take` on ActiveRecord relations without an explicit `.order()` clause — PostgreSQL does not guarantee row ordering without ORDER BY, which causes dataset-specific flaky tests
      23. When using `Faker` or random values in tests, ensure the test handles edge cases that random input might produce. If the test depends on a specific format, use a hardcoded value instead of a random one
      24. Reference: https://gitlab.com/gitlab-org/gitlab/-/blob/master/doc/development/testing_guide/best_practices.md
      25. Reference: https://gitlab.com/gitlab-org/gitlab/-/blob/master/doc/development/testing_guide/testing_levels.md
      26. Reference: https://gitlab.com/gitlab-org/gitlab/-/blob/master/doc/development/testing_guide/unhealthy_tests.md

  # >>> generated: documentation — gitlab-ai-principles-distiller (from .ai/principles/manifest.yml; do not edit)
  # distilled_at_sha: 56d6e7df2193336003a2368db3b4c1ae9cb6f911
  # source_checksum: d36ccbb0679c0fc2
  - name: Documentation
    fileFilters:
      - "doc/**/*.md"
    instructions: |
      ### Voice and Tone

      - Write in US English with US grammar.
      - Use active voice instead of passive voice; use passive only when the subject is awkward (e.g., "The report is exported").
      - Write from the customer perspective; DO NOT use "allows you to" or "enables you to" — address the user directly with "you".
      - DO NOT use marketing phrases like "save you time and money", or words like "easily" or "simply".
      - DO NOT write about the document itself (e.g., "This page shows..."); get straight to the point.
      - Use contractions for a friendly tone, but DO NOT use contractions to emphasize a negative, with proper nouns as the subject, in reference documentation, or in error messages.
      - DO NOT use possessives (`'s`) for product or organization names (e.g., use "the Docker CLI", not "Docker's CLI").

      ### Language and Grammar

      - Spell out acronyms on first use per page; DO NOT spell them out more than once.
      - DO NOT make acronyms plural with an apostrophe (use `APIs`, not `API's`).
      - Spell out zero through nine; use numerals for 10 and above.
      - Use `month day, year` format for dates and `AM`/`PM` for times.
      - DO NOT use semicolons (`;`), en dashes (`–`), or em dashes (`—`); use separate sentences or commas instead.
      - DO NOT use typographer's ("curly") quotation marks; use straight quotes.
      - Use serial (Oxford) commas before the final "and" or "or" in lists of three or more items.
      - DO NOT use Latin abbreviations like `e.g.` or `i.e.`.
      - DO NOT use `-ing` words, ambiguous pronouns like "it", or phrases that hide the subject like "there is"/"there are".
      - Break up noun strings (e.g., use "custom settings for project integrations", not "project integration custom settings").

      ### Capitalization

      - Use sentence case for topic titles and table headers.
      - Keep feature names lowercase unless they are listed as exceptions in markdownlint or the word list.
      - Capitalize GitLab product tiers (e.g., GitLab Free, GitLab Ultimate), third-party product names, and methodology names.
      - DO NOT match capitalization from the Features page or `features.yml` by default.
      - Use the same capitalization as displayed in the UI when referring to UI elements; exception: use sentence case for UI text that is all uppercase.

      ### Fake Data and Tokens

      - DO NOT use real usernames, email addresses, or tokens in documentation.
      - Use diverse or non-gendered names (e.g., `Sidney Jones`, `Zhang Wei`) and `example.com` email addresses.
      - Use `example.com` for generic domains and `gitlab.example.com` for self-managed references.
      - Use only the approved fake token values from the token table in the style guide.

      ### Markdown and Formatting

      - DO NOT add an `H1` heading in Markdown; use the `title` metadata attribute instead.
      - DO NOT skip heading levels (e.g., `##` directly to `####`).
      - DO NOT use heading levels greater than `H5`; move content to a new page instead.
      - DO NOT use bold text in topic titles.
      - Leave one blank line before and after headings, paragraphs, lists, and code blocks.
      - Use dashes (`-`) for unordered lists, not asterisks (`*`).
      - Start every ordered list item with `1.`.
      - Use two spaces per indentation level for unordered lists; three spaces for ordered lists.
      - DO NOT use HTML in Markdown unless no Markdown equivalent exists, the content is reviewed by a technical writer, and the need is urgent.
      - Any `<a>` tags created with HTML must use absolute URLs as `href` attributes.
      - Use inline links, not reference-style links.
      - Split long lines at approximately 100 characters; DO NOT split links across lines.
      - Start each new sentence on a new line.
      - Use `<!-- comment -->` HTML comments for author notes; DO NOT use comments to hide documentation.

      ### Text Formatting

      - Use **bold** only for UI elements with visible labels and navigation paths; DO NOT use bold for keywords or emphasis.
      - Use inline code (backticks) for user input, filenames, configuration parameters, keywords, API/HTTP methods, HTTP status codes, and short error messages.
      - Use code blocks for CLI/cURL commands and multi-line inputs/outputs; add a syntax name for highlighting.
      - Use `<kbd>` tags for keyboard commands; spell out full key names (except `Alt`); DO NOT use spaces between `<kbd>` tags in combinations.
      - DO NOT use italics for emphasis in product documentation.
      - Use `<` and `>` to denote placeholder text in code blocks.

      ### Lists

      - Make all list items parallel (same grammatical structure).
      - Start all list items with a capital letter.
      - DO NOT end list items with a period unless the item is a complete sentence.
      - DO NOT use bold formatting to define keywords or concepts in a list; use bold only for UI element labels.
      - Use ordered lists for sequential steps; use unordered lists for non-sequential items.
      - Add a colon (`:`) after the introductory phrase before a list.
      - DO NOT use list items to complete an introductory phrase (e.g., "You can do this by: - Copying..."); rewrite as a full sentence introducing the list.

      ### Tables

      - DO NOT leave table cells empty; use **None** for cells with no meaningful value.
      - Make the header row and delimiter row the same length; DO NOT use shortened delimiters like `|-|-|-|`.
      - Use sentence case for table headers.
      - Place the `Description` column as the right-most column when possible.
      - DO NOT realign an entire table when only changing a few rows (to keep diffs readable).
      - Use `{{< no >}}` and `{{< yes >}}` shortcodes for feature availability tables; DO NOT use these in API docs or inline text.
      - Use `<sup>` tags for table footnotes; place footnotes below the table under `**Footnotes**:` as an ordered list.

      ### Links

      - DO NOT duplicate links on the same page.
      - DO NOT use links in headings.
      - DO NOT hard-wrap lines within a link.
      - Use relative file paths for links within the same repository; use full URLs for links to other repositories or non-doc files.
      - Link to a specific commit (permalink) when linking to specific lines of code, not to a branch.
      - Use descriptive link text; DO NOT use "here", "this page", or "this documentation" as link text.
      - Use the pattern `For more information, see [link text](link.md)` or `To [DO THIS], see [link text](link.md)`.
      - DO NOT use "Learn more about...", "To read more...", or append "page" or "documentation" after the link text.
      - When linking to an issue, include the issue number in the link text (e.g., `[issue 12345](link)`); DO NOT use the pound sign (`issue #12345`).
      - DO NOT link to confidential issues, internal handbook pages, or permission-restricted features directly; put such links in backticks and note the access requirement.
      - Limit links to external documentation and handbook pages; weigh customer benefit against maintenance cost.
      - DO NOT link to the `/development` directory from any other directory within the GitLab repository.

      ### Images and Screenshots

      - Resize wide or tall screenshots (width ≤ 1000 px, height ≤ 500 px).
      - Compress all PNG images to 100 KB or less on disk.
      - Use descriptive lowercase filenames; append the GitLab version in the format `_vX_Y` (e.g., `pipelines_v11_1.png`).
      - Place images in an `img/` subdirectory alongside the `.md` file.
      - Use PNG format; DO NOT use JPEG for screenshots.
      - DO NOT delete image files when removing references from English docs (localized docs may still use them).
      - DO NOT use animated GIFs; use static screenshots with callouts or link to a short video instead.
      - Write alt text that describes the context of the image (≤ 155 characters); DO NOT use phrases like "Image of" or strings of keywords.
      - Use an empty alt tag (`alt=""`) for purely decorative images rather than omitting the tag.
      - Add callout arrows in `#EE2604` red at 3 pt line width to emphasize areas in screenshots.
      - DO NOT link to externally-hosted images; download and store them in the appropriate `img/` directory.

      ### Diagrams

      - Prefer Mermaid for diagrams; use Draw.io for complex layouts where Mermaid produces unclear results.
      - Add `accTitle` and `accDescr` accessibility fields immediately after the diagram type declaration in Mermaid.
      - DO NOT use color alone to differentiate diagram elements (must work in both light and dark modes).
      - DO NOT include links in diagrams (not testable by link checkers).
      - Keep diagrams simple; use rectangles for processes, diamonds for decisions, solid lines for direct relationships, dotted lines for indirect relationships.
      - Save Draw.io diagrams with the `.drawio.svg` extension and include the diagram definition in the SVG file by selecting **Include a copy of my diagram** on export.

      ### Alert Boxes and Special Elements

      - Use alert boxes sparingly; DO NOT place two alert boxes consecutively.
      - Use `> [!note]`, `> [!warning]`, `> [!flag]`, and `> [!disclaimer]` for alert types.
      - DO NOT use blockquotes in product documentation; use code blocks, alert boxes, or plain text instead.
      - Use the guide shortcode for tutorials only; DO NOT use a guide inside a guide.
      - Use collapsible panels only on GitLab Duo pages in the availability details section; DO NOT use them for other content.
      - Use cards only on top-level landing pages where cards are the only content.
      - DO NOT use Markdown emoji format (`:smile:`); use GitLab SVG icons instead.
      - When using SVG icons, place the icon after the label text in parentheses (e.g., `Select **Edit** ({{< icon name="pencil" >}})`).

      ### Videos and Demos

      - DO NOT upload videos to product repositories; link or embed them instead.
      - Embed only videos from the official GitLab YouTube channel; link to videos from other sources.
      - Include the video publication date as a comment below every video link or embed.
      - Include a `<div class="video-fallback">` fallback for embedded videos.
      - Use `www.youtube-nocookie.com` in the `src` of embedded video iframes to enable Privacy Enhanced Mode.
      - Follow the same guidelines for click-through demo links as for videos.

      ### Navigation and UI References

      - Write navigation steps as location then action (e.g., "From the **Visibility** dropdown list, select **Public**").
      - Use **left sidebar** instead of "the Explore menu" or "the Your work sidebar".
      - Bold all UI element names; DO NOT bold the `>` separator in navigation paths.
      - Place punctuation outside bold tags unless the punctuation is part of the UI element itself.
      - Start optional steps with "Optional." followed by a period.
      - Start recommended steps with "Recommended." followed by a period.
      - Use "Complete the fields" to summarize multiple self-explanatory fields in a single task step rather than documenting each field individually.

      ### Documentation Workflow

      - Include documentation in the same MR as the feature code whenever possible; DO NOT merge a feature that exposes UI, API endpoints, or user-facing behaviour without accompanying documentation.
      - Ensure AI-generated documentation is reviewed by a Technical Writer and passes a Vale lint check before submission.
      - Delete documentation added prematurely rather than hiding it with HTML comments; add a link to the original MR in the removal MR.
      - When moving content to a new location and editing it in the same MR, use separate commits (first commit moves only, subsequent commits edit).
      - DO NOT promise to deliver features in a future release; instead reference the proposing issue (e.g., "Support for improvements is proposed in [issue 12345](link)").
      - Assign the technical writer as a reviewer directly on the MR (not just pinged) before the code maintainer review; documentation reviews must not block merging.
      - When a post-merge technical writer review is required, create an issue using the [Doc Review description template](https://gitlab.com/gitlab-org/gitlab/-/issues/new?description_template=Doc%20Review) and link it to the merged MR.
      - Name documentation-only branches in `omnibus-gitlab`, `charts/gitlab`, or `gitlab-operator` starting with `docs/`, `docs-`, or ending with `-docs` to trigger shorter pipelines.

      ### Common Mistakes - Repetition

      - Do not restate information already covered earlier in the same page or in a linked topic
      - Each section should add new information. Do not summarize what was just explained
      - Avoid restating the title or introduction in the first paragraph

      ### Common Mistakes - Scope

      - Do not create a new page for a single concept, term, or procedure step

      ### Common Mistakes - Accuracy

      - Only include information you can ground in the existing codebase, linked documentation, or content already on the page
      - Do not speculate or infer how a feature works
      - Do not invent command syntax, API parameters, or UI element names

      ### Screenshot Guidelines

      - Resize wide or tall screenshots
      - Compress size on disk to 100 KB or less
      - Use descriptive lowercase filenames with underscores instead of hyphens
      - Filenames should include the major and minor version of GitLab in the format `_v18_6`

      ### Content Guidelines

      - Avoid writing about the document itself; get straight to the point instead of using phrases like "This page shows"
      - Do not promise work in future milestones; instead say work is being proposed
      - Avoid blockquotes
      - When linking to GitLab issues, include the GitLab issue number in the link text
      - Start optional steps with "Optional."

      ### Word List

      - Follow the GitLab Documentation recommended word list for consistent terminology
