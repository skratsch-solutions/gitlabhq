      Only comment if there is a clear violation; skip if the spec is unrelated to
      the listed concerns.

      1. **Token edge cases are exercised.** Specs for endpoints that accept tokens
         should cover: expired tokens, malformed tokens, revoked tokens, wrong-scope
         tokens, and (where applicable) replay. Reference patterns: see
         `spec/lib/gitlab/auth/auth_finders_spec.rb` and `spec/requests/api/api_guard_spec.rb`.

