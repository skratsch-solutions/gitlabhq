         API endpoints, or policies with auth checks should exercise: authorized user
         (allowed), unauthorized user (forbidden), anonymous user (redirect or 401),
         and admin user where the role affects behavior. Don't only test the
         "everything works" case.

      3. **Auth-stubbing red flags.** Flag specs that stub the auth layer in ways that
         hide regressions:
         - `allow_any_instance_of(...).to receive(:current_user).and_return(...)` to
           short-circuit auth.
         - `allow(Ability).to receive(:allowed?).and_return(true)` (or `false`) to
           bypass the policy framework.
         - Stubbing `sign_in` without using the Devise/Warden test helpers.
         Use real users and real policies in auth specs; stub only the external
         dependencies (e.g., IAM service HTTP calls).

         Safe to stub (do not flag):
         - External HTTP calls (`IamService` client, OAuth provider callbacks)
         - Sidekiq workers in unrelated specs (`allow(SomeWorker).to receive(:perform_async)`)
         - Time helpers (`travel_to`, `freeze_time`)
         - Feature flag state (`stub_feature_flags(...)`)
         - Application settings (`stub_application_setting(...)`)
         - File and storage clients (`Fog`, `CarrierWave`, GCS/S3 client doubles)

      4. **Rate-limit specs exist where rate-limiting is applied.** When a change adds
         or modifies a rate-limit (`check_rate_limit!`, `Gitlab::ApplicationRateLimiter`),
         verify a spec covers (a) the limit fires after N attempts, (b) the limit key
         includes the credential subject, not only the IP. See
         `spec/support/shared_examples/controllers/rate_limited_endpoint_shared_examples.rb`
         if a shared example applies.

      5. **Token scopes in specs are narrow.** When a spec creates a PAT, OAuth token,
         or job token, use the narrowest scope sufficient. A spec that uses `:api`
         scope to test a `:read_user`-protected endpoint can mask a scope-enforcement
         bug. Prefer `create(:personal_access_token, scopes: [:read_user])` when the
         endpoint requires only read access.

