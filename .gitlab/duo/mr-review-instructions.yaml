---
# Custom instructions for GitLab Duo Code Review
# Based on GitLab's official code review guidelines

# References:
# - Code Review Guidelines: https://docs.gitlab.com/development/code_review/
# - Database Review Guidelines: https://docs.gitlab.com/development/database_review/
# - Developer Guide: https://docs.gitlab.com/operator/developer/guide/
# - Contributing Guide: https://docs.gitlab.com/development/contributing/
# - Documentation Guide: https://docs.gitlab.com/development/documentation/styleguide/
# - Field Standardisation in Observability: https://handbook.gitlab.com/handbook/engineering/architecture/design-documents/observability_field_standardisation/
# - Pajamas Design System: https://design.gitlab.com/
# - Cells Development Guidelines: https://docs.gitlab.com/development/cells/


# This file defines custom review criteria that will be applied to specific files
# during merge request reviews. Instructions are grouped by name and can target
# multiple file patterns using glob syntax.
instructions:
  - name: General Standards
    fileFilters:
      - "**/*"
    instructions: |
      1. Ensure you use inclusive language where applicable, e.g. prefer `allowlist` over `whitelist`
      2. Verify CE/EE code separation:
         - Code in CE (outside `ee/` directory) should not directly reference EE modules or classes
         - EE extensions should use `prepend_mod` pattern in CE files
         - If CE code needs EE-aware behavior, use `prepend_mod` hooks or `Gitlab.ee?` guards
         - Flag direct references to `EE::` namespaced classes in CE code
         - This prevents FOSS build failures
         - Reference: https://gitlab.com/gitlab-org/gitlab/-/blob/master/doc/development/ee_features.md
  - name: Ruby Code Quality
    fileFilters:
      - "**/*.rb"
      - "!spec/**/*"
    instructions: |
      1. Check for N+1 queries - ensure use of `includes()`, `preload()`, or `eager_load()` when accessing associations
      2. Ensure `update_all`, `delete_all`, `destroy_all` have proper conditions
      3. Ensure authorization checks in controller actions and API endpoints
      4. Ensure input validation for user-provided parameters
      5. Ensure no information disclosure in error responses
      6. Ensure all modified or new queries are flagged as needing a database reviewer
      7. Ensure all ActiveRecord scope changes (new scopes, modified scopes, or scope deletions) are flagged as needing a database reviewer
      8. For ActiveRecord scope changes, verify:
         - The scope includes appropriate indexes for filtered columns
         - The scope avoids expensive operations like subqueries on large tables
         - Default scopes are avoided unless absolutely necessary (they can cause unexpected query behavior)
      9. Ensure all modified or new queries have both raw SQL and query plans documented in the merge request description
      10. Analyze query plans for common pitfalls in the merge request description:
        - Sequential scans on large tables
        - Nested loops with large datasets
        - Missing or inefficient index usage
        - High-cost operations
        - Unexpected sort operations
        - Verify the query returns expected records (not zero rows)
        - Check that maximum query execution time is under 100ms
        - Ensure the query plan reflects the complete query as executed by the database, including all chained scopes, pagination, ordering, and any other modifiers - not a partial or simplified version of the query
      11. Flag comments that only describe what code does (e.g., "# Loop through users") rather than why. Suggest removing these comments and using better naming or method extraction instead
      12. For ActiveRecord callbacks (before_validation, before_save, after_save, etc.):
          - Verify callbacks only modify data on the current model, not associated records
          - Question if callback logic should be in a service layer instead
          - Ask: "Why use this callback instead of explicit method calls in the service/controller?"
          - Flag callbacks that have side effects (external API calls, updating other records, complex business logic)
          - Flag bulk operations on associated records in callbacks (performance concern as associations grow)
          - Acceptable uses: data normalization on current model only (trimming whitespace, setting defaults)
          - Reference: https://gitlab.com/gitlab-org/gitlab/-/blob/master/doc/development/backend/ruby_style_guide.md#avoid-activerecord-callbacks

  - name: Database Migrations
    fileFilters:
      - "db/migrate/**/*.rb"
      - "db/post_migrate/**/*.rb"
      - "ee/db/geo/migrate/**/*.rb"
      - "lib/gitlab/background_migration/**/*.rb"
      - "db/docs/**/*.yml"
      - "ee/db/docs/**/*.yml"
    instructions: |
      1. Ensure migrations are reversible (add explicit down method for complex operations)
      2. Ensure bulk operations use batched migrations
      3. Use post-migrations for time-consuming operations
      5. Ensure column removals were ignored in previous release
      7. Ask: "Have you triggered the db:gitlabcom-database-testing pipeline?"
      8. For migrations that modify the database schema:
         - Ensure db/structure.sql is updated to reflect the changes
      9. For creating new tables, views or dropping existing tables/views:
          - Ensure the Database Dictionary is updated to reflect the changes
          - Remind: "When creating tables/views or dropping tables/views, make sure to update the Database Dictionary to maintain accurate documentation of the database schema"
      10. For column additions with foreign keys to pre-existing tables (not created in the current merge request):
         - Check if an index exists or is being added for the foreign key column
         - Ask: "What is the current size of this table, and what is the projected size after adding this column? Tables cannot exceed 50 GB total size (including all indexes and column data) after adding a new column with a foreign key on GitLab.com."
         - Remind: "If this table exceeds or will exceed the size limit, you can request an exemption by filing an issue with the Database Frameworks Team: https://docs.gitlab.com/development/database/large_tables_limitations/#requesting-an-exception"
         - Ask: "Are you following the guidelines for adding foreign keys to existing tables to avoid downtime and migration failures? See: https://gitlab.com/gitlab-org/gitlab/-/blob/master/doc/development/database/foreign_keys.md#avoiding-downtime-and-migration-failures"
      11. For column additions without foreign keys to pre-existing tables (not created in the current merge request):
          - Ask: "What is the current size of this table, and what is the projected size after adding this column? Tables cannot exceed 100 GB total size (including all indexes and column data) after adding a new column on GitLab.com."
          - Remind: "If this table exceeds or will exceed the size limit, you can request an exemption by filing an issue with the Database Frameworks Team: https://docs.gitlab.com/development/database/large_tables_limitations/#requesting-an-exception"
      12. For new tables created in the current merge request that contain foreign key columns:
          - Ensure indexes are created for all foreign key columns
          - Check if each foreign key column in this new table has a corresponding index
      13. For new tables created in the current merge request:
          - Check if columns are ordered optimally for space efficiency:
            - Group fixed-width columns together in descending size order (8-byte types first, then 4-byte, etc.)
            - Place variable-width columns (text, varchar, arrays, json, jsonb) at the end
          - Ask: "Have you ordered the columns to minimize space usage by grouping fixed-width columns together and placing variable-width columns at the end?"
          - Ask: "What is the expected data retention policy for this table? (e.g., time_decay, user_lifecycle, indefinite_with_justification, transient)"
          - Ask: "What is the growth driver for this table? (e.g., per-user, per-project, per-pipeline, per-event)"
          - Remind: "Proper column ordering can significantly reduce storage requirements at scale. See: https://docs.gitlab.com/development/database/ordering_table_columns/"
      14. For migrations that drop or replace an index:
          - Remind: "Before removing an index, verify queries can use other existing indexes efficiently. Confirm the index is unused on GitLab.com and Self-Managed."
          - Suggest: "For investigating index usage you can start by gathering all the metadata available for the index. For GitLab.com, you can view index usage data in [Grafana](https://dashboards.gitlab.net/goto/TsYVxcBHR?orgId=1)"
          - Ask: "Are you following the guidelines for dropping unused indexes? See: https://docs.gitlab.com/development/database/adding_database_indexes/#dropping-unused-indexes"
      15. For migrations that add indexes:
          - Ask: "Have you reviewed existing indexes on this table for redundancy or consolidation opportunities before adding a new one?"
          - If the index is temporary (e.g., to support a backfill or data migration), ask: "Do you have a plan for removing this index after the backfill or when the migration is complete? Include a follow-up issue or post-migration to drop it."
          - Remind: "Redundant and orphaned indexes increase storage overhead, degrade write performance, and contribute to LockManager LWLock contention: a known bottleneck on high-traffic tables where PostgreSQL's fast-path lock slots (limited to 16 per backend) are exhausted, forcing expensive shared-memory lock table lookups. See: https://gitlab.com/groups/gitlab-org/-/epics/11543 and https://docs.gitlab.com/development/database/adding_database_indexes/#some-tables-should-not-have-any-more-indexes"
      16. Cells – sharding keys on new tables:
          - For new tables in `db/migrate/**` or `db/post_migrate/**`, verify the table has a sharding key column and a foreign key to its sharding root, or is explicitly classified as cell-local in the Database Dictionary.
      17. Cells – Database Dictionary (`db/docs/**/*.yml`):
          - Verify new entries set `gitlab_schema` to one of the approved Cells-aware schemas (`gitlab_main_org`, `gitlab_main_cell_local`, `gitlab_main_cell_setting`, `gitlab_main_user`, `gitlab_ci`, `gitlab_ci_cell_local`, `gitlab_shared_org`, `gitlab_shared_cell_local`).
          - Flag use of the deprecated `gitlab_main` schema for new tables.
          - For `gitlab_main_org` and `gitlab_ci` tables, verify `sharding_key` is set.
          - For cell-local tables, verify the table holds non-customer data and is not referenced by foreign keys from organization tables.
          - For `gitlab_shared_org` and `gitlab_shared_cell_local` tables:
            - Verify the model inherits from `Gitlab::Database::SharedModel`.
            - Flag use of auto-incrementing integer primary keys. These tables live across multiple decomposed databases, so sequence-based IDs can collide.
            - Remind: "Use a composite primary key or a UUID primary key so rows remain unique across the decomposed databases."
      18. Cells – unique constraints across cells:
          - Flag global `UNIQUE` indexes on customer-data tables that do not include the sharding key.
          - Remind: "Scope unique indexes to include the sharding key. For attributes that must be globally unique across organizations, use the Claim service."
      - Reference: https://docs.gitlab.com/development/cells/

  - name: Cells Architecture
    fileFilters:
      - "app/models/**/*.rb"
      - "ee/app/models/**/*.rb"
      - "app/workers/**/*.rb"
      - "ee/app/workers/**/*.rb"
      - "app/services/**/*.rb"
      - "ee/app/services/**/*.rb"
      - "app/controllers/**/*.rb"
      - "ee/app/controllers/**/*.rb"
      - "lib/api/**/*.rb"
      - "ee/lib/api/**/*.rb"
      - "!spec/**/*"
      - "!ee/spec/**/*"
    instructions: |
      Cells compatibility is a first-class development requirement for the
      GitLab monolith. Cells applies to GitLab.com only; GitLab Self-Managed
      and GitLab Dedicated run as a single cell.

      1. Org-scoped compute:
         - Flag new Sidekiq workers or web/API request paths that operate across multiple Organizations.
         - Ask: "Can this worker or request be scoped to a single Organization? Cross-organization compute is only acceptable for recurring, idempotent cron jobs."
      2. Cross-organization isolation controls:
         - For features that enforce isolation between Organizations on the same cell, verify the control accounts for the Organization's isolation choice. Do not assume all Organizations on the same cell are isolated.
      3. Sharding keys on new models:
         - For new ActiveRecord models in `app/models/**` or `ee/app/models/**` that store customer data, verify the model defines a sharding key (`organization_id`, `project_id`, `namespace_id`, or another approved root).
         - Ask: "What is the sharding key for this model, and which sharding root does it point to?"
      4. No new customer-owned resources outside an Organization:
         - Flag new top-level customer-data models that do not belong to an Organization, Group, Project, or User scoped under an Organization.
         - Ask: "Which Organization owns this resource? Resources outside an Organization cannot be migrated when an Organization moves cells."
      5. Migratability and ambiguous ownership:
         - Flag models where row ownership cannot be traced to a single Organization through its sharding key.
         - Ask: "If this Organization moves to another cell, how is this row migrated? Is ownership unambiguous from the schema?"
      6. Static reference data:
         - For new ActiveRecord models that represent a fixed, known set of reference rows (for example, plan types, severity levels, status categories), prefer `ActiveRecord::FixedItemsModel::Model` over a database-backed table with an auto-incrementing primary key.
         - Remind: "Auto-incrementing IDs are assigned per cell and are not globally consistent. Hard-coded fixed items keep IDs stable across cells so foreign references remain valid after migration."
      - Reference: https://docs.gitlab.com/development/cells/
      - Reference: https://docs.gitlab.com/development/organization/sharding/
      - Reference: https://docs.gitlab.com/development/contributing/merge_request_workflow/#definition-of-done

  - name: Test Coverage
    fileFilters:
      - "spec/**/*_spec.rb"
      - "ee/spec/**/*_spec.rb"
      - "!spec/factories/**/*"
      - "!spec/support/**/*"
    instructions: |
      1. Use shared examples to reduce duplication
      2. Ensure error handling tests for security-sensitive operations
      3. Ensure input validation tests for user-facing endpoints
      4. For conditional logic (||, &&, if/else, case), verify each branch has test coverage
      5. For helper methods, ensure unit specs exist (not just integration coverage)
      6. For callbacks (before_validation, before_save), ensure unit specs test the callback behavior specifically
      7. Flag missing edge case coverage:
         - Nil/empty values
         - Boundary conditions
         - Fallback logic (|| operators)
         - Error states
      8. Follow the testing pyramid: most tests at unit level, fewer at integration/system level
      9. Use `:aggregate_failures` tag when an `it` block contains more than one expectation. This avoids hiding subsequent failures when the first expectation fails
      10. Prefer `build` or `build_stubbed` over `create` when the test does not require a persisted database record. `build_stubbed` is fastest when only attribute access is needed
      11. Prefer `let_it_be` over `let` or `let!` for database-backed objects that do not need to change between examples. Use `let_it_be_with_reload` when the object is mutated in a `before` block, and `let_it_be_with_refind` only when a fresh ActiveRecord instance is strictly necessary. Do not define a `let_it_be` that depends on stubs or state set up in a `before` block — `let_it_be` runs in `before(:all)` before per-example stubs are active. Reference: https://docs.gitlab.com/development/testing_guide/best_practices/#lets-talk-about-let
      12. Use `non_existing_record_id` and `non_existing_record_iid` instead of hardcoded IDs like `123` or `999` — hardcoded IDs can collide with real records in CI
      13. Use `have_gitlab_http_status` with named status symbols (`:ok`, `:not_found`, `:created`) not numeric codes (`200`, `404`)
      14. Do not wrap constants or static values in `let` blocks — use them inline or as local constants
      15. Do not define a `let` variable in the top-level `describe` if it is only used in one nested block — define it in that block instead
      16. Avoid bare `subject` in expectations — use a named subject (e.g., `subject(:result)`) or an explicit method call
      17. Every top-level `RSpec.describe` block must have a `feature_category:` metadata tag
      18. Use `fast_spec_helper` instead of `spec_helper` for well-isolated classes in `lib/` that do not need Rails
      19. Use `be_like_time` matcher for time comparisons to handle precision differences between Ruby and PostgreSQL
      20. Use `freeze_time` or `travel_to` for time-dependent tests — never use `sleep`
      21. When asserting on collections where order does not matter, use `match_array` instead of `eq` or `match` to avoid dataset-specific flakiness. For example, prefer `expect(result).to match_array([item1, item2])` over `expect(result).to eq([item1, item2])`
      22. Avoid calling `.first`, `.last`, or `.take` on ActiveRecord relations without an explicit `.order()` clause — PostgreSQL does not guarantee row ordering without ORDER BY, which causes dataset-specific flaky tests
      23. When using `Faker` or random values in tests, ensure the test handles edge cases that random input might produce. If the test depends on a specific format, use a hardcoded value instead of a random one
      24. Reference: https://gitlab.com/gitlab-org/gitlab/-/blob/master/doc/development/testing_guide/best_practices.md
      25. Reference: https://gitlab.com/gitlab-org/gitlab/-/blob/master/doc/development/testing_guide/testing_levels.md
      26. Reference: https://gitlab.com/gitlab-org/gitlab/-/blob/master/doc/development/testing_guide/unhealthy_tests.md

  - name: Documentation
    fileFilters:
      - "doc/**/*.md"
    instructions: |
      1. Ensure new or updated content aligns with existing content in technical meaning and style.
      2. Ensure the style is clear, concise, and not repetitive.
      3. Use American English spelling and active voice.
      4. Avoid excessive or repetitive links.
      5. Avoid ambiguous phrases and be consistent with feature names.
      6. Focus on the features and benefits GitLab brings to customers, rather than what GitLab has created.
      7. Avoid sales or marketing language, including words like "easily" or "simply."
      8. Avoid writing about the document itself. Get straight to the point instead of using phrases like "This page shows."
      9. Tend toward lowercase, use sentence case for topic titles, and match UI text capitalization.
      10. Use bold for UI elements only.
      11. Use sentence case for table headers.
      12. When describing the location of a UI element, use the location first, then action the user must take.
      13. When linking to GitLab issues, include the GitLab issue number in the link text.
      14. Start optional steps with "Optional."
      15. Resize wide or tall screenshots. Compress size on disk to 100 KB or less. Use descriptive lowercase filenames with underscores instead of hyphens. Filenames should include the major and minor version of GitLab in the format "_v18_6".
      16. Avoid using blockquotes.
      17. Do not promise work in future milestones. Instead, say work is being proposed.
      18. Along with the previous instructions, documentation should follow:
          - The GitLab Documentation style guide: https://gitlab.com/gitlab-org/gitlab/-/blob/master/doc/development/documentation/styleguide/_index.md
          - The GitLab Documentation recommended word list: https://gitlab.com/gitlab-org/gitlab/-/blob/master/doc/development/documentation/styleguide/word_list.md
          - GitLab Flavored Markdown syntax standards: https://gitlab.com/gitlab-org/gitlab/-/blob/master/doc/user/markdown.md

  - name: API documentation
    fileFilters:
      - "doc/api/**/*.md"
    instructions: |
      1. Every method must include the REST API request with HTTP method (GET, PUT, DELETE) followed by the request path starting with '/'.
      2. Every method must have a detailed description of attributes in a table format, with required attributes listed first, then sorted alphabetically.
      3. Every method must include a cURL example using https://gitlab.example.com/api/v4/ as the endpoint and <your_access_token> as the token placeholder.
      4. Every method must have a detailed description of the response body and a JSON response example.
      5. If endpoints attributes are available only to higher subscription tiers or specific offerings, include this information in the attribute description.
      6. For complex object types, represent sub-attributes with dots, like 'project.name' or 'projects[].name' for arrays.
      7. For curl commands, use long option names ('--header' instead of '-H'), declare URLs with the '--url' parameter in double quotes, and use line breaks with '\' for readability.
      8. Along with the previous instructions, API documentation should follow the GitLab "Documenting REST API resources" guidelines: https://gitlab.com/gitlab-org/gitlab/-/blob/master/doc/development/documentation/restful_api_styleguide.md

  - name: Localization template files
    fileFilters:
      - "locale/gitlab.pot"
    instructions: |
      1. Flag any msgid entry that starts with a lowercase letter - this indicates a split sentence that will be hard to translate

  - name: Experiments
    fileFilters:
      - "**/*.rb"
      - "**/*.js"
      - "**/*.vue"
    instructions: |
      For experiment-related changes, verify:
      1. Experiment uses an `experiment` type feature flag (not `development` or `ops`)
      2. Context is appropriate and consistent (e.g., `actor:`, `project:`, `group:`)
      3. Variants are clearly defined (control, candidate, or named variants)
      4. If corresponding issue mentions tracking beyond default assignment tracking, there are tracking calls like `experiment(:name, actor: current_user).track(:event_name)`
      5. Same context is used between experiment runs and tracking calls
      6. If experiment uses only `experiment(:name, actor: current_user)` as context, but the corresponding issue mentions tracking of namespace based activation events, then assignment should happen based on namespace or actor + namespace
      7. If experiment is first assigned during registration via `experiment(:name, actor: current_user)` before a namespace is created, there should be another assignment tracking event invoked like this `experiment(:name, actor: current_user).track(:assignment, namespace: group)` to enable tracking of activation events
      8. Frontend or feature tests exist to prevent premature code removal (see [testing levels](https://docs.gitlab.com/development/testing_guide/testing_levels/#white-box-tests-at-the-system-level-formerly-known-as-system--feature-tests))
      9. Tests cover experiment variants and tracking behavior
      10. Temporary assets (icons/illustrations) are in `/ee/app/assets/images` or `/app/assets/images` not Pajamas library
      11. When both control and variants are being toggled in Vue components layer, we prefer to use the `<gitlab-experiment>` component.

  - name: Pajamas Design System Components
    fileFilters:
      - "**/*.vue"
      - "app/assets/javascripts/**/*.js"
      - "ee/app/assets/javascripts/**/*.js"
    instructions: |
      For GitLab UI (Pajamas) component usage, verify:
      1. Component selection:
         - Flag component usage that appears inconsistent with Pajamas "when to use" and "when not to use" guidelines
         - Remind: "Each Pajamas component has specific usage guidelines. Review the component's guidelines at https://design.gitlab.com/components/"
      2. Component overrides:
         - Flag excessive CSS overrides on Pajamas components (multiple class overrides changing borders, backgrounds, padding, or other default styling)
         - Ask: "Multiple style overrides on this component suggest it may not be the right fit. Would utility classes or a different component be more appropriate?"
         - Reference: https://gitlab.com/gitlab-org/gitlab/-/raw/master/doc/development/fe_guide/style/scss.md#utility-classes
      3. Utility classes vs components:
         - Flag usage of container components purely for simple visual separation (borders, padding, rounded corners) without using the component's structural features (header, footer, etc.)
         - Remind: "For simple visual separation without structured content, prefer utility classes (e.g., `gl-border gl-rounded-lg gl-p-5`) over container components. See https://design.gitlab.com/components/ for each component's intended use cases."
      4. Design tokens and typography:
         - Flag hardcoded color values, spacing values, or typography that should use design tokens
         - Flag fixed type scales (e.g., `gl-text-700-fixed`) used outside of Markdown contexts
         - Reference: https://gitlab.com/gitlab-org/gitlab/-/raw/master/doc/development/fe_guide/design_tokens.md
      5. When uncertain about component choice:
         - Ask: "Has a Product Designer reviewed this component usage?"
         - Remind: "Check the Pajamas guidelines for this component's 'when to use' and 'when not to use' sections at https://design.gitlab.com/components/"
         - Reference: https://gitlab.com/gitlab-org/gitlab/-/raw/master/doc/development/fe_guide/_index.md
         - Reference: https://gitlab.com/gitlab-org/gitlab/-/raw/master/doc/development/contributing/design.md

  - name: Feature Flag Removal Safety
    fileFilters:
      - "config/feature_flags/**/*.yml"
      - "ee/config/feature_flags/**/*.yml"
      - "**/*.rb"
      - "**/*.vue"
      - "**/*.js"
      - "spec/**/*.rb"
    instructions: |
      When this MR touches a feature flag YAML definition file, Ruby code, frontend code,
      or specs that reference a feature flag, check for the following unsafe removal patterns:

      1. **Same-MR enablement and removal**: Flag any MR that both sets `default_enabled: true`
         in a feature flag YAML file AND removes all references to that same flag in code
         (see check 5 for the full list of reference patterns to verify).
         These two steps must be delivered in separate merge requests across separate milestones.
         Remind: "Setting `default_enabled: true` and removing the flag in the same MR skips
         the milestone where self-managed instances adopt the new default. Instances that never
         explicitly enabled the flag will jump straight from the disabled code path to no code
         path at all, which can cause data loss or errors during zero-downtime upgrades.
         See [incident #562149](https://gitlab.com/gitlab-org/gitlab/-/issues/562149)."

      2. **Same-milestone enablement and removal across multiple MRs**: If the MR description,
         commit messages, or the milestone field indicate that a companion MR in the same
         milestone is handling the other half of the flag lifecycle (one MR sets
         `default_enabled: true`, another removes the flag), flag this as a risk.
         Remind: "Even across separate MRs, enabling by default and removing a feature flag
         in the same milestone means self-managed instances that upgrade directly to that
         milestone version never run with the flag enabled by default. The `default_enabled: true`
         change must ship in milestone N, and the removal must ship in milestone N+1 or later."

      3. **Data-write flags need extra care**: If the flag guards a data write (for example,
         writing to a new table or column, running a migration, or populating a new data
         structure), apply rules 1 and 2 with higher urgency. Ask:
         "Does this feature flag gate a data write or schema change? If so, removing it
         without a prior milestone of `default_enabled: true` will leave self-managed instances
         with empty or inconsistent data after upgrading."

      4. **Flag removed without `default_enabled: true` ever shipped in a prior release**: When
         a feature flag YAML file is deleted (or all references to it are removed from code),
         check the flag's YAML file (or its Git history if it is being deleted) to confirm that
         `default_enabled: true` was committed and shipped in a released GitLab milestone before
         this MR's target milestone. If it was not, flag this as unsafe even if the flag was
         enabled in production via the admin UI or ChatOps.
         Production enablement only affects GitLab.com and instances where an operator manually
         enabled the flag. Self-managed instances that upgrade directly to the removal milestone
         will skip the enabled code path entirely, which can cause data loss or errors.
         Also check the `intended_to_rollout_by` field in the YAML: if it is set to a future
         date relative to this MR's target milestone, the team has explicitly declared the
         removal premature — flag it regardless of `default_enabled` history. A past date is
         supporting evidence the team intended rollout by then.
         Remind: "A feature flag must have `default_enabled: true` committed and shipped in a
         GitLab release (milestone N) before the flag and its guards can be removed in a
         subsequent release (milestone N+1 or later). Enabling the flag in production via the
         admin UI or ChatOps is not a substitute — it does not protect self-managed instances
         on upgrade. Check the Git history of the flag's YAML file to confirm a commit setting
         `default_enabled: true` was included in a released milestone prior to this MR's target
         milestone. See [feature flag development guidelines](https://docs.gitlab.com/development/feature_flags/#feature-flag-lifecycle)
         and [incident #562149](https://gitlab.com/gitlab-org/gitlab/-/issues/562149)."

      5. **Incomplete reference removal**: When a flag is being removed, verify that ALL
         reference patterns are cleaned up, not just Ruby backend guards. Check for:
         - Ruby: `Feature.enabled?(:flag_name)`, `Feature.disabled?(:flag_name)`
         - Ruby (push to frontend): `push_frontend_feature_flag :flag_name`
         - Vue/JS: `glFeatures.flagName` (camelCase of the flag name)
         - Vue/JS: `gon.features.flagName`
         - Specs: `stub_feature_flags(flag_name: ...)` — these should be removed along with
           the flag-specific test contexts (e.g., `context 'when flag is disabled'` blocks)
         Flag any MR that removes the YAML and Ruby guards but leaves frontend or spec
         references intact.

      6. **Changelog trailer correctness**: When a flag is removed, verify that a `Changelog:`
         trailer is present in the commit message and that its type matches the flag's final
         state:
         - `other` — flag was already `default_enabled: true` in a prior milestone, just
           cleaning up dead code
         - `added` or `fixed` — flag was enabled (new code path is now permanent); type should
           match the rollout issue's `type::` label (`type::feature` → `added`,
           `type::bug` → `fixed`)
         - `removed` — flag was disabled and `default_enabled: true`, meaning the feature is
           being removed

      Reference: https://gitlab.com/gitlab-org/gitlab/-/issues/564825

  - name: Schema Migrations
    fileFilters:
      - "db/schema_migrations/**/*"
    instructions: |
      1. These files are auto-generated and do not require a newline at the end of the file - do not flag missing newlines

  - name: Log Field Standards
    fileFilters:
      - "**/*.rb"
    instructions: |
      Backend engineers should be complying with the new field standardisation in observability best practices
      1. For any log lines that have been altered:
        - Ask: "If you are adding or modifying fields, please ensure that the field is defined within the LabKit Ruby Fields module engineers should follow Field Standardisation Guidelines - https://handbook.gitlab.com/handbook/engineering/architecture/design-documents/observability_field_standardisation/
        - Remind: "Common logging fields should be defined within the LabKit Ruby fields module - https://gitlab.com/gitlab-org/ruby/gems/labkit-ruby/-/blob/master/lib/labkit/fields.rb?ref_type=heads and imported from there."
      2. For any new fields being added to log messages:
        - Check to ensure that these fields are not dynamically generated
        - Remind: "We're aiming to standardise the fields that we emit across all of our services at GitLab through this approach"

  - name: Internal Analytics
    fileFilters:
      - "config/events/**/*.yml"
      - "ee/config/events/**/*.yml"
      - "config/metrics/**/*.yml"
      - "ee/config/metrics/**/*.yml"
    instructions: |
      For internal event and metric definition changes, verify:
      1. Event `action` follows naming convention: `<operation>_<target_of_operation>_<where/when>` (e.g., `create_ci_build`, `click_previous_blame_on_blob_page`)
      2. For event definitions: required fields are present: `description`, `action`, `product_group`, `tiers`
      3. For metric definitions: required fields are present: `key_path`, `description`, `product_group`, `data_source: internal_events`, `events`, `time_frame`
      4. `identifiers` list matches what is passed in tracking calls (user, project, namespace)
      5. All `additional_properties` used in tracking code are documented in the event definition
      6. No sensitive information like full page url, page path, group name, project name, organization name and user inputs added in tracking parameters. (PII, secrets, credentials)
      7. For metrics: `data_source: internal_events` is set for event-based metrics
      8. For metrics: `events` section correctly references existing event names
      9. For metrics: `unique` property (if present) references a valid identifier from the event definition
      10. For metrics: `time_frame` is appropriate for the use case (7d, 28d, or all)
      11. Make sure the milestone in event and metric definition files reflects the current milestone at time of merge, not the milestone when the file was originally created
      12. introduced_by_url field in metric and event definition file should reference the correct merge request link
      - Reference: https://gitlab.com/gitlab-org/gitlab/-/raw/master/doc/development/internal_analytics/review_guidelines.md
      - Reference: https://gitlab.com/gitlab-org/gitlab/-/raw/master/doc/development/internal_analytics/internal_event_instrumentation/event_definition_guide.md
      - Reference: https://gitlab.com/gitlab-org/gitlab/-/raw/master/doc/development/internal_analytics/internal_event_instrumentation/metric_definition_guide.md

  - name: ViewComponent Best Practices
    fileFilters:
      - "app/components/**/*.rb"
      - "ee/app/components/**/*.rb"
      - "app/components/**/*.html.haml"
      - "ee/app/components/**/*.html.haml"
    instructions: |
      For ViewComponent changes, verify:
      1. Composition over inheritance:
         - Flag ViewComponents that inherit from another ViewComponent (not ViewComponent::Base)
         - Remind: "Prefer composition (wrapping one component with another) over inheritance between ViewComponents, as inheritance with separate templates leads to confusion"
      2. Instance method visibility:
         - Flag public instance methods that are only used in the component template
         - Remind: "Most ViewComponent instance methods should be private, even `render?`. Private methods are still accessible from the component template"
      3. Avoid global state:
         - Flag components that access `params`, `request`, `session`, or `current_url` directly instead of receiving values through `initialize`
         - Remind: "Avoid implicit coupling to global state. Pass values into the component explicitly through initialize arguments to keep it reusable and testable"
      4. Avoid inline Ruby in templates:
         - Flag logic, variable assignments, or string interpolation in ViewComponent templates (ERB/Haml)
         - Remind: "Move inline Ruby logic from templates into instance methods on the ViewComponent class"
      5. Prefer slots over markup arguments:
         - Flag arguments that accept HTML strings (especially with `.html_safe`)
         - Remind: "Prefer slots for providing markup to components. Passing markup as an argument bypasses Rails HTML sanitization and creates potential security issues"
      6. Test against rendered content:
         - In corresponding specs, flag tests that only assert on component instance methods without rendering
         - Remind: "ViewComponent tests should use `render_inline` and assert against rendered output, not just instance method return values"
      7. Naming convention:
         - Flag ViewComponent classes that do not end with `Component`
         - Remind: "Include the `Component` suffix in component class names (e.g., `UserAvatarComponent`) to make it clear the class is a component, following Rails naming conventions"
      8. Reduce permutations:
         - Flag new components that closely duplicate existing components in the same directory
         - Remind: "Look for opportunities to consolidate similar patterns into a single component. Consider abstracting once there are three or more similar instances"

  - name: Internal Events Tracking Code
    fileFilters:
      - "**/*.rb"
      - "**/*.vue"
      - "**/*.js"
      - "**/*.haml"
      - "!spec/**/*"
      - "!ee/spec/**/*"
    instructions: |
      Only review these items if this MR adds or modifies internal event tracking (e.g., `track_internal_event`, `trackEvent`, `data-event-tracking` attributes).

      For code that instruments internal events tracking, verify:
      1. A corresponding event definition exists in `config/events/` or `ee/config/events/`
      2. For backend `track_internal_event` calls:
         - All required identifiers (user, project, namespace) are passed when the metric uses them
         - If a metric has a unique property like `unique: project.id`, ensure the corresponding argument (e.g., `project`) is passed in the tracking call
         - `additional_properties` match those documented in the event definition
         - When the call is made from a service object (a class with an `execute` method, typically under `app/services/` or `ee/app/services/`), prefer the declarative `Gitlab::InternalEvents::ServiceTracking` DSL (`tracks_event 'event_name', on: :success`) over manual `track_internal_event` calls in `execute`. The DSL handles success/error detection, payload extraction, and conditions automatically.
      3. For frontend `trackEvent` or `InternalEvents.trackEvent` calls:
         - Event name matches an existing event definition
         - Additional properties are documented in the event definition
      4. For data attribute tracking (`data-event-tracking`, `event_tracking:`):
         - Event name is valid and defined
         - Labels/properties match event definition's `additional_properties`
      5. Ensure test coverage exists using `trigger_internal_events` and `increment_usage_metrics` matchers for backend and `useMockInternalEventsTracking` helper for frontend
      6. Ensure test matchers (trigger_internal_events, useMockInternalEventsTracking) also asserts all identifiers and additional_properties added in the tracking call.
      7. When testing that an event was not triggered, ensure `not_trigger_internal_events` matcher or `not_to` syntax is used
      8. For batch events:
         - When multiple events are emitted at once, ensure `with_batched_redis_writes` is used to batch all of them into a single Redis call
      - Reference: https://gitlab.com/gitlab-org/gitlab/-/raw/master/doc/development/internal_analytics/internal_event_instrumentation/quick_start.md
      - Reference: https://gitlab.com/gitlab-org/gitlab/-/raw/master/doc/development/internal_analytics/review_guidelines.md

  - name: Test Efficiency
    fileFilters:
      - "spec/**/*.rb"
      - "ee/spec/**/*.rb"
    instructions: |
      1. Prefer `let_it_be` over `let` for DB-backed objects that are not mutated between examples.
        Use `let_it_be_with_reload` if the object is mutated, and `let_it_be_with_refind` only
        when a fresh ActiveRecord object is strictly necessary. Reserve plain `let!` for cases
        where the object must exist before the example runs but is never referenced directly.
      2. Prefer `build_stubbed` > `build` > `create` when constructing test objects. Only use
        `create` (and therefore a real DB write) when the test genuinely requires persisted state.
        Run `FDOC=1 bin/rspec <spec>` (Factory Doctor) to detect unnecessary `create` calls.
      3. Avoid factory cascades. Use `create_default` / `FactoryDefault` to share a single
        instance of a nested association across all examples in a context instead of recreating
        it per example. Run `FPROF=1 bin/rspec <spec>` (Factory Profiler) to surface cascades.
      4. Do not trigger the same expensive operation in multiple separate examples. Group
        assertions that share a single invocation under one `it` block with `:aggregate_failures`
        so the subject is only executed once.
      5. Use `fast_spec_helper` instead of `spec_helper` for classes well-isolated from Rails.
        `fast_spec_helper` skips gem loading and Rails boot, reducing load time from ~30 s to ~1 s.
      6. Only add the `:js` tag when a test requires real JavaScript reactivity in a headless
        browser. Feature specs that only need to assert HTML output should use `type: :request`
        instead; headless-browser specs are significantly slower.
      7. For Capybara negative assertions, prefer `expect(page).to have_no_testid(...)` over
        `expect(page).not_to have_testid(...)`. The positive form (`have_no_*`) returns
        immediately when the element is absent; the negative form waits the full Capybara timeout.
      8. `let_it_be` blocks run in `before(:all)` context. They must not depend on stubs or
        doubles set up in a `before` block, because those stubs are not active yet when
        `let_it_be` executes. Use `let` or `let!` when a factory call relies on a stub.
      9. Slow shared examples have a multiplied cost: a 30-second shared example included in
        10 spec files costs 300 seconds of CI time. Profile and optimize a shared example as
        a local spec before extracting it, and avoid `create` in shared examples unless
        DB state is a hard requirement.
      10. Stub expensive external operations (Git commands, binary compilation, network calls)
        in higher-level specs when a lower-level unit spec already verifies the operation's
        output. Real external operations can cost 10s to 3 min per example and multiply across
        every example in the shared context.
      11. Don't define factory attributes not required for validation, and don't supply
        attributes in tests that aren't needed for the specific scenario under test.
        Avoid `allow(...).to receive(...)` stubs inside factory definitions — use
        `stub_method` instead, which is compatible with `let_it_be`.
      12. Avoid `all()` with `.first` or block iteration. `all()` returns a collection but does
        not raise an error if the selector is not found, leading to silent no-ops that can mask
        test failures. Additionally, `all()` does not benefit from Capybara's smart waiting mechanisms,
        making tests slower and less reliable. Block iteration over `all()` results is particularly
        slow when filtering by child selectors. Instead of `all('[data-testid="card"]').first`, use
        `find('[data-testid="unique-card"]')` which raises immediately with a clear error message
        if not found. Instead of `all('[data-testid="card"]').find { |node| node.has_selector?('h3', text: title) }`,
        use `find('[data-testid="card"] h3', text: title).ancestor('[data-testid="card"]')` to
        leverage CSS child selectors and walk back to the parent element.
      - Reference: https://gitlab.com/gitlab-org/gitlab/-/raw/master/doc/development/testing_guide/best_practices.md

  - name: View Templates
    fileFilters:
      - "app/views/**/*"
      - "ee/app/views/**/*"
    instructions: |
      Views are responsible for presentation only. Flag any logic that belongs in a controller, service, or model:
      1. No database queries in views.
         Remind: "Move all data retrieval into the controller or a presenter and pass the result as an instance variable. Queries in views bypass caching layers, are invisible to query analysis tools, and make N+1 problems hard to detect."
      2. No complex business logic — no conditionals that evaluate model state beyond simple `nil?` / `present?` / boolean attribute checks, no service object instantiation, and no multi-step computations.
         Remind: "Extract this logic into a helper, presenter, or ViewComponent."
      - Reference: https://gitlab.com/gitlab-org/gitlab/-/blob/master/doc/development/reusing_abstractions.md#views

  - name: View Specs
    fileFilters:
      - "spec/views/**/*_spec.rb"
      - "ee/spec/views/**/*_spec.rb"
    instructions: |
      View specs should verify rendered HTML output, not re-test backend logic. Flag specs that overstep this boundary:
      1. No `ActiveRecord::QueryRecorder` or `exceed_query_limit` assertions. Query performance is a backend concern tested at the request/controller layer, not in view specs.
      2. No `create(...)` factory calls (enforced by rule `RSpec/FactoryBot/AvoidCreate`) unless the spec genuinely cannot work with `build_stubbed`. If `create` is present, ask: "Does this spec need a persisted record, or can `build_stubbed` provide the same rendering result?"
      3. No deep service-object mocking chains (e.g., `receive_message_chain`). If the view requires a service to be stubbed with chained calls, the view is doing too much — flag the view itself, not just the spec.
      4. Keep setup proportional to the assertion. A spec that assigns five instance variables and stubs three helper methods to assert a single `have_css` is a signal that the view has too many responsibilities.
      5. Assertions should target rendered output (`have_content`, `have_css`, `have_selector`, `have_link`) — not internal Ruby state or return values of view helper methods.
      - Reference: https://gitlab.com/gitlab-org/gitlab/-/blob/master/doc/development/testing_guide/best_practices.md#view-specs
