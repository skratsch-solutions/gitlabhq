  - name: Feature Flag Removal Safety
    fileFilters:
      - "config/feature_flags/**/*.yml"
      - "ee/config/feature_flags/**/*.yml"
      - "**/*.rb"
      - "**/*.vue"
      - "**/*.js"
      - "spec/**/*.rb"
    instructions: |
      When this MR touches a feature flag YAML definition file, Ruby code, frontend code,
      or specs that reference a feature flag, check for the following unsafe removal patterns.

      1. **Zero downtime upgrade safety check — flag removal**: For any MR that removes a
         feature flag, check whether the flag guards a data write (for example,
         writing to a new table or column, running a migration, or populating a new data
         structure), cache key, cleanup path, or any state transition shared between components (Rails, Sidekiq) or API.
         If yes, flag it for explicit human review — the agent cannot determine ZDU safety from
         code structure alone.
         Ask the author: "Does the code behind this flag produce or consume shared state
         that old-version components must still handle correctly after this flag is removed?
         If yes, describe how the expand phase was completed in a prior milestone.
         See [Zero-downtime upgrade compatibility](https://docs.gitlab.com/development/feature_flags/controls/#zero-downtime-upgrade-compatibility)."
         Note: neither enabling the flag in production nor setting `default_enabled: true`
         in a prior milestone guarantees ZDU safety — old-version nodes still run with the
         flag disabled during a rolling upgrade.
         Also check `intended_to_rollout_by`: if set to a future date relative to this MR's target milestone,
         flag the removal as premature — the team has explicitly declared it not ready.

      2. **Incomplete reference removal**: When a flag is being removed, verify that ALL
         reference patterns are cleaned up, not just Ruby backend guards. Check for:
         - Ruby: `Feature.enabled?(:flag_name)`, `Feature.disabled?(:flag_name)`
         - Ruby (push to frontend): `push_frontend_feature_flag :flag_name`
         - Vue/JS: `glFeatures.flagName` (camelCase of the flag name)
         - Vue/JS: `gon.features.flagName`
         - Specs: `stub_feature_flags(flag_name: ...)` — these should be removed along with
           the flag-specific test contexts (e.g., `context 'when flag is disabled'` blocks)
         Flag any MR that removes the YAML and Ruby guards but leaves frontend or spec
         references intact.

      3. **Changelog trailer correctness**: When a flag is removed, verify that a `Changelog:`
         trailer is present in the commit message and that its type matches the flag's final
         state:
         - `other` — flag was already `default_enabled: true` in a prior milestone, just
           cleaning up dead code
         - `added` or `fixed` — flag was enabled (new code path is now permanent); type should
           match the rollout issue's `type::` label (`type::feature` → `added`,
           `type::bug` → `fixed`)
         - `removed` — flag was disabled or removed

      Reference: https://gitlab.com/gitlab-org/gitlab/-/issues/564825

