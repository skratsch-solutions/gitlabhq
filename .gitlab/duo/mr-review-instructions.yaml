    instructions: |
      For ViewComponent changes, verify:
      1. Composition over inheritance:
         - Flag ViewComponents that inherit from another ViewComponent (not ViewComponent::Base)
         - Remind: "Prefer composition (wrapping one component with another) over inheritance between ViewComponents, as inheritance with separate templates leads to confusion"
      2. Instance method visibility:
         - Flag public instance methods that are only used in the component template
         - Remind: "Most ViewComponent instance methods should be private, even `render?`. Private methods are still accessible from the component template"
      3. Avoid global state:
         - Flag components that access `params`, `request`, `session`, or `current_url` directly instead of receiving values through `initialize`
         - Remind: "Avoid implicit coupling to global state. Pass values into the component explicitly through initialize arguments to keep it reusable and testable"
      4. Avoid inline Ruby in templates:
