      8. Reduce permutations:
         - Flag new components that closely duplicate existing components in the same directory
         - Remind: "Look for opportunities to consolidate similar patterns into a single component. Consider abstracting once there are three or more similar instances"

  - name: Internal Events Tracking Code
    fileFilters:
      - "**/*.rb"
      - "**/*.vue"
      - "**/*.js"
      - "**/*.haml"
      - "!spec/**/*"
      - "!ee/spec/**/*"
    instructions: |
      Only review these items if this MR adds or modifies internal event tracking (e.g., `track_internal_event`, `trackEvent`, `data-event-tracking` attributes).

      For code that instruments internal events tracking, verify:
      1. A corresponding event definition exists in `config/events/` or `ee/config/events/`
      2. For backend `track_internal_event` calls:
         - All required identifiers (user, project, namespace) are passed when the metric uses them
         - If a metric has a unique property like `unique: project.id`, ensure the corresponding argument (e.g., `project`) is passed in the tracking call
         - `additional_properties` match those documented in the event definition
         - When the call is made from a service object (a class with an `execute` method, typically under `app/services/` or `ee/app/services/`), prefer the declarative `Gitlab::InternalEvents::ServiceTracking` DSL (`tracks_event 'event_name', on: :success`) over manual `track_internal_event` calls in `execute`. The DSL handles success/error detection, payload extraction, and conditions automatically.
      3. For frontend `trackEvent` or `InternalEvents.trackEvent` calls:
         - Event name matches an existing event definition
         - Additional properties are documented in the event definition
      4. For data attribute tracking (`data-event-tracking`, `event_tracking:`):
         - Event name is valid and defined
         - Labels/properties match event definition's `additional_properties`
      5. Ensure test coverage exists using `trigger_internal_events` and `increment_usage_metrics` matchers for backend and `useMockInternalEventsTracking` helper for frontend
      6. Ensure test matchers (trigger_internal_events, useMockInternalEventsTracking) also asserts all identifiers and additional_properties added in the tracking call.
      7. When testing that an event was not triggered, ensure `not_trigger_internal_events` matcher or `not_to` syntax is used
      8. For batch events:
         - When multiple events are emitted at once, ensure `with_batched_redis_writes` is used to batch all of them into a single Redis call
      - Reference: https://gitlab.com/gitlab-org/gitlab/-/raw/master/doc/development/internal_analytics/internal_event_instrumentation/quick_start.md
      - Reference: https://gitlab.com/gitlab-org/gitlab/-/raw/master/doc/development/internal_analytics/review_guidelines.md

  - name: View Templates
    fileFilters:
      - "app/views/**/*"
      - "ee/app/views/**/*"
    instructions: |
      Views are responsible for presentation only. Flag any logic that belongs in a controller, service, or model:
      1. No database queries in views.
         Remind: "Move all data retrieval into the controller or a presenter and pass the result as an instance variable. Queries in views bypass caching layers, are invisible to query analysis tools, and make N+1 problems hard to detect."
      2. No complex business logic — no conditionals that evaluate model state beyond simple `nil?` / `present?` / boolean attribute checks, no service object instantiation, and no multi-step computations.
         Remind: "Extract this logic into a helper, presenter, or ViewComponent."
      - Reference: https://gitlab.com/gitlab-org/gitlab/-/blob/master/doc/development/reusing_abstractions.md#views
