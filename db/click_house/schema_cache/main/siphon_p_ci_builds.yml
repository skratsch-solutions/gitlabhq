---
name: siphon_p_ci_builds
engine: ReplacingMergeTree
engine_full: ReplacingMergeTree(_siphon_replicated_at, _siphon_deleted) PRIMARY KEY
  (traversal_path, id, partition_id) ORDER BY (traversal_path, id, partition_id) SETTINGS
  index_granularity = 2048, deduplicate_merge_projection_mode = 'rebuild'
primary_key: traversal_path, id, partition_id
sorting_key: traversal_path, id, partition_id
settings:
  index_granularity: '2048'
  deduplicate_merge_projection_mode: "'rebuild'"
columns:
- name: status
  type: LowCardinality(String)
  default_kind: DEFAULT
  default_expression: "''"
- name: finished_at
  type: Nullable(DateTime64(6, 'UTC'))
- name: created_at
  type: DateTime64(6, 'UTC')
  default_kind: DEFAULT
  default_expression: now64(6, 'UTC')
  compression_codec: CODEC(Delta(8), ZSTD(1))
- name: updated_at
  type: DateTime64(6, 'UTC')
  default_kind: DEFAULT
  default_expression: now64(6, 'UTC')
  compression_codec: CODEC(Delta(8), ZSTD(1))
- name: started_at
  type: Nullable(DateTime64(6, 'UTC'))
- name: coverage
  type: Nullable(Float64)
- name: name
  type: Nullable(String)
- name: options
  type: Nullable(String)
- name: allow_failure
  type: Bool
  default_kind: DEFAULT
  default_expression: 'false'
  compression_codec: CODEC(ZSTD(1))
- name: stage_idx
  type: Nullable(Int64)
- name: tag
  type: Nullable(Bool)
  compression_codec: CODEC(ZSTD(1))
- name: ref
  type: Nullable(String)
- name: type
  type: LowCardinality(String)
  default_kind: DEFAULT
  default_expression: "''"
- name: target_url
  type: Nullable(String)
- name: description
  type: Nullable(String)
  compression_codec: CODEC(ZSTD(3))
- name: erased_at
  type: Nullable(DateTime64(6, 'UTC'))
- name: artifacts_expire_at
  type: Nullable(DateTime64(6, 'UTC'))
- name: environment
  type: LowCardinality(String)
  default_kind: DEFAULT
  default_expression: "''"
- name: when
  type: LowCardinality(String)
  default_kind: DEFAULT
  default_expression: "''"
- name: yaml_variables
  type: Nullable(String)
- name: queued_at
  type: Nullable(DateTime64(6, 'UTC'))
- name: lock_version
  type: Int64
  default_kind: DEFAULT
  default_expression: '0'
- name: coverage_regex
  type: Nullable(String)
- name: retried
  type: Nullable(Bool)
  compression_codec: CODEC(ZSTD(1))
- name: protected
  type: Nullable(Bool)
  compression_codec: CODEC(ZSTD(1))
- name: failure_reason
  type: Nullable(Int64)
- name: scheduled_at
  type: Nullable(DateTime64(6, 'UTC'))
- name: token_encrypted
  type: Nullable(String)
- name: resource_group_id
  type: Nullable(Int64)
- name: waiting_for_resource_at
  type: Nullable(DateTime64(6, 'UTC'))
- name: processed
  type: Nullable(Bool)
  compression_codec: CODEC(ZSTD(1))
- name: scheduling_type
  type: Nullable(Int16)
- name: id
  type: Int64
  compression_codec: CODEC(DoubleDelta, ZSTD(1))
  is_in_sorting_key: true
  is_in_primary_key: true
- name: stage_id
  type: Nullable(Int64)
- name: partition_id
  type: Int64
  compression_codec: CODEC(DoubleDelta, ZSTD(1))
  is_in_sorting_key: true
  is_in_primary_key: true
- name: auto_canceled_by_partition_id
  type: Nullable(Int64)
- name: auto_canceled_by_id
  type: Nullable(Int64)
- name: commit_id
  type: Nullable(Int64)
- name: erased_by_id
  type: Nullable(Int64)
- name: project_id
  type: Int64
- name: runner_id
  type: Nullable(Int64)
- name: upstream_pipeline_id
  type: Nullable(Int64)
- name: user_id
  type: Nullable(Int64)
- name: execution_config_id
  type: Nullable(Int64)
- name: upstream_pipeline_partition_id
  type: Nullable(Int64)
- name: scoped_user_id
  type: Nullable(Int64)
- name: timeout
  type: Nullable(Int64)
- name: timeout_source
  type: Nullable(Int16)
- name: exit_code
  type: Nullable(Int16)
- name: debug_trace_enabled
  type: Nullable(Bool)
  compression_codec: CODEC(ZSTD(1))
- name: traversal_path
  type: String
  default_kind: DEFAULT
  default_expression: multiIf(coalesce(project_id, 0) != 0, dictGetOrDefault('gitlab_clickhouse_development.project_traversal_paths_dict',
    'traversal_path', project_id, '0/'), '0/')
  compression_codec: CODEC(ZSTD(3))
  is_in_sorting_key: true
  is_in_primary_key: true
- name: _siphon_replicated_at
  type: DateTime64(6, 'UTC')
  default_kind: DEFAULT
  default_expression: now64(6, 'UTC')
  compression_codec: CODEC(ZSTD(1))
- name: _siphon_deleted
  type: Bool
  default_kind: DEFAULT
  default_expression: 'false'
  compression_codec: CODEC(ZSTD(1))
- name: _siphon_watermark
  type: DateTime64(6, 'UTC')
  default_kind: DEFAULT
  default_expression: now64(6, 'UTC')
  compression_codec: CODEC(ZSTD(1))
