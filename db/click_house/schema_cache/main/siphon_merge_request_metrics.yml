---
name: siphon_merge_request_metrics
engine: ReplacingMergeTree
engine_full: ReplacingMergeTree(_siphon_replicated_at, _siphon_deleted) PRIMARY KEY
  (traversal_path, merge_request_id, id) ORDER BY (traversal_path, merge_request_id,
  id) SETTINGS index_granularity = 2048, deduplicate_merge_projection_mode = 'rebuild'
primary_key: traversal_path, merge_request_id, id
sorting_key: traversal_path, merge_request_id, id
settings:
  index_granularity: '2048'
  deduplicate_merge_projection_mode: "'rebuild'"
columns:
- name: merge_request_id
  type: Int64
  compression_codec: CODEC(ZSTD(1))
  is_in_sorting_key: true
  is_in_primary_key: true
- name: latest_build_started_at
  type: Nullable(DateTime64(6, 'UTC'))
- name: latest_build_finished_at
  type: Nullable(DateTime64(6, 'UTC'))
- name: first_deployed_to_production_at
  type: Nullable(DateTime64(6, 'UTC'))
- name: merged_at
  type: Nullable(DateTime64(6, 'UTC'))
- name: created_at
  type: DateTime64(6, 'UTC')
  compression_codec: CODEC(Delta(8), ZSTD(1))
- name: updated_at
  type: DateTime64(6, 'UTC')
  compression_codec: CODEC(Delta(8), ZSTD(1))
- name: merged_by_id
  type: Nullable(Int64)
- name: latest_closed_by_id
  type: Nullable(Int64)
- name: latest_closed_at
  type: Nullable(DateTime64(6, 'UTC'))
- name: first_comment_at
  type: Nullable(DateTime64(6, 'UTC'))
- name: first_commit_at
  type: Nullable(DateTime64(6, 'UTC'))
- name: last_commit_at
  type: Nullable(DateTime64(6, 'UTC'))
- name: diff_size
  type: Nullable(Int64)
- name: modified_paths_size
  type: Nullable(Int64)
- name: commits_count
  type: Nullable(Int64)
- name: first_approved_at
  type: Nullable(DateTime64(6, 'UTC'))
- name: first_reassigned_at
  type: Nullable(DateTime64(6, 'UTC'))
- name: added_lines
  type: Nullable(Int64)
- name: removed_lines
  type: Nullable(Int64)
- name: target_project_id
  type: Nullable(Int64)
- name: id
  type: Int64
  compression_codec: CODEC(DoubleDelta, ZSTD(1))
  is_in_sorting_key: true
  is_in_primary_key: true
- name: first_contribution
  type: Bool
  default_kind: DEFAULT
  default_expression: 'false'
  compression_codec: CODEC(ZSTD(1))
- name: pipeline_id
  type: Nullable(Int64)
- name: reviewer_first_assigned_at
  type: Nullable(DateTime64(6, 'UTC'))
- name: traversal_path
  type: String
  default_kind: DEFAULT
  default_expression: multiIf(coalesce(target_project_id, 0) != 0, dictGetOrDefault('gitlab_clickhouse_development.project_traversal_paths_dict',
    'traversal_path', target_project_id, '0/'), '0/')
  compression_codec: CODEC(ZSTD(3))
  is_in_sorting_key: true
  is_in_primary_key: true
- name: _siphon_replicated_at
  type: DateTime64(6, 'UTC')
  default_kind: DEFAULT
  default_expression: now64(6, 'UTC')
  compression_codec: CODEC(ZSTD(1))
- name: _siphon_deleted
  type: Bool
  default_kind: DEFAULT
  default_expression: 'false'
  compression_codec: CODEC(ZSTD(1))
- name: _siphon_watermark
  type: DateTime64(6, 'UTC')
  default_kind: DEFAULT
  default_expression: now64(6, 'UTC')
  compression_codec: CODEC(ZSTD(1))
