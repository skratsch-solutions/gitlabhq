---
name: siphon_labels
engine: ReplacingMergeTree
engine_full: ReplacingMergeTree(_siphon_replicated_at, _siphon_deleted) PRIMARY KEY
  (traversal_path, id) ORDER BY (traversal_path, id) SETTINGS index_granularity =
  2048, deduplicate_merge_projection_mode = 'rebuild'
primary_key: traversal_path, id
sorting_key: traversal_path, id
settings:
  index_granularity: '2048'
  deduplicate_merge_projection_mode: "'rebuild'"
columns:
- name: id
  type: Int64
  compression_codec: CODEC(DoubleDelta, ZSTD(1))
  is_in_sorting_key: true
  is_in_primary_key: true
- name: title
  type: String
  compression_codec: CODEC(ZSTD(3))
- name: color
  type: String
- name: project_id
  type: Nullable(Int64)
- name: created_at
  type: DateTime64(6, 'UTC')
  default_kind: DEFAULT
  default_expression: now64(6, 'UTC')
  compression_codec: CODEC(Delta(8), ZSTD(1))
- name: updated_at
  type: DateTime64(6, 'UTC')
  default_kind: DEFAULT
  default_expression: now64(6, 'UTC')
  compression_codec: CODEC(Delta(8), ZSTD(1))
- name: template
  type: Nullable(Bool)
  default_kind: DEFAULT
  default_expression: 'false'
  compression_codec: CODEC(ZSTD(1))
- name: description
  type: String
  compression_codec: CODEC(ZSTD(3))
- name: type
  type: LowCardinality(String)
- name: group_id
  type: Nullable(Int64)
- name: lock_on_merge
  type: Bool
  default_kind: DEFAULT
  default_expression: 'false'
  compression_codec: CODEC(ZSTD(1))
- name: archived
  type: Bool
  default_kind: DEFAULT
  default_expression: 'false'
  compression_codec: CODEC(ZSTD(1))
- name: organization_id
  type: Nullable(Int64)
- name: traversal_path
  type: String
  default_kind: DEFAULT
  default_expression: multiIf(coalesce(group_id, 0) != 0, dictGetOrDefault('namespace_traversal_paths_dict',
    'traversal_path', group_id, '0/'), coalesce(project_id, 0) != 0, dictGetOrDefault('project_traversal_paths_dict',
    'traversal_path', project_id, '0/'), coalesce(organization_id, 0) != 0, dictGetOrDefault('organization_traversal_paths_dict',
    'traversal_path', organization_id, '0/'), '0/')
  compression_codec: CODEC(ZSTD(3))
  is_in_sorting_key: true
  is_in_primary_key: true
- name: _siphon_replicated_at
  type: DateTime64(6, 'UTC')
  default_kind: DEFAULT
  default_expression: now64(6, 'UTC')
  compression_codec: CODEC(ZSTD(1))
- name: _siphon_deleted
  type: Bool
  default_kind: DEFAULT
  default_expression: 'false'
  compression_codec: CODEC(ZSTD(1))
- name: _siphon_watermark
  type: DateTime64(6, 'UTC')
  default_kind: DEFAULT
  default_expression: now64(6, 'UTC')
  compression_codec: CODEC(ZSTD(1))
