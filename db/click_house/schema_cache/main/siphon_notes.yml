---
name: siphon_notes
engine: ReplacingMergeTree
engine_full: ReplacingMergeTree(_siphon_replicated_at, _siphon_deleted) PRIMARY KEY
  (traversal_path, noteable_type, noteable_id, id) ORDER BY (traversal_path, noteable_type,
  noteable_id, id) SETTINGS index_granularity = 2048, deduplicate_merge_projection_mode
  = 'rebuild'
primary_key: traversal_path, noteable_type, noteable_id, id
sorting_key: traversal_path, noteable_type, noteable_id, id
settings:
  index_granularity: '2048'
  deduplicate_merge_projection_mode: "'rebuild'"
columns:
- name: note
  type: String
  compression_codec: CODEC(ZSTD(3))
- name: noteable_type
  type: LowCardinality(String)
  is_in_sorting_key: true
  is_in_primary_key: true
- name: author_id
  type: Nullable(Int64)
- name: created_at
  type: DateTime64(6, 'UTC')
  default_kind: DEFAULT
  default_expression: now64(6, 'UTC')
  compression_codec: CODEC(Delta(8), ZSTD(1))
- name: updated_at
  type: DateTime64(6, 'UTC')
  default_kind: DEFAULT
  default_expression: now64(6, 'UTC')
  compression_codec: CODEC(Delta(8), ZSTD(1))
- name: project_id
  type: Nullable(Int64)
- name: line_code
  type: Nullable(String)
- name: commit_id
  type: Nullable(String)
- name: noteable_id
  type: Int64
  is_in_sorting_key: true
  is_in_primary_key: true
- name: system
  type: Bool
  default_kind: DEFAULT
  default_expression: 'false'
  compression_codec: CODEC(ZSTD(1))
- name: st_diff
  type: Nullable(String)
- name: updated_by_id
  type: Nullable(Int64)
- name: type
  type: LowCardinality(String)
- name: position
  type: Nullable(String)
- name: original_position
  type: Nullable(String)
- name: resolved_at
  type: Nullable(DateTime64(6, 'UTC'))
- name: resolved_by_id
  type: Nullable(Int64)
- name: discussion_id
  type: String
  compression_codec: CODEC(ZSTD(1))
- name: change_position
  type: Nullable(String)
- name: resolved_by_push
  type: Nullable(Bool)
  compression_codec: CODEC(ZSTD(1))
- name: review_id
  type: Nullable(Int64)
- name: confidential
  type: Bool
  compression_codec: CODEC(ZSTD(1))
- name: last_edited_at
  type: Nullable(DateTime64(6, 'UTC'))
- name: internal
  type: Bool
  default_kind: DEFAULT
  default_expression: 'false'
  compression_codec: CODEC(ZSTD(1))
- name: id
  type: Int64
  compression_codec: CODEC(DoubleDelta, ZSTD(1))
  is_in_sorting_key: true
  is_in_primary_key: true
- name: namespace_id
  type: Nullable(Int64)
- name: imported_from
  type: Int8
  default_kind: DEFAULT
  default_expression: '0'
- name: organization_id
  type: Nullable(Int64)
- name: traversal_path
  type: String
  default_kind: DEFAULT
  default_expression: multiIf(coalesce(namespace_id, 0) != 0, dictGetOrDefault('gitlab_clickhouse_development.namespace_traversal_paths_dict',
    'traversal_path', namespace_id, '0/'), coalesce(project_id, 0) != 0, dictGetOrDefault('gitlab_clickhouse_development.project_traversal_paths_dict',
    'traversal_path', project_id, '0/'), '0/')
  compression_codec: CODEC(ZSTD(3))
  is_in_sorting_key: true
  is_in_primary_key: true
- name: _siphon_replicated_at
  type: DateTime64(6, 'UTC')
  default_kind: DEFAULT
  default_expression: now64(6, 'UTC')
  compression_codec: CODEC(ZSTD(1))
- name: _siphon_deleted
  type: Bool
  default_kind: DEFAULT
  default_expression: 'false'
  compression_codec: CODEC(ZSTD(1))
- name: _siphon_watermark
  type: DateTime64(6, 'UTC')
  default_kind: DEFAULT
  default_expression: now64(6, 'UTC')
  compression_codec: CODEC(ZSTD(1))
