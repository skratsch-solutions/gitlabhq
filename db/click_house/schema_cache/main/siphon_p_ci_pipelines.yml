---
name: siphon_p_ci_pipelines
engine: ReplacingMergeTree
engine_full: ReplacingMergeTree(_siphon_replicated_at, _siphon_deleted) PRIMARY KEY
  (traversal_path, id, partition_id) ORDER BY (traversal_path, id, partition_id) SETTINGS
  index_granularity = 2048, deduplicate_merge_projection_mode = 'rebuild'
primary_key: traversal_path, id, partition_id
sorting_key: traversal_path, id, partition_id
settings:
  index_granularity: '2048'
  deduplicate_merge_projection_mode: "'rebuild'"
columns:
- name: ref
  type: Nullable(String)
- name: sha
  type: Nullable(String)
- name: before_sha
  type: Nullable(String)
- name: created_at
  type: DateTime64(6, 'UTC')
  default_kind: DEFAULT
  default_expression: now64(6, 'UTC')
  compression_codec: CODEC(Delta(8), ZSTD(1))
- name: updated_at
  type: DateTime64(6, 'UTC')
  default_kind: DEFAULT
  default_expression: now64(6, 'UTC')
  compression_codec: CODEC(Delta(8), ZSTD(1))
- name: tag
  type: Nullable(Bool)
  default_kind: DEFAULT
  default_expression: 'false'
  compression_codec: CODEC(ZSTD(1))
- name: yaml_errors
  type: Nullable(String)
- name: committed_at
  type: Nullable(DateTime64(6, 'UTC'))
- name: project_id
  type: Int64
- name: status
  type: LowCardinality(String)
  default_kind: DEFAULT
  default_expression: "''"
- name: started_at
  type: Nullable(DateTime64(6, 'UTC'))
- name: finished_at
  type: Nullable(DateTime64(6, 'UTC'))
- name: duration
  type: Nullable(Int64)
- name: user_id
  type: Nullable(Int64)
- name: lock_version
  type: Int64
  default_kind: DEFAULT
  default_expression: '0'
- name: pipeline_schedule_id
  type: Nullable(Int64)
- name: source
  type: Nullable(Int64)
- name: config_source
  type: Nullable(Int64)
- name: protected
  type: Nullable(Bool)
  compression_codec: CODEC(ZSTD(1))
- name: failure_reason
  type: Nullable(Int64)
- name: iid
  type: Nullable(Int64)
- name: merge_request_id
  type: Nullable(Int64)
- name: source_sha
  type: Nullable(String)
- name: target_sha
  type: Nullable(String)
- name: external_pull_request_id
  type: Nullable(Int64)
- name: ci_ref_id
  type: Nullable(Int64)
- name: locked
  type: Int16
  default_kind: DEFAULT
  default_expression: '1'
- name: partition_id
  type: Int64
  compression_codec: CODEC(DoubleDelta, ZSTD(1))
  is_in_sorting_key: true
  is_in_primary_key: true
- name: id
  type: Int64
  compression_codec: CODEC(DoubleDelta, ZSTD(1))
  is_in_sorting_key: true
  is_in_primary_key: true
- name: auto_canceled_by_id
  type: Nullable(Int64)
- name: auto_canceled_by_partition_id
  type: Nullable(Int64)
- name: trigger_id
  type: Nullable(Int64)
- name: traversal_path
  type: String
  default_kind: DEFAULT
  default_expression: multiIf(coalesce(project_id, 0) != 0, dictGetOrDefault('project_traversal_paths_dict',
    'traversal_path', project_id, '0/'), '0/')
  compression_codec: CODEC(ZSTD(3))
  is_in_sorting_key: true
  is_in_primary_key: true
- name: _siphon_replicated_at
  type: DateTime64(6, 'UTC')
  default_kind: DEFAULT
  default_expression: now64(6, 'UTC')
  compression_codec: CODEC(ZSTD(1))
- name: _siphon_deleted
  type: Bool
  default_kind: DEFAULT
  default_expression: 'false'
  compression_codec: CODEC(ZSTD(1))
- name: _siphon_watermark
  type: DateTime64(6, 'UTC')
  default_kind: DEFAULT
  default_expression: now64(6, 'UTC')
  compression_codec: CODEC(ZSTD(1))
