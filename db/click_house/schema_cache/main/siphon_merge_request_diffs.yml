---
name: siphon_merge_request_diffs
engine: ReplacingMergeTree
engine_full: ReplacingMergeTree(_siphon_replicated_at, _siphon_deleted) PRIMARY KEY
  (traversal_path, merge_request_id, id) ORDER BY (traversal_path, merge_request_id,
  id) SETTINGS index_granularity = 2048, deduplicate_merge_projection_mode = 'rebuild'
primary_key: traversal_path, merge_request_id, id
sorting_key: traversal_path, merge_request_id, id
settings:
  index_granularity: '2048'
  deduplicate_merge_projection_mode: "'rebuild'"
columns:
- name: id
  type: Int64
  compression_codec: CODEC(DoubleDelta, ZSTD(1))
  is_in_sorting_key: true
  is_in_primary_key: true
- name: state
  type: LowCardinality(Nullable(String))
- name: merge_request_id
  type: Int64
  is_in_sorting_key: true
  is_in_primary_key: true
- name: created_at
  type: DateTime64(6, 'UTC')
  default_kind: DEFAULT
  default_expression: now64(6, 'UTC')
  compression_codec: CODEC(Delta(8), ZSTD(1))
- name: updated_at
  type: DateTime64(6, 'UTC')
  default_kind: DEFAULT
  default_expression: now64(6, 'UTC')
  compression_codec: CODEC(Delta(8), ZSTD(1))
- name: base_commit_sha
  type: Nullable(String)
- name: real_size
  type: Nullable(String)
- name: head_commit_sha
  type: Nullable(String)
- name: start_commit_sha
  type: Nullable(String)
- name: commits_count
  type: Nullable(Int64)
- name: external_diff
  type: Nullable(String)
- name: external_diff_store
  type: Nullable(Int64)
  default_kind: DEFAULT
  default_expression: '1'
- name: stored_externally
  type: Bool
  default_kind: DEFAULT
  default_expression: 'false'
  compression_codec: CODEC(ZSTD(1))
- name: files_count
  type: Nullable(Int16)
- name: sorted
  type: Bool
  default_kind: DEFAULT
  default_expression: 'false'
  compression_codec: CODEC(ZSTD(1))
- name: diff_type
  type: Int8
  default_kind: DEFAULT
  default_expression: '1'
- name: patch_id_sha
  type: Nullable(String)
- name: project_id
  type: Int64
- name: traversal_path
  type: String
  default_kind: DEFAULT
  default_expression: multiIf(coalesce(project_id, 0) != 0, dictGetOrDefault('gitlab_clickhouse_development.project_traversal_paths_dict',
    'traversal_path', project_id, '0/'), '0/')
  compression_codec: CODEC(ZSTD(3))
  is_in_sorting_key: true
  is_in_primary_key: true
- name: _siphon_replicated_at
  type: DateTime64(6, 'UTC')
  default_kind: DEFAULT
  default_expression: now64(6, 'UTC')
  compression_codec: CODEC(ZSTD(1))
- name: _siphon_deleted
  type: Bool
  default_kind: DEFAULT
  default_expression: 'false'
  compression_codec: CODEC(ZSTD(1))
- name: base_commit_sha_bytea
  type: Nullable(String)
- name: start_commit_sha_bytea
  type: Nullable(String)
- name: head_commit_sha_bytea
  type: Nullable(String)
- name: _siphon_watermark
  type: DateTime64(6, 'UTC')
  default_kind: DEFAULT
  default_expression: now64(6, 'UTC')
  compression_codec: CODEC(ZSTD(1))
