---
name: siphon_issue_metrics
engine: ReplacingMergeTree
engine_full: ReplacingMergeTree(_siphon_replicated_at, _siphon_deleted) PRIMARY KEY
  (traversal_path, issue_id, id) ORDER BY (traversal_path, issue_id, id) SETTINGS
  index_granularity = 2048, deduplicate_merge_projection_mode = 'rebuild'
primary_key: traversal_path, issue_id, id
sorting_key: traversal_path, issue_id, id
settings:
  index_granularity: '2048'
  deduplicate_merge_projection_mode: "'rebuild'"
columns:
- name: id
  type: Int64
  compression_codec: CODEC(Delta(8), ZSTD(1))
  is_in_sorting_key: true
  is_in_primary_key: true
- name: issue_id
  type: Int64
  compression_codec: CODEC(ZSTD(1))
  is_in_sorting_key: true
  is_in_primary_key: true
- name: first_mentioned_in_commit_at
  type: Nullable(DateTime64(6, 'UTC'))
- name: first_associated_with_milestone_at
  type: Nullable(DateTime64(6, 'UTC'))
- name: first_added_to_board_at
  type: Nullable(DateTime64(6, 'UTC'))
- name: created_at
  type: DateTime64(6, 'UTC')
  compression_codec: CODEC(Delta(8), ZSTD(1))
- name: updated_at
  type: DateTime64(6, 'UTC')
  compression_codec: CODEC(Delta(8), ZSTD(1))
- name: namespace_id
  type: Int64
- name: traversal_path
  type: String
  default_kind: DEFAULT
  default_expression: multiIf(coalesce(namespace_id, 0) != 0, dictGetOrDefault('namespace_traversal_paths_dict',
    'traversal_path', namespace_id, '0/'), '0/')
  compression_codec: CODEC(ZSTD(3))
  is_in_sorting_key: true
  is_in_primary_key: true
- name: _siphon_replicated_at
  type: DateTime64(6, 'UTC')
  default_kind: DEFAULT
  default_expression: now64(6, 'UTC')
  compression_codec: CODEC(ZSTD(1))
- name: _siphon_deleted
  type: Bool
  default_kind: DEFAULT
  default_expression: 'false'
  compression_codec: CODEC(ZSTD(1))
- name: _siphon_watermark
  type: DateTime64(6, 'UTC')
  default_kind: DEFAULT
  default_expression: now64(6, 'UTC')
  compression_codec: CODEC(ZSTD(1))
