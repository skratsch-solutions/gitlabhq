---
name: siphon_resource_state_events
engine: ReplacingMergeTree
engine_full: ReplacingMergeTree(_siphon_replicated_at, _siphon_deleted) PRIMARY KEY
  (traversal_path, id) ORDER BY (traversal_path, id) SETTINGS index_granularity =
  2048
primary_key: traversal_path, id
sorting_key: traversal_path, id
settings:
  index_granularity: '2048'
columns:
- name: id
  type: Int64
  compression_codec: CODEC(DoubleDelta, ZSTD(1))
  is_in_sorting_key: true
  is_in_primary_key: true
- name: user_id
  type: Nullable(Int64)
- name: issue_id
  type: Nullable(Int64)
- name: merge_request_id
  type: Nullable(Int64)
- name: created_at
  type: DateTime64(6, 'UTC')
  compression_codec: CODEC(Delta(8), ZSTD(1))
- name: state
  type: Int16
- name: epic_id
  type: Nullable(Int64)
- name: source_commit
  type: Nullable(String)
- name: close_after_error_tracking_resolve
  type: Bool
  default_kind: DEFAULT
  default_expression: 'false'
  compression_codec: CODEC(ZSTD(1))
- name: close_auto_resolve_prometheus_alert
  type: Bool
  default_kind: DEFAULT
  default_expression: 'false'
  compression_codec: CODEC(ZSTD(1))
- name: source_merge_request_id
  type: Nullable(Int64)
- name: imported_from
  type: Int16
  default_kind: DEFAULT
  default_expression: '0'
- name: namespace_id
  type: Int64
- name: traversal_path
  type: String
  default_kind: DEFAULT
  default_expression: multiIf(coalesce(namespace_id, 0) != 0, dictGetOrDefault('namespace_traversal_paths_dict',
    'traversal_path', namespace_id, '0/'), '0/')
  compression_codec: CODEC(ZSTD(3))
  is_in_sorting_key: true
  is_in_primary_key: true
- name: _siphon_replicated_at
  type: DateTime64(6, 'UTC')
  default_kind: DEFAULT
  default_expression: now64(6, 'UTC')
  compression_codec: CODEC(ZSTD(1))
- name: _siphon_deleted
  type: Bool
  default_kind: DEFAULT
  default_expression: 'false'
  compression_codec: CODEC(ZSTD(1))
- name: _siphon_watermark
  type: DateTime64(6, 'UTC')
  default_kind: DEFAULT
  default_expression: now64(6, 'UTC')
  compression_codec: CODEC(ZSTD(1))
