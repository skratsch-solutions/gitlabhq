---
name: siphon_projects
engine: ReplacingMergeTree
engine_full: ReplacingMergeTree(_siphon_replicated_at, _siphon_deleted) PRIMARY KEY
  id ORDER BY id SETTINGS deduplicate_merge_projection_mode = 'rebuild', index_granularity
  = 2048
primary_key: id
sorting_key: id
settings:
  deduplicate_merge_projection_mode: "'rebuild'"
  index_granularity: '2048'
columns:
- name: id
  type: Int64
  is_in_sorting_key: true
  is_in_primary_key: true
- name: name
  type: Nullable(String)
- name: path
  type: Nullable(String)
- name: description
  type: Nullable(String)
- name: created_at
  type: Nullable(DateTime64(6, 'UTC'))
- name: updated_at
  type: Nullable(DateTime64(6, 'UTC'))
- name: creator_id
  type: Nullable(Int64)
- name: namespace_id
  type: Int64
- name: last_activity_at
  type: Nullable(DateTime64(6, 'UTC'))
- name: import_url
  type: Nullable(String)
- name: visibility_level
  type: Int64
  default_kind: DEFAULT
  default_expression: '0'
- name: archived
  type: Bool
  default_kind: DEFAULT
  default_expression: 'false'
- name: avatar
  type: Nullable(String)
- name: merge_requests_template
  type: Nullable(String)
- name: star_count
  type: Int64
  default_kind: DEFAULT
  default_expression: '0'
- name: merge_requests_rebase_enabled
  type: Nullable(Bool)
  default_kind: DEFAULT
  default_expression: 'false'
- name: import_type
  type: Nullable(String)
- name: import_source
  type: Nullable(String)
- name: approvals_before_merge
  type: Int64
  default_kind: DEFAULT
  default_expression: '0'
- name: reset_approvals_on_push
  type: Nullable(Bool)
  default_kind: DEFAULT
  default_expression: 'true'
- name: merge_requests_ff_only_enabled
  type: Nullable(Bool)
  default_kind: DEFAULT
  default_expression: 'false'
- name: issues_template
  type: Nullable(String)
- name: mirror
  type: Bool
  default_kind: DEFAULT
  default_expression: 'false'
- name: mirror_last_update_at
  type: Nullable(DateTime64(6, 'UTC'))
- name: mirror_last_successful_update_at
  type: Nullable(DateTime64(6, 'UTC'))
- name: mirror_user_id
  type: Nullable(Int64)
- name: shared_runners_enabled
  type: Bool
  default_kind: DEFAULT
  default_expression: 'true'
- name: runners_token
  type: Nullable(String)
- name: build_allow_git_fetch
  type: Bool
  default_kind: DEFAULT
  default_expression: 'true'
- name: build_timeout
  type: Int64
  default_kind: DEFAULT
  default_expression: '3600'
- name: mirror_trigger_builds
  type: Bool
  default_kind: DEFAULT
  default_expression: 'false'
- name: pending_delete
  type: Nullable(Bool)
  default_kind: DEFAULT
  default_expression: 'false'
- name: public_builds
  type: Bool
  default_kind: DEFAULT
  default_expression: 'true'
- name: last_repository_check_failed
  type: Nullable(Bool)
- name: last_repository_check_at
  type: Nullable(DateTime64(6, 'UTC'))
- name: only_allow_merge_if_pipeline_succeeds
  type: Bool
  default_kind: DEFAULT
  default_expression: 'false'
- name: has_external_issue_tracker
  type: Nullable(Bool)
- name: repository_storage
  type: String
  default_kind: DEFAULT
  default_expression: "'default'"
- name: repository_read_only
  type: Nullable(Bool)
- name: request_access_enabled
  type: Bool
  default_kind: DEFAULT
  default_expression: 'true'
- name: has_external_wiki
  type: Nullable(Bool)
- name: ci_config_path
  type: Nullable(String)
- name: lfs_enabled
  type: Nullable(Bool)
- name: description_html
  type: Nullable(String)
- name: only_allow_merge_if_all_discussions_are_resolved
  type: Nullable(Bool)
- name: repository_size_limit
  type: Nullable(Int64)
- name: printing_merge_request_link_enabled
  type: Bool
  default_kind: DEFAULT
  default_expression: 'true'
- name: auto_cancel_pending_pipelines
  type: Int64
  default_kind: DEFAULT
  default_expression: '1'
- name: service_desk_enabled
  type: Nullable(Bool)
  default_kind: DEFAULT
  default_expression: 'true'
- name: cached_markdown_version
  type: Nullable(Int64)
- name: delete_error
  type: Nullable(String)
- name: last_repository_updated_at
  type: Nullable(DateTime64(6, 'UTC'))
- name: disable_overriding_approvers_per_merge_request
  type: Nullable(Bool)
- name: storage_version
  type: Nullable(Int8)
- name: resolve_outdated_diff_discussions
  type: Nullable(Bool)
- name: remote_mirror_available_overridden
  type: Nullable(Bool)
- name: only_mirror_protected_branches
  type: Nullable(Bool)
- name: pull_mirror_available_overridden
  type: Nullable(Bool)
- name: jobs_cache_index
  type: Nullable(Int64)
- name: external_authorization_classification_label
  type: Nullable(String)
- name: mirror_overwrites_diverged_branches
  type: Nullable(Bool)
- name: pages_https_only
  type: Nullable(Bool)
  default_kind: DEFAULT
  default_expression: 'true'
- name: external_webhook_token
  type: Nullable(String)
- name: packages_enabled
  type: Nullable(Bool)
- name: merge_requests_author_approval
  type: Nullable(Bool)
  default_kind: DEFAULT
  default_expression: 'false'
- name: pool_repository_id
  type: Nullable(Int64)
- name: runners_token_encrypted
  type: Nullable(String)
- name: bfg_object_map
  type: Nullable(String)
- name: detected_repository_languages
  type: Nullable(Bool)
- name: merge_requests_disable_committers_approval
  type: Nullable(Bool)
- name: require_password_to_approve
  type: Nullable(Bool)
- name: emails_disabled
  type: Nullable(Bool)
- name: max_pages_size
  type: Nullable(Int64)
- name: max_artifacts_size
  type: Nullable(Int64)
- name: pull_mirror_branch_prefix
  type: Nullable(String)
- name: remove_source_branch_after_merge
  type: Nullable(Bool)
- name: marked_for_deletion_at
  type: Nullable(Date32)
- name: marked_for_deletion_by_user_id
  type: Nullable(Int64)
- name: autoclose_referenced_issues
  type: Nullable(Bool)
- name: suggestion_commit_message
  type: Nullable(String)
- name: project_namespace_id
  type: Nullable(Int64)
- name: hidden
  type: Bool
  default_kind: DEFAULT
  default_expression: 'false'
- name: organization_id
  type: Nullable(Int64)
- name: _siphon_replicated_at
  type: DateTime64(6, 'UTC')
  default_kind: DEFAULT
  default_expression: now64(6, 'UTC')
- name: _siphon_deleted
  type: Bool
  default_kind: DEFAULT
  default_expression: 'false'
- name: _siphon_watermark
  type: DateTime64(6, 'UTC')
  default_kind: DEFAULT
  default_expression: now64(6, 'UTC')
  compression_codec: CODEC(ZSTD(1))
