---
table: namespaces
database: main
ignored_columns:
  - runners_token
  - saml_discovery_token
  - runners_token_encrypted
replication_targets:
  - name: clickhouse_main
    target: siphon_namespaces
    priority: 2
    refresh_on_change:
      - target_stream_identifier: projects
        target_keys:
          - project_namespace_id
        source_keys:
          - id
        filters:
          - column: type
            value: Project
