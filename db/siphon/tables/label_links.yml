---
table: label_links
database: main
replication_targets:
  - name: clickhouse_main
    target: siphon_label_links
    priority: 101
    dedup_by:
      - id
    reconcile:
      column: traversal_path
      expression_key_columns:
        - namespace_id
    refresh_on_change:
      - target_stream_identifier: merge_requests
        target_keys:
          - id
        source_keys:
          - target_id
        filters:
          - column: target_type
            value: MergeRequest
      - target_stream_identifier: issues
        target_keys:
          - id
        source_keys:
          - target_id
        filters:
          - column: target_type
            value: Issue
