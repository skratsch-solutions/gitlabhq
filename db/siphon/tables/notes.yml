---
table: notes
database: main
ignored_columns:
  - cached_markdown_version
  - note_html
replication_targets:
  - name: clickhouse_main
    target: siphon_notes
    dedup_by_columns_lookup_table: siphon_notes_pg_pkey_ordered
    dedup_by:
      - id
    reconcile:
      column: traversal_path
      expression_key_columns:
        - namespace_id
        - organization_id
        - project_id
